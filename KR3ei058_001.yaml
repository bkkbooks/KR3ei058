body:
  text: 卷之上脈法經曰婦人手少陰動甚者妊子也又曰陰搏陽別謂之有子又云何以知懷子之且生也曰身有病而無邪脈也又尺中之脈按之不絶者妊娠也滑伯仁曰三部脈浮沉正等無他病而不月者妊也按婦人帶證足少陰脈亦多滑利頗似孕脈然必與手少陰脈動相應方為妊子否則為帶也凡婦人懷孕其血留氣聚胞宮內實故尺陰之脈必滑數此必然之理也然亦有中年受胎及血氣羸弱之婦脈見細小不數者但於微弱之中必有隱隱滑動之象此即陰搏陽別之謂乃妊娠之脈也但胎孕之脈數勞損之脈亦數然損脈數中兼弦澀胎孕數必兼和滑此幾微中邪氣胃氣之異一診便知再加審之以證則顯然而明見者也凡業醫者不深究脈理不細玩內經往往誤認為陰虛勞損經閉之證若非婦人之夫明以告之鮮有不誤治反成半産漏下者矣可不慎歟脈訣歌肝為血兮肺為氣血為營兮氣為衛陰陽配偶不參差兩臟通和皆以類血衰氣旺定無妊血旺氣衰應有嗣婦人經脈不見行其脈微滑帶數意身雖有病脈無邪不澀不伏不弦徑寸微關滑尺數形流動往來雀啄利兩手關脈大相應胎已有形無差異以上胎脈指下詳數月懷身經脈閉左疾為男右為女帶縱帶橫雙生據左手脈逆生三男右手脈順生三女人恐左右臟氣偏不若陽男與陰女寸滑為陽尺滑陰兩寸滑實雙男取兩尺滑實二女陰此定男女分明語右尺左寸滑見形證別一男又一女又云左寸浮大男右寸沉細稱為女屢經診驗不差訛説與醫人為確據小兒日足胎成聚身熱脈亂無所苦汗出不食吐逆時精神結備其中住滑疾不散三月胎但疾不散五月母八九十月疾數無亦有始終洪數婦胎脈弦牢滑利安沉細而微歸泉路若脈沉細腹微疼雖有形如懷抱甕滿腹不動是為奇獨冷臍下翕翕動更兼早暮尺不同大小浮沉無定論或動或止或有無此是鬼胎脈現證連診數日皆如此補氣活血何須問更有夜叉胎作名急如風雨脈情形少停復來如初樣否則關中雀啄成又有指下脈弦徑再加大小不調勻夜叉脈候應如此切莫安胎成話柄編成胎證脈訣歌熟讀自能通捷徑金匱解方附本條凡婦人脈無病惟陰脈小弱乃營氣不足若感邪而營氣不足者必惡寒發熱今無寒熱妨於食是知妊娠矣經水不行至六十日血聚氣搏始凝成胎營氣並於胎元而胃氣不足津液少布故其人渴不能食宜桂枝湯和營益胃如醫以他病治之反加吐下者此為惡阻當絶止醫法候其自安可耳桂枝和營散邪佐芍藥斂陰甘草緩之引以薑棗辛甘性溫行脾津液而和營衛則渴止凡婦人行經時遇冷則余血留而為癥然癥病婦人恆有之或不礙子宮則仍行經而受孕雖得血聚成胎胎成三月而經始斷斷未三月而癥病復動遂漏下不止癥在下迫其胎故曰癥痼害所以臍上升動不安詢為正胎無疑若是鬼胎即屬陰氣結聚斷無動於陽位之理今動於臍上是胎已六月知前三月經水雖利而胎已成後三月經斷而血積成衃是以血下不止桂心茯苓丸主之藥俱等分為丸食前服一丸不知加至三丸用桂心茯苓丹皮桃仁熬以散其衃芍藥以護其營則血方止而胎得安世本作桂枝茯苓丸乃傳寫之誤詳桂枝氣味俱薄僅堪走表必取肉桂之心方有去癥之功安常所謂桂不傷胎勿疑有礙於妊觀下條子臟開用附子湯轉胞用腎氣丸俱用桂附內經所謂有故無殞是也妊娠六七月脈弦為虛寒虛陽散外而為發熱陰寒內逆而作胎脹腹痛惡寒者其內無陽子臟不能司閉藏之令故陰中覺寒氣習習少腹如扇也用附子湯以溫其臟則胎自安仲景用附子安胎非神而明之莫敢輕試也方缺可以意擬必薑桂之屬行經與結胎皆屬衝任衝任雖持乎陰陽交合為肝腎之用事然長養成胎又資坤土蓋陰陽抱負則不泄坤土堤防則不漏若宿有瘀濁客於衝任則陰自結不得與陽交合故有時漏下半産下血不絶也凡妊娠胎氣陽精內成陰血外養今陰血自結與胎阻隔不得相和獨陰在內作腹中痛下血皆陰陽失於抱負坤土失於堤防膠艾湯主之其方芎二兩歸三兩宣通陽血芍四兩乾地黃四兩宣通陰血阿膠二兩血肉之質同類以養之安胎補血塞其漏泄甘草二兩緩中解急和陰陽通血脈艾葉二兩專理濕鬱帶漏之病此方藥氣內入開利陰血之結而通於陽調經止漏安胎養血之妙用也然加減又必從宜若脈遲緩陰勝於陽則加乾薑或見數大陽勝於陰則加黃芩可不言而喻妊婦有因脾土為木邪所克穀氣不舉濕淫下流以滯陰血而腹中㽱痛當歸芍藥散主之此與胎阻痛者不同故君以芍藥一斤瀉肝利滯佐以芎歸各三兩補血止痛茯苓四兩澤瀉半斤滲濕降於小便白朮四兩益脾燥濕要知內外六淫皆能傷胎成痛不獨濕也妊婦先因脾胃虛弱津液留停蓄為痰飲至妊二月之後濁陰上衝中焦不勝其逆痰飲遂湧中寒乃起嘔吐不止乾薑人參半夏丸主之此即世俗所謂惡阻病也故用乾薑一兩止寒人參一兩補虛製半夏二兩以治痰散逆即以生薑汁和丸飲服十丸日三服妊婦小便難者膀胱熱鬱氣結成燥病非中焦而在下焦所以飲食如故歸母苦參丸主之每味藥各四兩丸如小豆飲服三丸加至十丸此方當歸和血潤燥貝母清肺開鬱苦參長於治熱利竅逐水佐貝母併入膀胱以除熱結結通則水行矣妊婦小便不利病在膀胱膀胱者內為胞室主藏津液氣化出溺外利經脈上行至頭為諸陽之表今膀胱氣不化水溺不得出外不利經脈所以身重灑淅惡寒起即頭眩但利小便則水去而經氣行表病自愈用葵子茯苓散主之葵子一斤直入膀胱以利癃閉佐茯苓三兩以滲水道小便利則諸病愈凡妊娠之婦精留血裹尺搏而形於脈動搏則生變化若靜而不動則不生不化是以妊血不可以靜靜則凝泣泣則不生不化而虧少虧少則虛皆不能與化胎之火相合要知胎孕生化必脈動搏故調之者先和陰陽利其氣血常服養胎之藥非惟安胎易産且免産後諸病宜常服當歸散酒飲服用芎歸芍藥各一斤安胎補血白朮半斤去腰臍間之陳瘀而補胃養胎其胎外之血因寒濕滯者皆解之黃芩一斤化壯火而反於少火以生氣故為常服之劑然當以脈證遲數虛實加減有病則服否則不必也藥味偏而不正不比米穀豈宜無病久服經曰味之所入各歸所喜攻氣增而久夭之由也凡妊娠血聚而後成胎少遇邪則所聚之血將宿而不運反類瘀惡必生新開陳然後胎可養也養胎不惟在血而胎繫於腎養之又在於胃所以補腎調胃補腎以固其精調胃以和其中白朮散主之但白朮散方藥四味本草皆云能去惡血而養胎用之何也蓋白朮三分能調胃蜀椒三分出汗一本秦椒開痹痹開則陽精至牡蠣四分治崩崩止則陰精固川芎三分下入血海運動胎血破舊生新如或陰血不利肝木為害在內抑屈而痛者瀉以芍藥之酸寒以通其陰設直衝過而痛者散以芎藭之辛溫以通其陽或挾瘀惡之氣上逆於胃而胃中吐煩不能食者用細辛溫中去痰下氣半夏治心下急痛和胃進食止吐逆若嘔而不止者由肝木妄動用小麥飲養其本氣以安之且又平胃下氣止煩一舉兩得大麥主消渴益氣調中故中氣不足而渴者用之逐月養胎辨並慎擇醫藥論凡婦人有孕則手足十二經脈氣血周流俱供養胎元豈有逐月某經養某胎之理故不具載如孕婦有疾必擇專門名醫平日相信而無錯誤者方可用之若未試之醫有毒之藥切勿輕用以貽後悔更不可輕用針灸以致墮胎受胎試驗法附方婦人經水不行過二三月疑是兩身卻疑血滯心煩寒熱恍惚以佛手散艾葉湯調驗之用全當歸七分生川芎一錢共為末濃煎艾葉湯空心調下或好酒調服亦可待三兩時辰覺臍腹間微動者即孕也否則是經滯動罷即愈安穩無虞如不是胎即不動所滯惡物自行經滯之病亦愈一方驗經脈不行已經三月者用生川芎為細末濃煎艾湯空心調下二錢覺腹內微動則有胎也否則經滯查古方有探胎散用皂角去皮炙草各一錢黃連少許共末酒調服有孕則吐無孕則不吐但皂角探胎未有不吐恐胃弱之婦即無胎亦不免於吐耳姑録此方用者慎之此皆試之以藥也若尺脈搏手與寸脈滑動者為孕脈此試之以脈也凡婦人受孕四十日外必患惡阻有不患者在疑似之間方用此試法試男女胎法凡懷男孕動在三月陽性早也婦臍必突按之頗實兩乳甚黑男面背母而懷背脊抵腹其形圓如釜母腹故硬女孕動在五月陰性遲也婦臍軟乳頭雖黑不甚女面母腹而懷足膝抵腹下大上小其形如箕又法令孕婦抱未生齒兒女是男孕則所抱女兒瀉青糞若男孕抱男兒女孕抱女兒則無恙又法令孕婦前行人忽從背後呼之左回首者是男右回首者是女又法孕婦登廁時夫從後呼之男左回首女右回首蓋男受胎在左則左重女胎在右則右重故回首慎護重處而然也推之於脈其義亦然胎在左則血氣護胎而盛於左故脈亦從之而左脈現滑大疾數等形為男脈矣胎在右當亦如之再推之經曰陰搏陽別謂之有子蓋受胎處於臍腹之下則血氣護胎而盛於下故陰之尺脈鼓搏有力而與陽之寸脈殊別也又如癰癤發上則血氣從上而寸脈盛發下則氣血從下而尺脈盛發左則氣血從左而左脈盛發右則血氣從右而右脈盛也丹溪以左大順男右大順女為醫人左右手豈非智者之一失歟但丹溪治産精微恐無此失大約以此診男女之病而分順逆原非診別男女也三禁婦人年幼天癸未行屬少陰天癸既行屬厥陰天癸既絶屬太陰治胎産之病從厥陰始是祖氣生化之源也治法無犯胃氣者是後天生化之源也所謂三禁不可汗不可下不可利小便恐亡其津液而傷其生氣也大抵産病天行從增損柴胡雜證從增損四物宜詳脈證而用之教養宜忌論教養宜忌之道世人不特未諳即有知者亦鮮能遵而行之難免半産産難之虞胎毒夭殤之患良可慨矣今擇其緊要者言之婦人妊娠三月而形像始化未有定儀因感而變口談正言身行正事生子端正莊嚴欲生男者聽古文史鑑執弓矢欲生女者觀鸞鳳牡丹施環佩欲子美好佩白玉欲子賢能看詩書欲轉女為男之法有以絳紗囊佩雄黃於左者或潛以夫發及手足甲置席下者或潛以雄雞尾尖長毛三莖置席下者無令本婦知皆外象內感屢試屢驗者也古者婦人有孕即居側室令老嫗伴宿不與夫接勿亂服藥勿過飲酒勿信師巫勿食邪味勿聽淫詞野傳勿去登高涉險勿妄針灸勿舉重物立不蹕坐不邊口不可出惡言手不可行鞭朴勿看日用薄蝕勿見鬼神怪戲毋哭泣毋嗔怒毋驚恐毋沐浴時當炎夏雖難免於澡洗然須避其熱湯若遇嚴冬縱然寢被清寒切勿迫以爐炭若心有大驚犯之難産子必癲癇如或勞力過傷腎氣不足生子解顱自家及鄰家修造動土須宜遠避若有衝犯令子破形殞命刀犯者形必傷泥犯者竅必塞打擊者色青黯繫縛者相拘攣坐不實其前陰臥不久偏一側若耽坐嗜臥氣血則為凝滯常見富貴之家厚養安逸血滯氣凝交骨堅閉必難生育雖曰無勞時須小役四體氣血流行胎息易於運動即如貧賤之婦因時常行走動作疏通筋骨開豁骨眼所以易産其最甚者不遵禁忌縱情交接以擾子宮有觸動胎元一月而墮者有三五月而小産半産者有胎肥碩而難産者有敗精凝裹而礙産者有生子多疾痘瘡稠密者皆由縱欲之故其三五月之胎墮人所共知而一月之小産人所不覺可不慎歟至孕婦腰腹漸粗飲食不宜過飽茶湯更須節省大熱大涼總非所宜有毒之物切宜禁食即椒薑常用之品亦須少嘗其豕肉醇酒濕面之類縱不能屏絶不食亦不可恣啖歸精於胎過於蕃長致母臨蓐難産而子在胞中稟質肥脆襁褓必多羸困婦人孕懷甫交三月即當滿裹其腹胎氣漸長僅可微松其束切勿因其氣急滿悶而頓放之致胎肥難産俱當謹遵禁戒隨時調護可免諸患此乃宗祧所重人命所關安可視為兒戲耶飲食七情禁忌論子在腹中資母之氣血而生孕婦飲食皆生子之氣血者也故凡厭忌之物所當屏戒苟恣性偏嗜不但能觸動胎氣且臨蓐艱難能令子殘母損慎之戒之食羊肉子多白睛且多病豆醬雀肉同食子生點黯黑子食羊肝子多厄食鱉肉子項短且能損胎食犬肉子無聲音食鯉鱠魚及同雞子食子害疳食螃蟹子橫生食野禽肉子無恥且多淫雞蛋同桑椹食倒生食薑椒子氣促且痘毒盛食田雞鱔魚子喑啞多食薑子生岐指並主多瘡食驢馬肉過月難産多飲燒酒子禿頭成瞽食兔肉子缺唇雞肉糯米同食子生寸白蟲多食鹽子解顱食冰水並冷物過多胞衣遲下食慈姑消胎氣豆醬同藿香食之墮胎食一切無鱗魚難産食諸般菌生子驚風而夭食雀腦令子雀目多食酸傷肝多食苦傷心多食甘傷脾多食辛傷肺多食鹼傷腎過喜則傷心而氣散過怒則傷肝而氣上過思則傷脾而氣鬱過憂則傷肺而氣結過恐則傷腎而氣下妊娠藥忌歌蚖斑水蛭地膽蟲烏頭附子及天雄躑躅野葛螻蛄類烏喙側子與虻蟲牛黃水銀同巴豆大戟蛇蛻及蜈蚣牛膝藜蘆和薏苡金銀錫粉黃雌雄牙硝芒硝牡丹桂蜥蜴飛生與蟅蟲代赭蚱蟬胡粉麝芫花薇草䘖草三稜槐子牽牛並皂角躋螬桃核共茅根乾薑硇砂與乾漆菵草傷胎一樣同瞿麥蘆茹蟹甲爪蝟皮赤箭赤頭紅馬刀石蠶衣魚輩半夏南星通草同凡遇胎前除各味又能活潑號良工種子補益受胎壽子論凡妊婦衝任經虛血氣羸弱此本來稟賦不足若一受孕氣血分而蔭胎則虛證自然百出或孕成隨墮或胎不長養必資藥力以助母安胎壽子是以虛人屢産生子無氣及育而不壽者皆父母元氣不足故也若少男得壯盛之婦為之配又能愛精如持寶計落紅始盡婦人雙歲單月或單歲雙月必經盡後一三五七單日合陽氣日時而施受焉則一舉成男矣即婦人雙月雙歲單月單歲若經期逢單日而來必逢單日而止仍以一三五七日交合亦成男孕所以往往依俗計算而不準者此之謂也此乃陰陽至理如精養俱足所稟既厚體滿骨堅何病之有何用藥為自然生子神足無病而有壽若壯陽弱陰成孕則母無餘血以蔭胎必借藥力滋補生血培養方能生子精神體壯如弱男衰翁得壯盛婦女必須異床寡欲加以藥味填補精血等候經期盡而陽施陰受方能成孕生子神健易長若不遠帷幕相火易動則陽一舉即未交合而靈精數點隨痿而出雖候經期又何益哉倘遇強陰氤氳之候即或感而成胎亦必易墮苟全足月所生之子骨少肉多五遲五軟勢所必然又安望其長年耶經云陰平陽祕精神乃治又曰因而和之是謂聖度焉得而不藉補益之藥力以回天乎醫可通神切勿漫視而忽之種子丹治男子陽事不舉不能堅久精薄無子並治婦人下元虛弱不能受孕服此丹自能受孕又能安胎生地酒洗擇頂大枝頭熟地擇頂大枝頭者用無灰酒九蒸九曬天冬去心麥冬去心各三兩黃柏十二兩勻分作四分酒浸一分人乳浸一分童便浸一分鹽水浸一分各浸一宿俱炒褐色鹿茸一對重五六兩者以上藥味俱忌鐵器為末煉蜜丸桐子大空心鹽湯或酒送服八十丸鹿茸須擇形如茄子色如瑪瑙者看紫潤圓短者為上破之如朽木者良毛瘦枯皺尖長生岐者為下太嫩者血氣未足無力酥塗灼去毛微炙用不塗酥則傷茸但不可炙焦有傷氣血之性亦有用酒炙者炙後去頂骨用茸鹿茸不可嗅嗅之有蟲恐入鼻顙鹿茸麋茸罕能辨別大抵其質粗壯腦骨堅厚毛蒼黧而雜白毛者為麋茸其形差瘦腦骨差薄毛黃澤而無白者為鹿茸鹿茸補督脈之陽麋茸補督脈陰中之陽不可不辨種子奇方此藥艱於子者服至百日後擇婦人單歲雙月雙歲單月及經後陽日時與婦人交即能受孕兼胎固子壽且久服鬚髮不白顏色如童當歸分作四分以童便乳汁酒醋各浸一分浸一宿各曬乾用魚膠各一斤生地如當歸治法枸杞沙苑蒺藜茯苓各八兩人參四兩上末煉蜜為丸桐子大每服八九十丸空心煮酒吞之坎離丸烏須黑髮壯筋骨大有補益精壯則婦人感而受孕其子必壽黑豆不拘多少用桑椹汁浸透蒸熟再浸再蒸共五遍上為末另用紅棗量足配豆末成丸之數蒸熟去皮核搗如泥和黑豆末為丸或印成餅隨便食延嗣酒大有補益早晚男婦各隨量飲三五杯婦人經不對者自正經正者即受胎矣生地酒洗熟地九蒸九曬天冬去心麥冬去心各四兩仙靈皮八兩飯上蒸當歸二兩酒洗枸杞一兩酒浸俱切碎絹袋盛入大壇酒內重湯煮自卯至酉為度埋土內七日取起用補益大豆方此方祕傳固精補腎健脾降火烏須黑髮延年服之既久與婦人交感有孕其胎自固而子多壽大黑豆三升何首烏四兩選大而赤者茯苓三兩青鹽八錢甘草一兩銼為片先晚以瓷鉢一個盛豆入水八碗用絹包藥置內次日以砂鍋內煮候水乾為度去藥不用取豆略曬用瓷瓶收貯每早晚白滾湯不時服山精壽子丸此丸能延己壽而生子又壽無論有病者宜服即無病服之猶妙凡壯年之男種玉無成幼歲之婦從不受孕或受胎而中懷墮落或得正産而又生女匪男或生而不育或育而夭殤即苟延性命難免多疾病者此皆由真陽不足之故均宜服此丸山藥二兩五錢用心結實者有蛀者勿用脾虛易泄瀉者可加多用黃精五兩二錢取真者另杵膏待用若九蒸九曬干杵末用更好黑棗七兩五錢擇肥大者去皮核及腐爛者另杵膏待用懷牛膝一兩五錢去蘆淨酒拌蒸或襯何首烏蒸曬乾用或竟以牛膝易石斛亦可然須加倍用石斛生六安山中形如蚱蜢髀味甘體黏方正如孕婦忌用牛膝竟以石斛三兩代之大何首烏二兩五錢或三兩亦可用黑豆湯浸軟木棒打碎置瓦器中底注黑豆湯務以豆湯拌濕蒸一柱線香時候冷取曬俟水乾又拌蒸如是九次夏月一日三四回蒸曬可也曬極干稱準川杜仲二兩炒碾取淨末稱準川續斷二兩酒潤剝淨肉銼曬乾大熟地四兩煮熟者氣味皆失不堪用必須九蒸九曬為妙陰虛之人可用六兩草覆盆子三兩五錢俗名拍盤果又名麥泡果蔓生藤葉有刺葉面青背白有齒尖開紫花結子聚成覆盆樣子端有芒先緑後黃老熟時紅紫味甘酸可生食四五月熟取七八分熟者去蒂以酒拌焙乾研末用陽痿者多用有一種木覆盆乃樹上結者只解酒毒不補陽勿用有一種蓬虆名稻黃莓其莖粗高結子大八九月熟色紫黑感秋陰所成者亦補陰虛陽虛不可用也有一種蛇莓系蔓生草藤葉無刺有白毛結子紅三四月熟味淡除解胃熱外余不堪用沙苑蒺藜二兩五錢其形如豬腰子半截米大嗅味似緑豆炒用肝虛滑精者多用川巴戟天二兩酒浸去骨蒸熟曬乾用相火不足者多加用肉蓯蓉二兩酒洗去泥甲但不可過洗盡滑膩恐傷去肉隔紙烘乾再稱準分兩遠志二兩甘草湯浸去骨仍以甘草湯拌炒乾用取浮肉稱準菟絲子四兩擇色異而大者去淨以布袋盛之洗至水清以瓦器蒸開肚皮杵爛做餅曬乾稱用白茯苓二兩選結白者出六英山中或云南者佳各處市買咀片多有連膜者非為末水漂其膜不能去然過水力已減矣或用雲南整塊茯苓自去膜用不令見水蓋不切為片則膜易去山萸肉二兩去核取淨肉稱準酒蒸杵爛曬乾精滑者多用經行多或淋瀝不斷者多用肝氣抑結者少用遼五味子二兩肝氣抑結肺有熱者少用甘州枸杞五兩去梗蒂淨上藥共十八味除精棗二膏余皆共為細末徐徐上於精棗膏內杵和極勻加煉蜜為丸小豆大每早空心百沸淡鹽湯順下三四錢久服愈好高益謙曰補陽而專事參附耆硫輩驟補其火不惟壯火食氣難免陽長陰消陰不敵陽而能壽能子又難此方藥性不寒不熱類多平和補陽不致陰消久服長年無疾效過多人筆難罄書補陽益氣煎此方益氣強陽服至十劑頓然改觀矣再用後丸藥三料可補氣填精也人參枸杞酒洗白朮麩炒黃各一錢五分熟地五錢可加至八錢九蒸九曬巴戟天一錢可加至一錢五分酒洗去骨肉蓯蓉酒洗去筋膜鱗甲茯神杜仲鹽水炒斷絲各一錢遠志肉七分甘草水制肉桂五分山萸肉二錢酒洗龍眼肉四枚用水一碗半煎至八分渣在煎服弱衰之甚多服十劑精濃氣足補陽益氣丸此丸大能填精益氣雖老年亦能舉子兼別有妙益人參肉蓯蓉酒洗去鱗甲泥白茯苓白芍藥酒洗巴戟天當歸身酒洗麥冬去心各三兩大熟地八兩山萸肉蒸去核白朮土炒淮山藥炒各四兩川附子一個重一兩二錢童便制去皮臍鹿茸一付乳酥炙紫河車一具首胎者佳火焙乾搗粉入藥肉桂遠志肉制柏子仁炒研去油杜仲鹽水炒斷絲補骨脂鹽水炒五味子棗仁炒去殼炙草各一兩砂仁五錢去殼炒共為細末煉蜜為丸如桐子大每日空心服五錢淡鹽湯送下濟陰壽子飲此方大益胎元而分娩易生子易育瘡痘稀婦人孕成後每月十五服弱甚者一日一服抑有餘而補不足加減附於方後用者擇之人參一錢弱者倍之當歸身土炒熟地擇頂大枝頭無灰酒拌九蒸九曬白朮土炒各二錢川芎八分紫蘇陳皮炙草各四分大棗一枚水煎不拘時食遠溫服渣再煎服如虛肥人陳皮去白加蜜炙黃耆五分泄瀉加去心蓮子十枚帶皮砂仁三分減地黃多怒加木香二分磨沖藥服口燥加去心麥冬一錢怔忡加炒棗仁一錢益智仁一錢龍眼肉十枚濟陰大造丸婦人孕成後服濟陰壽子飲兼服此助胎猶妙並治産後日久腎虛腰痛人參熟地各一兩五錢當歸身二兩五錢酒洗麥冬去心天冬去心山藥炒各一兩五味子五錢黃柏八錢上各為末加頭胎壯盛紫河車一具水洗挑去經絡汙血淨酒蒸搗爛入諸藥末煉蜜為丸如桐子大每服三錢白水桂圓湯任下早晚俱可服如脾胃患瀉去黃柏減地黃加土炒白朮一兩河車大造育麟丸治婦人血氣不足苦於小産或生而難育或産下草迷而死皆氣血虛而胎不旺也宜服此丸甚妙熟地四兩九蒸九曬紫河車一具頭胎肥大者洗淨蒸爛山藥炒白朮土炒各一兩五錢茯神茯苓人參棗仁去殼炒研麥冬去心阿膠蛤粉炒成珠續斷肉酒蒸杜仲鹽水炒斷絲沙參黃耆蜜炙神麯炒建蓮肉炒條芩酒炒白芍藥酒炒丹皮各一兩當歸身一兩五錢酒洗五味三錢炒研如血不熱去條芩丹皮加肉桂三五錢亦可蜜丸梧子大早晚秋石桂圓湯任下每服二三錢胎動安胎論妊娠胎動有傷僕忤觸動而不安者人皆見證施治故無差謬若內傷而動所因不同治法亦異人多錯誤雖然要不外乎虛實寒熱四端人能察其病之所由而調劑焉自無不安者所以安胎之方不可執一若泥定某經月數按月用藥猶膠柱鼓瑟執滯而不通矣考安胎之藥方書多用清涼然間有宜用溫補者不可不知如虛而不安者或衝任不足受胎不實或脾胃氣虛不能提固又或由色欲勞倦飲食七情所傷務須分別在氣在血虛熱虛寒或假寒假熱察其所由隨其疾苦而調之虛者補之治無不效仍加戒慎可也如實而不安者或由食滯氣滯或由於鬱怒傷肝鬱結傷脾觸動血脈不安須察其由而開之導之可也如寒而不安者或吐酸嘔惡喜熱畏寒下寒泄瀉或慣於小産虛寒滑脫屢用清補安胎而不效脈必現沉微細弱此屬陽虛寒證宜用溫中安胎可也余內人屢患小産即遠房幃慎起居擇專門女科調治總皆罔效余雖稍通醫理奈因王事鞅掌焉能如業醫者之臨證多而機神熟耶爰專任於醫乃屢安而屢墮前後凡五次比觀其方不過清熱養胎補氣血澀滑脫而已逮後復有孕余自診視其脈微弱及時大補至七十日如期而仍下血腰痠而腹不痛此正合産書云胎動胎漏皆能下血胎動腹痛胎漏腹不痛胎動宜調氣胎漏宜清熱然前已用清熱罔效余因而思及小産既多陰血虛寒而滑脫陽氣虛寒而不固爰用溫中之法以薑炭桂炭加於參朮歸耆地續膠艾之中又取紅見黑止之義不數劑而血止胎安矣因悟及古人之治惡阻必用二陳六君生薑半夏之屬而愈則知胎亦有用溫中而安者概可徵矣若夫胎熱而不安者或煩熱渴燥或漏血溺血或信用暖補之藥反受其害動而不安須用清熱養血可也此虛實寒熱之各異如此但有因母病而胎動者治其母病而胎自安有因胎動而及母病者當安其胎則母病自愈矣凡胎動而輕轉動不安或微見血察其不甚者速用安胎飲安之若腹痛腰痠下墜勢若難留者用佛手散胎未損服之可安已損服之可下下後隨證調補之醫者當細心詳審圓機活法以施治庶得保全八九若漫執一偏之見虛其虛而實其實豈非欲留而反驅之其能無慚於衾影耶考之保産內有云妊娠受胎兩三個月胎動不安蓋由子宮久虛血海虛羸多令胎墮其危同於風燭非正産可比若妊娠曾受此苦可急用杜仲丸預服以保胎元余常遵丹溪先生定安胎飲諸方治孕婦虛弱胎氣不安飲食不美常多小産或腹痛腰痠疼痛等證甚效又曾用黑白安胎散一方以救貧乏之人每治胎動奇驗今再擇備用諸方加減用法於後便於隨證去取耳丹溪安胎飲治孕成後胎氣不安腰腹作痛飲食不美孕至五六月後並宜服之人參一錢白朮土炒當歸酒洗熟地各二錢川芎條芩各八分砂仁三分帶殼陳皮紫蘇炙草各四分引加薑一片棗二枚水煎服一方無砂仁有炒白芍加味安胎飲治孕婦元氣不足或胎動不安或身熱食減並皆治之人參當歸身酒洗熟地各二錢麥冬一錢去心如煩渴加用條芩八分白朮一錢五分土炒陳皮紫蘇炙草各四分不用引水煎服加減安胎飲治孕婦腹中作痛小腹重墜血虛氣陷之證人參一錢五分熟地白朮土炒當歸身酒洗各二錢川芎八分紫蘇陳皮炙草各四分薑一片水煎服寒加吳茱萸一錢砂仁乾薑各五分安胎萬全飲如脾胃氣弱不能管束其胎血弱不能滋養其胎不以日月多少而常墮者此湯主之更兼服杜仲丸胡連丸佳人參白朮土炒當歸身酒洗生地條芩微炒陳皮白芍藥酒炒各一錢砂仁帶殼捶碎炙草各五分薑三片棗二枚水煎服杜仲丸附千金保孕丸治胎動不安腰痠疼痛須防墮胎宜服此丸與胡連丸同日服更妙早空心服杜仲丸晚食前服胡連丸杜仲薑汁炒去絲川續斷肉酒洗各二錢共為末煮棗肉杵和為丸梧子大每服三十丸米飲下保孕丸內杜仲再加二兩用糯米炒去絲以山藥糊丸治妊婦腰背痛苦於小産胡連丸安胎聖藥與杜仲丸同日服條芩四兩沉水者白朮土炒蓮肉去心各二兩砂仁微炒炙草各一兩共為末山藥五兩作糊為丸如緑豆大米飲下五十丸黑白安胎散治胎動不安白朮土炒懷熟地黃九蒸九曬各一兩水煎服此方妙在用白朮以利腰臍熟地以固根本藥品少而用專所以取效神也白朮用五錢亦可加味四物湯治因房事過度觸動胎氣不安者歸身酒洗熟地阿膠蛤粉炒珠各一錢砂仁炒炙草各五分竹茹一團水煎調男子裩襠灰一錢服更禁房事四物湯治七情觸動胎氣不安者以四物為主按證加入各藥生地酒浸歸身酒洗白芍藥酒炒各一錢川芎八分此四物湯本方薑棗引水煎食前溫服如因怒傷肝者加炒黃芩一錢五分人參柴胡甘草各一錢因憂悲傷肺者加炒黃芩炒阿膠蘇葉各一錢五味子十三粒炙草五分因恐傷腎者加制續斷炒黃柏炒杜仲各一錢五味子十五粒改生地為熟地因思慮積久不解傷脾者加土炒白朮一錢五分人參陳皮制香附各一錢炙草五分因喜樂太過傷心者加條芩黃連土炒白朮去心麥冬各一錢炙草五分因跌僕觸動者安胎飲主之歸身炒白芍各一錢土炒白朮黃芩蘇葉各一錢五分炙草砂仁各五分芩術安胎飲妊娠安胎主方加減法開後白朮米泔水浸一宿去蘆切片曬乾黃土炒香如脾脈虛弱細軟緩大無力外證飲食少進噁心嘔吐泄瀉等證用一錢五分或二錢若氣體強壯或氣鬱壅滯胸腹膨悶脹滿作痛或素有奔豚積聚上攻者忌用條芩如脈洪盛有力素多內熱用一錢五分或二錢如氣體虛寒脾肺脈弱嘔噦泄瀉者忌用當歸身酒洗一錢五分或二錢如嗽有痰喘嘔噦泄瀉者忌用如止有泄瀉而無別證以黃土炒用帶殼砂仁微炒五分或七分內熱者三四分生知母一錢素多內熱者或用一錢五分或二錢如氣體虛寒嘔噦泄瀉者忌用炙甘草三分或四分以上各稱準水煎食遠服如脈弱虛細或緩大無力飲食減少口不知味溏薄泄瀉者加人參一錢或一錢五分炒白朮一錢或一錢五分或二錢白茯苓一錢廣皮七八分炒條芩一錢去知母如血虛內熱肝腎脈洪數無力腰疼腿膝痠軟無力者加熟地三五錢或七八錢生地二三錢酒洗芍藥一錢或一錢五分炒杜仲酒洗當歸一錢或一錢五分炒續斷一錢如肝腎脈虛細濡弱腰疼腿膝麻木冷痛加熟地三五錢或七八錢川芎八分制續斷肉一錢鹽水炒杜仲一錢五分酒洗歸身一錢五分或二錢去知母如胸腹脹悶加麩炒枳殼七分制大腹皮八分醋製香附米七分如素多鬱怒加蘇梗八分或一錢醋製香附米八分或一錢小柴胡七八分酒洗撫芎七分如嘔噦加藿香八分或一錢竹茹六七分制透半夏八分陳皮八分帶殼砂仁四五分煨薑三片去知母胃寒嘔噦去條芩知母竹茹加制去黃水吳茱萸三分如虛煩加去心麥冬一錢竹茹七分咳嗽加去心麥冬一錢蜜炙桑白皮八分或一錢去皮尖杏仁八分前胡一錢麩炒枳殼八分如小便淋瀝不通加車前子一錢赤苓一錢木通七分甚者加滑石一錢五分或二錢如胎動下血倍加生知母紋銀一小錠忌鐵器紫蘇飲治妊娠臨月浮腫喘脹並子懸證胎不安上㽱作痛或臨産氣結不下等證當歸酒洗紫蘇川芎芍藥酒炒陳皮大腹皮黑豆水煮制淨各一錢人參炙草各五分引加生薑三五片蔥白七寸水煎服一方有香附無人參若肝脾氣血虛而有火不安宜兼逍遙散若脾氣虛弱不安宜用四君芎歸感冒風寒去腹皮加香豉胎動不安加炒黃芩土炒白朮胎不運動加木香砂仁肥盛氣滯加製半夏製厚朴虛羸少氣加土炒白朮倍人參保胎神效丸方白茯苓二兩條芩揀實心細條酒拌炒白朮米泔浸一宿去皮切片曬乾同黃土炒香附米童便浸二日炒熟延胡索陳米醋拌炒紅花隔紙烘燥益母草淨葉各一兩沒藥三錢用新瓦上隔火焙去油上各制度為末蜜丸桐子大每日空心白湯服七丸前藥不可因其丸小加至七丸之外凡孕婦胎不安者一日可服四五次安則照常如遇腹痛腰痠或作脹墜宜即服之如受胎三五月常墮者須先一月制服能保足月甚至見紅將墮者急服此丸亦能保留謹戒惱怒勞力忌食煎炒椒辣發氣閉氣糟味冷水冷物切忌房勞每藥一料可保數胎佛手散見本卷諸痛門惡阻論惡阻者謂有胎氣噁心阻其飲食也妊娠稟受怯弱中脘宿有痰飲便有阻病其證顏色如故脈息平和但覺多臥少起肢體沉重頭目昏眩惡聞食氣喜啖酸鹹或嗜一物或大吐或時吐痰與清水甚者或作寒熱心中憒悶嘔吐痰水胸膈煩滿恍惚不能支持此皆胃氣弱而兼痰與氣滯者也亦有素本不虛而一受胎孕則衝任上壅氣不下行故嘔逆者又有由經血既閉水漬於臟臟氣不宣通故心煩憒悶氣逆而嘔吐及三月餘而嘔吐漸止蓋三月相火化胎之候未能上食於母血氣未用五味不化中氣壅實其為鬱滯痰火穢惡之氣盡衝於胃所以有惡阻等證及三月後胎元漸大則臟氣僅供胎氣不有鬱滯自無暇上逆矣亦有不拘強弱間有不病者何也凡婦人無病不分強弱俱能受孕懷子病月不在形之強弱在於臟腑虛實如中宮氣健胃中宿無痰飲清濁自能升降不令穢氣上壅自無惡阻等證即俗謂胎氣好也又婦人懷子喜食酸鹹果實為何蓋陰陽交合受胎於腎生化於肝二臟皆供給於胎則肝腎不足故喜食酸鹹以自救也以上諸證輕者不須服藥乃常病也重者須少藥調之宜用加味參橘飲考之古人有用半夏茯苓湯茯苓丸專治惡阻又有用白朮散人參丁香散人參橘皮湯醒脾飲其中不用半夏恐胎初結半夏性能動胎慮其辛燥易散但惡阻又非半夏不止須薑汁炒以制其毒故仲景用人參半夏乾薑丸羅謙甫用半夏茯苓湯朱丹溪謂肥人多痰瘦人多火用二陳加減治胎前惡阻痰逆嘔吐心煩頭眩惡食俱效經云有故無殞是也立齋云半夏乃健脾氣化痰滯主藥脾胃虛弱嘔吐或痰涎壅滯飲食少胎不安必用半夏茯苓湯倍加白朮安胎健脾常用甚驗也惡阻兼腰痛者防胎墮下猶宜二陳四物加條芩白朮和中理脾為主不可升舉蓋嘔逆氣已上升再用升藥則犯有升無降上更實而下更虛益促其墮矣再若左脈弱而嘔服諸藥不止者當服理血歸原藥則愈經云無陰則嘔是也後選備諸方用者擇取可耳加味參橘飲治孕成兩三月後惡阻嘔逆惡食或頭眩暈倦怠者人參一錢歸身酒洗白朮土炒各二錢半夏八分制橘紅藿香炙草各四分砂仁三分碎竹茹一團加薑一片水煎服肥人加竹瀝一盞薑汁一匙止嘔安胎飲治孕婦嘔吐百藥不效服此即愈人參青皮麩炒各五分廣皮半夏制白茯苓各八分吳茱萸湯泡去黃水微炒炙草各三分加煨薑三片水煎徐徐溫服歸原散治妊娠惡阻嘔吐不止頭痛全不入食服諸藥不止者人參川芎歸身白芍丁香炙草各五錢茯苓白朮土炒陳皮各一兩五錢半夏一兩制桔梗炒枳殼麩炒各二錢五分共為細末引用薑五片棗一枚水煎調每服三錢方內丁香不若易以砂仁或豆蔻為穩如果胃寒之甚用者亦詳慎之自此以下諸方出自濟陰綱目擇録以備採用參橘散治妊娠惡阻吐逆痰水不食心虛煩悶人參橘皮去白茯苓麥冬去心白朮土炒厚朴薑汁製各一錢炙草五分竹茹一團引加生薑三片水煎服青竹茹湯治妊娠惡阻嘔吐不食此方清而不寒竹茹彈子大一團橘皮白茯苓各一錢五分半夏制生薑各二錢水煎溫服忌羊肉雞魚麵食全書加梗米一撮橘皮湯治妊娠嘔吐不下食人參竹茹橘皮白朮土炒各二錢生薑一錢厚朴一錢五分制水煎服惡阻惡食責之脾虛嘔吐責之有火所謂諸逆衝上皆屬於火也此方竹茹能平少火厚朴能下逆氣橘皮生薑所以開胃人參白朮所以益脾開胃益脾欲其安穀云爾二香散治妊娠胎動不安氣不升降嘔吐酸水起坐覺重香附子一兩制藿香葉甘草各二錢上為細末每服二錢不拘時沸湯調下保生湯治妊娠惡阻少食嘔吐或兼吐瀉作渴人參一錢白朮土炒香附制橘紅烏梅一方作烏藥炙草各五分加生薑水煎服覺噁心嘔吐加丁香豫謂不若易砂仁七粒為穩吐瀉作渴則效在烏梅矣作烏藥者非半夏茯苓湯治妊娠惡阻嘔吐心煩頭目眩暈惡聞食氣好食酸鹹多臥少起百節煩痛羸瘦有痰胎孕不牢人參白朮土炒茯苓陳皮各一錢熟地胸滿者去之旋覆花無痰涎不用桔梗半夏湯泡七次薑汁炒黃白芍酒炒川芎炙草各五分加生薑三片水煎空心服千金方無旋覆花有紫蘇葉細辛有熱加炒黃芩有客熱煩渴口瘡去橘皮細辛加前胡酒炒知母七分若腹冷下利去地黃加炒桂心五分桂心炒用即不墮胎然非真腹冷下利者不宜若氣逆作脹者加麩炒枳殼蘇梗制香附小和中飲治妊婦胎氣滯滿飲食停滯作脹陳皮茯苓厚朴薑汁製各一錢五分山楂扁豆炒各二錢炙草五分水一鍾半加生薑三五片煎服如嘔者加製半夏一二錢如脹滿氣不順者加砂仁七八分如火鬱於上者加焦梔子一二錢如婦人氣逆血滯者加紫蘇梗制香附之屬以下二方出全書新方録之以備採擇六味異功煎治妊婦胃虛兼寒多嘔者人參二三錢白朮土炒茯苓各二錢乾薑一二錢炒黃陳皮炙草各一錢水一鍾半煎服理陰煎附附子理陰煎六味回陽飲治妊婦肝腎陽虛作嘔者此理中湯之變方也熟地三五七錢或一二兩當歸二三錢或五七錢乾薑一二三錢炒黃炙草一二錢水二鍾煎七八分熱服治雜證此方內或加肉桂一二錢加製附子即名附子理陰煎再加人參即名六味回陽飲治命門火衰陰中無陽等證良方半夏茯苓湯治妊娠脾胃虛弱飲食不化嘔吐不止半夏湯泡七次薑汁炒黃陳皮砂仁炒各一錢茯苓二錢炙草五分上用薑棗烏梅水煎服有煎服一二劑後用茯苓丸茯苓丸治妊娠煩悶頭暈聞食吐逆或胸腹痞悶人參赤茯苓桂心橘紅半夏湯泡七次薑汁炒黃乾薑炮各一兩白朮土炒枳殼麩炒炙草各二兩上為末煉蜜丸梧子大每服五十丸米飲空心下日三服必脈遲證寒方用薑桂用者宜詳審之上原方有葛根二兩似非所宜故不開入方中一方加去心麥冬肘後方加北五味子苦柚單方治妊婦惡阻嘔吐不食頭暈不敢行步苦柚皮不拘多少上一味濃煎湯飲數盞即愈吐甚者加薑汁胞漏並小産論凡妊娠經水壅之以養胎蓄之以為乳其衝任氣虛不能約制故月水時下名曰胞漏血儘子死然亦有妊婦血盛月信常來而胎不動俗呼狗兒胎也若以漏胎治之則胎必墮若不以漏胎治之其胎未必墮亦有脈見滑數而別無風熱病經脈如常但較前略少此因胎小血盛有餘而然俟遲至三四月外兒大能飲經脈自止今常見懷胎七八月而生子者人但以血止為度謂之不足月然其受胎於未止之前至此而足月人實不知也又有壯盛孕婦按月去血點滴若無腰痠胎動不須服藥此血氣強盛孕至四五月後自然經止如孕婦虛羸腰常痠痛並胎動而按月下血點滴或下血不止此非血有餘乃胎漏也宜服加味補中安胎飲又云胎漏多因於血熱然亦有氣虛血少服涼藥而下血益甚食少體倦者此脾氣虛而不能攝血也宜歸脾等方加減當以脈候察之凡墮胎之病多在三五七月如前次三月曾墮後必如期乘其所虛而亦墮必預服尊生安胎飲或胎元飲加減用之或泰山磐石散安胎萬全神應散等方對證擇用以預防之須常服過七月可無患矣更宜戒房欲氣惱勞役爆炙諸食又有受孕一月即墮者人皆不覺止知其為按月經行不知暗墮於中矣凡人經盡初交得孕後最宜將息絶欲若再交接以擾子宮其胎或一月三五月必墮試思驢馬有孕牡者近則踢之名曰護胎所以絶無小産之患人可不慎歟至若勞怒舉重亦墮洗下體則竅開亦墮今之無子者大半一月墮胎非盡不受孕也至於頓僕傷動胎氣宜服膠艾安胎散三四月前胎未成形名曰墮胎至五六月後胎已成形名曰半産俗人均曰小産總屬妊婦氣血虛弱胎元不固蓋氣虛則提攝不固血弱則灌溉不周多致小産況婦人腎以系胞而腰為腎之府腰痛則墮不可不防凡治胎漏者當預培其根宜用千金保孕丸又有止漏絶神丹治漏胎甚效大凡孕婦暴下水者其胎必墮若徐徐下水可用補氣安胎藥治之有胎漏黃漿或如豆汁胎動腹痛乃肝脾濕熱用升陽除濕湯大全治用黃耆一兩川芎一錢糯米一合煎服要知小産與大産不同大産如果熟自脫小産如生採之破其皮殼斷其根蒂忽略成病者不少因而致死者恆多然此證始因斂血以成胎繼因精血以長養終因精血不足而萎墮故瘀血甚少倘有腹痛成塊有形多屬血虛氣逆惟有先用生化湯去瘀生新為妙後須大加溫補若但知消瘀破滯則逆氣愈攻而愈升多致不救戒之戒之妊婦三月後尺脈或澀或微弱胎必不固惟脈洪盛者胎不墮耳所以脈訣內云胎脈弦牢滑利安沉細而微歸泉路正此之謂也雖半産皆氣血不足然有稟質偏陰偏陽或寒或熱之異自當憑脈調治如陰虛內熱而用艾附白朮砂仁溫暖之劑則陰道愈消如草木之無雨露自然枯萎如陽虛內寒而用芩芍涼血之劑則脾胃虛寒氣血亦弱猶果實春夏易生秋冬少結也總之三月以前宜養脾胃四月以後宜壯腰腎補血順氣佐以清熱此大法也加味補中安胎飲凡孕婦元氣壯盛受胎後尚有經來幾點乃血氣盛故耳若不腰痛腿痠不必服藥如虛羸孕婦下血不止或按月去血點滴名曰胎漏多因勞而氣血兩虛或喜食爆炙熱物過多而致宜謹房事並服補藥以保全也人參一錢白朮土炒當歸酒洗各二錢川芎黃芩各八分紫蘇陳皮砂仁碎炙草各四分薑一片水煎服渣再煎歸脾湯附加味歸脾湯濟生歸脾湯治心脾鬱結經閉發熱並治脾虛不能攝血致血妄行及經帶胎漏等證由於勞傷心脾發熱體倦食少不眠怔忡驚悸等證人參白朮土炒茯神棗仁炒龍眼肉各二錢黃耆一錢五分炙歸身酒洗遠志肉甘草水制各一錢木香炙草各五分薑棗引水煎服加柴胡梔子名加味歸脾湯柴胡易丹皮名濟生歸脾湯尊生安胎飲治血虛有火曾三個月墮胎宜服此方並預防五月七月之墮亦治胎動胎漏歸身酒洗白芍酒炒熟地生地砂仁阿膠炒珠各一錢杜仲鹽水炒去絲白朮土炒各二錢條芩一錢五分續斷肉八分酒製川芎陳皮蘇梗各五分水煎服見血加炒地榆炒薄黃各一錢腹痛或下墜砂仁白芍熟地倍加分兩服之用棗肉為丸服亦可景嶽胎元飲治婦人衝任失守胎元不安不固隨證加減或間日或二三日服一二劑人參隨宜當歸酒洗杜仲鹽水炒斷絲白芍酒炒各二錢熟地二三錢白朮一錢五分土炒陳皮七分無滯者不必用炙草一錢水二鍾煎七分食遠服如下元不固而多遺濁者加炒山藥炒補骨脂五味之類如氣分虛甚者倍白朮加炙黃耆但耆術氣浮能滯胃口倘胸膈有飽悶不快者須甚用之如虛而兼寒多嘔者加炮薑七八分或一二錢如虛而兼熱者加酒炒黃芩一錢五分或加生地二錢去杜仲如陰虛小腹作痛加枸杞二錢如多怒氣逆者加制香附無妨或砂仁亦妙如有所觸而動血者加制續斷肉炒阿膠各一二錢如嘔吐不止加製半夏一二錢生薑三五片泰山磐石散治婦人血氣兩虛或肥而不實或瘦而血熱或肝脾素虛倦怠少食屢有墮胎之患此方平和兼養脾胃氣血覺有熱者倍黃芩少用砂仁覺胃弱者多用砂仁少加黃芩更宜戒欲事惱怒遠酒醋辛熱之物可永保無墮人參黃耆蜜炙當歸酒洗川續斷制黃芩各一錢白朮二錢土炒川芎白芍酒炒熟地各八分砂仁炙草各五分糯米一撮水一鍾半煎七分食遠服但覺有孕三五日常用一服四月之後方無虞也如傷五七月胎即服過七月之後方妙徐東皋曰婦人凡懷胎二三個月慣要墮落名曰小産此由體虛氣血兩弱臟腑火多血分受熱而然醫家又謂安胎宜用艾附砂仁熱補猶增禍患而速其墮矣殊不知血氣清和無火煎爍則胎自安而固氣虛則提不住血熱則溢妄行欲其不墮得乎香附雖云快氣開鬱多用則損正氣砂仁快脾氣多用亦耗正氣況香燥之品性傷氣血求以安胎適又損胎而反墮也今惟泰山磐石散千金保孕丸二方能奪化工之妙百發百效萬無一失故表出以為好生君子共知也安胎萬全神應散治孕婦三月前後或經惱怒或行走失足跌損傷胎腹痛腰脹一服即安雖見血一二日未離宮者加一劑自安倘先三四五月內已經半産過者將及前月份略覺腰骨酸脹忙服一劑即安萬全祕傳驗過多人當歸酒洗白朮土炒條芩酒炒各一錢熟地八分薑汁再浸白芍炒杜仲鹽水炒去絲阿膠蛤粉炒成珠茯苓嫩黃耆蜜炙各七分川芎六分砂仁五分連殼碎炙草三分酒水各一碗煎八分空心服如急痛將銅鍋煎一鍾即服立止胸前作脹加紫蘇陳皮各六分白帶或紅多加蒲黃炒阿膠炒地榆各一錢艾葉七分見紅加制續斷肉一錢糯米一百粒鳳衣散治三五七月小産用頭生雞子抱出小雞之蛋殼陰陽瓦焙黃研末如前次小産在何月份至時預先以無灰酒沖服可免小産苧根湯治孕婦受胎數月後胎動漏胎及子懸證野苧麻根孕一月用一寸加金銀煎湯服之立安膠艾安胎散治孕婦頓撲動胎下血不止人參條芩阿膠蛤粉炒成珠各一錢白朮一錢五分土炒當歸酒洗熟地各二錢川芎艾葉各八分陳皮紫蘇炙草各四分薑一片大棗二枚水煎服增損八物湯治妊娠漏胎氣血兩虛胎中有熱下元不固者人參白朮土炒歸身酒洗白芍熟地艾葉條芩黃柏知母阿膠蒲黃炒成珠去蒲黃不用炙草各等分薑棗引水煎食遠服兼用杜仲丸止漏絶神丹治胎漏下血安胎更妙白朮五錢土炒熟地一兩三七根末三錢水煎服此方妙在三七末乃止血神品故用之奏效千金保孕丸見本卷安胎門附杜仲丸下生化湯見下卷生化湯論後諸痛論附孕癰妊娠頭痛多因血虛有火用四物湯加減若宿有偏正頭風宜川芎茶調散若外感頭痛加味芎歸湯妊娠心腹痛或宿有冷痞痰飲結聚或新觸風寒邪正相擊並於氣隨氣上下上衝於心則病心痛下擊於腹則病腹痛痛不已則胎動不安如傷心真心痛則旦發夕死夕發旦死如傷心支絡則乍安乍作醫通用正氣散加減尊生治心痛用定痛延胡散醫通又曰胸腹膨滿按之而痛乃飲食停滯用人參養胃湯按之不痛乃脾胃受傷以六君補之腹中滿痛叉心不得飲食千金芩術芍藥湯如不時腹痛名曰胎痛有血虛有氣滯二因然血虛居多用熟地三錢當歸一錢煎湯治之不應加參朮陳皮丹溪用四物去川芎倍加熟地醫通用四物加香附為末紫蘇湯下若氣滯者紫蘇飲治之若痛而重墜因中氣虛陷用補中益氣湯如胃口痛多因脾虛存食不消宜養胃消食綱目用平胃散加枳殼山楂豫謂平胃散恐致損胎非所宜也宜養胃湯加減妊娠脅痛有因哭泣因內傷因惱怒不宜破氣宜用童便和酒服之或紫蘇飲去參用白芍當歸加砂仁童便妊娠臍下冷痛腹脹虛疼小便頻數大便虛滑皆食生冷所致小建中加炮薑木香不應更加茴香良薑妊娠少腹痛虛熱紫蘇飲虛寒膠艾湯若小腹近下處腫脹浮薄發光者孕癰也千金托裡散或薏苡仁煎汁飲若心腹急痛煩悶面青冷汗氣絶血下不止其胎上衝者不可治也妊娠腰痛有腎虛作痛則脈大而痛不已急服八珍加膠艾黃耆或紫蘇飲加減有勞力任重致傷胞系欲脫宜安胎飲加杜續有房事不節致傷胞系用熟地當歸阿膠砂仁竹茹炙草調男子裩襠灰一錢服禁房事百日要緊有濕熱脈緩遇天陰或久坐而痛多下白物二妙散加柴胡防風茯苓半夏有寒濕腰重如帶物而冷者用紫蘇飲加減易健脾溫燥藥有氣血凝滯脈澀而日輕夜重不得臥遍身拘急不舒而痛眼生黑花紫蘇飲加枳殼桔梗有膀胱風邪頸項強直用獨活寄生湯有閃挫脈實膠艾芎歸湯或佛手散或熬枯黑糖沖童便酒調服有因毒藥者宜阿膠散或捷徑方或三物解毒湯選用有走注痛敗血入經之證四烏湯加薄桂杜續有臨産腰痛如脫腎者乃將産也勿作尋常腰痛論産下即平復矣不必用藥治也妊娠背脊痛氣滯也紫蘇飲治之妊娠腰腹及背痛夫腎主腰勞損經虛風冷乘之則腰痛乘虛入腹則腹痛故腰腹相引而痛痛不止恐墜胎又有勞傷腰腹背痛補中益氣加杜續然多有因病淋證而痛者宜體察之止用加味導赤湯治淋淋止痛除如勞傷元氣八珍加杜仲砂仁膠艾如脾腎不足再加白朮補骨脂如傷外邪獨活寄生湯若氣血鬱滯紫蘇飲加枳桔如肝虛有火小柴胡加白朮枳殼山梔如肝脾鬱結歸脾湯加柴胡枳殼妊娠環跳穴痛屬腎虛宜六味地黃湯加杜續或千金保孕丸妊娠目赤痛咽喉痛口鼻唇舌瘡痛俱用涼膈散加減妊娠負重跌僕凝血作痛欲服活血藥則恐傷胎不服則所傷之血留而不去治之者當先辨胎之死生如無別證只用黑糖熬枯入陳酒童便調服細嚼連皮胡桃過口死者當下生者其痛即止若因怒跌僕或手足抽搐者紫蘇飲加鉤藤鉤倘去血過多八珍湯去茯苓加阿膠艾葉黃耆如跌僕余傷未盡痛未止用四烏湯加延胡木香如傷去而胎氣未安紫蘇飲加童便砂仁如傷重者香殼散加熟地當歸以護胎若勢劇者下瘀血湯加芎歸酒煎以去血則胎自安此藥峻厲必須詳慎若昏睡語言如狂此血迫心包當歸活血湯如腹中重墜按之冰冷此胎氣已傷急用香桂散加酒大黃生附子下之若口中覺穢氣者急用平胃散加芒硝下逐之豫謂下胎莫妙佛手散即香桂散亦能下胎又何用大黃附子以助之然以上四烏香殼下瘀當歸活血香桂平胃等方不可輕用少可得已只用熬枯黑糖酒便調服為妥或嚼連皮胡桃助之諸方録後以備參考可耳慎勿輕視佛手香桂而妄用猛峻傷生妊娠遍身痛或衝心欲死不能飲食緣胎有水致痛也用白朮五錢黃芩二錢白芍四錢入活鯉魚約重半斤外一尾煮湯代水煎服此即胎水證當入本門因有遍身痛證故移録於此以備採取治痛也川芎茶調散治久風化火頭痛及偏正頭風川芎白芷羌活防風荊芥薄荷炙草各一兩香附二兩童便浸炒為散食後茶清調服二錢日三服婦人産後豆淋酒服輕者三服重者五七服效加味芎歸湯因虛外感頭痛服此川芎當歸各一錢五分條芩酒炒白朮土炒各一錢細芽茶二錢水煎食後服藿香正氣散治孕婦心腹痛多寒多食加減用之白朮土炒厚朴去皮薑汁製陳皮去白藿香紫蘇半夏制茯苓白芷桔梗炙草大腹皮古方無大腹皮有蒼朮薑棗引水煎服寒加木香炮薑食積發熱加芩連炮薑氣加砂仁香附痰加橘紅生薑尊生定痛延胡散延胡三錢醋炒乳香五分歸身炙草各一錢水煎加鹽滷一滴人參養胃湯治食滯痞滿人參蒼朮米泔水浸去皮麻油拌炒黃色陳皮去白藿香半夏制厚朴去皮薑汁炒茯苓草果炙草薑棗烏梅引水煎服六君子湯治胃虛少食痰嗽嘔泄人參白朮土炒黃茯苓橘皮半夏制炙草生薑引水煎服千金芩術芍藥湯治妊娠腹中滿痛叉手不得飲食白朮六錢土炒黃芩二錢白芍四錢上三味水煎分三服半日令盡微下水則易産日飲一劑為善補中益氣湯治煩勞內傷脈洪大而虛喘渴陽虛自汗懶言惡食氣虛不能攝血一切清陽下陷中氣不足之證人參一錢黃耆一錢五分蜜炙白朮土炒陳皮當歸各五分升麻柴胡各三分炙草八分薑三片棗二枚水煎服平胃散治胃中宿食不化藜藿之人宜之蒼朮四兩米泔水浸去皮芝麻油拌炒黃色厚朴去皮薑汁製陳皮水泡去白炙草各三兩上四味為散每服四五錢加生薑三片水煎溫服膠艾湯治婦人漏下或半産後下血不絶或妊娠下血腹痛亦治損傷衝任月水過多淋漓不斷乾地黃二錢芍藥一錢五分阿膠蒲黃炒成珠艾葉當歸各一錢川芎甘草各八分水煎服千金托裡散治氣血虛寒潰瘍不收人參黃耆炙川芎當歸肉桂白芷防風桔梗白芍天冬去心連翹去心忍冬炙草生薑引水煎服八珍湯氣血雙補之藥人參白朮土炒茯苓熟地歸身酒洗川芎白芍炒炙草水煎服二妙散治身半以下濕熱疼重而腫厚黃柏薑汁製數次蒼朮茅山者佳去皮切片麻油拌炒黃色等分為散薑汁調每日空心溫酒送二錢獨活寄生湯治風痹腰腳疼重並治産後腹痛不得轉動及腰腳攣痛不得屈伸痹弱者宜服此湯去細辛治産後足膝腫或痛人參歸身白芍川芎熟地桑寄生杜仲炒斷絲牛膝蒸細辛秦艽茯苓桂心防風各六分獨活九分甘草三分薑煎服古今録驗無寄生有續斷因續斷亦可代寄生肘後無寄生人參甘草當歸有附子膠艾芎歸湯治妊娠二三月上至八九月頓僕跌傷胎動不安腰腹疼痛欲死已有所下阿膠蛤粉或蒲黃炒珠川芎當歸乾地黃艾葉水煎服一方有甘草無地黃佛手散一名芎歸湯一名當歸湯治妊娠因事築磕胎動不安或子死腹中惡露不下疼痛不已用此藥探之若不損則痛止子母俱安若胎損立下此方催生甚妙當歸三錢或五錢去蘆酒浸川芎二錢先用酒一鍾煎乾再入水一鍾煎二三沸溫服若用下胎當為末以酒調服丹溪治胎死不下並催生用當歸一兩川芎七錢酒水煎服阿膠散治妊娠或因傾僕或因毒藥胎動不安腰腹疼痛或有所下阿膠蛤粉炒成珠艾葉炒歸身酒浸川芎白芍熟地黃耆蜜炙炙草生薑五片棗三枚水煎空心服捷徑方又名白扁豆散治妊娠誤服諸般毒藥毒物及用毒藥攻胎藥毒衝心外證牙關緊急口不能言兩手強直握拳頭低自汗身微熱外證與中風相似但其脈浮而軟十死一生醫多不識若作中風治必死無疑白扁豆二兩生用去皮為細末新汲水調下即效或米飲調服或濃煎服亦可三物解毒湯治誤服毒藥動胎甘草黑豆淡竹葉各等分用水煎濃服四烏湯治血中氣滯小腹急痛熟地當歸酒洗各二錢川芎八分白芍一錢五分酒炒烏藥六分香附七分制炙草五分水煎服加味導赤湯治孕婦小便少又澀痛者謂之子淋又治溺血人參生地條芩木通甘草梢麥冬去心赤芍各一錢淡竹葉十五片燈心四十九寸水煎空心服小柴胡湯治少陽受邪往來寒熱脈弦脅痛而嘔柴胡三錢黃芩人參炙草各一錢半夏二錢制生薑五片大棗四枚水煎溫服六味地黃湯附六味地黃丸八味地黃丸名金匱腎氣丸加味腎氣丸濟生腎氣丸熟地四錢九蒸九曬丹皮茯苓各一錢五分山萸去核取淨肉山藥各二錢澤瀉一錢水煎服如作丸用熟地八兩丹皮茯苓各三兩山萸山藥各四兩澤瀉一兩古方用三兩煉蜜丸梧子大加肉桂一兩製附子五錢名桂附八味地黃丸又名金匱腎氣丸一方桂附有用各一兩者八味再加牛膝車前各一兩名加味腎氣丸一方肉桂易桂枝蓋因陰氣固結於中勢必分解於外則腎氣得以流布周身之意耳但僅存其方而世人少有從而易之者豫按醫方中又濟生腎氣丸治腎氣不化小便澀數並治産後腳腫或肚腫或成鼓腫乃八味丸本方用茯苓三兩熟地四兩山藥山萸丹皮澤瀉肉桂各一兩附子五錢加牛膝車前各一兩此本金匱腎氣方中諸藥各減過半惟桂苓二味仍照原方為宣布五陽開發陰邪之專藥更加牛膝車前為太陽厥陰之嚮導以肝為風木之臟凡走是經之藥性皆上升獨牛膝通津利竅下走至陰車前雖行津液之腑而不傷犯正氣既用牛膝引入至陰又須桂附蒸動三焦不特決瀆有權膀胱亦得以化所以倍用肉桂暗藏桂苓丸之妙用愈於五苓十倍矣但方中牛膝滑精精氣不固者勿用産後精氣本自不固用者審之故雜證小便不通濟生腎氣丸為善也今世人所用腎氣丸分兩多從此再考後人不分八味加味濟生分兩懸殊統以金匱腎氣名之殊覺混人今特拈出東垣涼膈散孕婦有病熱如目赤口舌瘡之類各隨其證加減用之黃芩酒炒黃連酒炒山梔仁酒炒連翹去心桔梗生草各等分薄荷葉少許目赤痛者本方加當歸川芎羌活防風菊花各一錢竹葉引咽喉痛者本方加牛蒡子一錢炒杵碎口舌生瘡者只依本方薑引香殼散治蓄血暴起胸脅小腹作痛香附薑汁製歸尾各三錢枳殼二錢麩炒青皮炒陳皮烏藥赤芍蓬朮醋炒各一錢紅花五分生草三分炙草二分共為散每服四錢童便空心溫服以核桃黑糖酒助之如不應加延胡穿山甲有外感風寒加桂枝羌活下瘀血湯治婦人産後腹痛有乾血著臍下大黃一兩酒浸桃仁二十粒去皮尖蟅蟲二十枚熬去足為末煉蜜為四丸以酒一升煎一丸取八合服之血下如豚肝當歸活血湯治挾瘀如見祟狀當歸三錢赤芍酒洗生地酒浸別搗爛桂心各一錢五分桃仁二十粒研茯苓枳殼柴胡各八分炮薑四分紅花二分甘草五分上除生地水煎去渣入地黃再煎數沸加陳酒服之不應加穿山甲五分又不應加附子三分有實熱難用附子者須與大黃錢許同用小建中湯見下卷脫汗亡陽門四物湯紫蘇飲安胎飲千金保孕丸俱見本卷安胎門歸脾湯見本卷胞漏小産門香桂散見本卷子死腹中門胎逆上逼脹滿子懸論妊娠胎逆上逼重則脹滿疼痛謂之子懸紫蘇飲為必用之藥蓋因紫蘇飲為治妊娠胎氣不和濁氣舉胎上湊胎熱氣逆心胃脹滿之證且此證挾氣者居多宜疏氣舒郁非紫蘇腹皮川芎陳皮無以流氣非歸芍無以養血氣血既利而胎自降然邪之所湊其正必虛故以人參甘草補之如飲食不甘加四君子有熱加芩梔歸芍內熱晡熱或四君兼逍遙散若常常多怒時覺脹滿服順氣藥不應宜用和氣安胎飲或加味逍遙散胎上攻而作痛宜紫蘇飲或順氣安胎散若脾虛停滯脹滿安胎飲力薄宜用加參平胃散有因鬱滯者亦宜紫蘇飲或加味歸脾湯有因痰結聚者紫蘇飲加芩連貝母有因暴怒者左關必弦洪肝火內動用小柴胡加茯苓枳殼山梔大抵胎氣上逆皆屬火旺急用芩朮香附之類不可服大寒之藥反致他變豫每治孕婦心胃脹滿用尊生和氣飲甚效子懸證有兩尺脈絶餘脈平和不可錯認死胎且死胎有面青舌青可辨宜紫蘇飲治之則胎歸原位脹消脈起矣如臨月胎上逼心嘔噦欲死急用童便灌之即下或烏梅肉十枚研爛入生薑三片煎湯灌之亦下取酸以降斂之兼辛以散火氣之逆也又有因坐草太早心懷恐懼氣結不行紫蘇飲一服便産後附針灸一方備用四君子湯治胃氣虛弱飲食不思倦怠少食人參一錢至三錢白朮一錢至二錢土炒黃茯苓一錢至錢半炙草六分至一錢水煎服逍遙散附八味逍遙散又名加味逍遙散治血虛肝燥骨蒸勞熱往來寒熱咳嗽潮熱月經不調口乾便澀柴胡當歸酒拌白芍酒炒白朮土炒茯苓各一錢炙草五分加煨薑薄荷引水煎服一方無茯苓薄荷有茯神生薑為引治肝脾血虛鬱怒傷肝血少目暗發熱脅痛等證加丹皮梔子各七分名八味逍遙散又名加味逍遙散治小便帶血或過勞及多食炒炙宜清膀胱之火柴胡當歸加倍白朮加五分和氣安胎飲治孕婦多怒胸中脹滿若用烏藥香附砂仁順氣等藥反加滿悶宜服此飲人參白朮土炒當歸酒洗各二錢川芎條芩各八分陳皮紫蘇炙草各四分木香二分磨汁沖服薑引煎服一方無木香有砂仁四分名順氣安胎散治孕婦胎氣上攻心腹脹滿作痛子懸之證有因氣惱者加木香二分磨沖服加參平胃散治孕婦脾氣虛弱飲食停滯以致腹脹嘔吐安胎飲力緩宜用此散人參白朮土炒各一錢蒼朮米泔浸製厚朴薑製七分陳皮炙草各四分薑一片水煎服尊生和氣飲治孕婦心胃脹滿人參蘇粳白芍酒炒川芎各六分當歸一錢或六分酒洗腹皮五分制淨木香二分磨沖藥服炙草三分水煎服附針灸方妊娠六七個月飲食絶然不進胸膈脹水與藥皆不能下診脈平和又非病脈此乃膈氣不通藥不能治惟針灸可通宜灸內關穴即能進飲食矣其穴在手掌大紋後二寸兩筋間此穴可針亦可灸男左女右重則雙手同灸輕者七壯重加十數壯艾如黍大或如麥大寸取本人同身寸以男左女右手中指屈回用草較所屈中指中節內紋兩頭盡處截斷為準一寸也紫蘇飲見本卷安胎門小柴胡湯見本卷諸痛門加味歸脾湯見本卷小産門附歸脾湯下諸血證論妊娠漏極如同月水胞干胎死母亦難保其調治之方已詳論於胎漏門中茲不重論妊娠吐血凡七情內傷六淫外感皆足致失血之患一主火熱者以氣血壅養胎元或有所感則氣逆而火上乘心煩滿悶血隨而溢甚者或致墮胎但火有虛實之分實火清熱養血虛火滋陰補水則血安胎固若泛用行血清血之劑胎必墮而禍不旋踵矣如肝經怒火加味逍遙散膏粱積熱加味清胃散鬱結傷脾加味歸脾湯肺經有火黃芩清肺飲因氣鬱滯紫蘇飲氣不攝血補中益氣去升麻加煨葛根腎經虛火冬味地黃湯鼻衄不止東垣涼膈散加當歸生地各一錢茅花一大團生薑引咳嗽咳血宜涼血地黃湯醫通云咳嗽咯衄胎前皆不宜見如面赤聲啞不治又云凡咯吐血多致墮胎胎賴血養不宜漏溢宜紫蘇飲加條芩尿血乃熱乘血分流滲於脬故令尿血自尿門而下若胎漏則自人門下血可辨宜四物加山梔發灰或阿膠熟地麥冬五味之類如怒動肝火小柴胡加山梔脾氣下陷及勞動脾火補中益氣加茯苓車前若厚味積熱加味清胃散若肝脾血熱加味逍遙散腸風臟毒下血者平胃散去蒼朮加槐角防風當歸烏梅治之加味清胃散治胃中蘊熱斑疹口舌生瘡齒齦腐爛出血生地四錢丹皮五錢當歸川連酒蒸連翹去心各三錢升麻生草各一錢五分為散分三服水煎去滓沖犀角磨汁三四分入藥服之黃芩清肺飲治渴而小便不利梔子炒黑黃芩各等分煎服豫謂此方乃治雜證發渴而小便不利妙在熱服探吐以提則肺氣立清然胎前血證探吐之法似非所宜若服而不吐不特綿延不能刻應縱或小瘥其苦寒之性留薄於內大傷氤氳之氣治胎前之證者得不為之預慮乎冬味地黃湯附丸方熟地四錢山藥二錢炒山萸一錢古方分兩加倍丹皮茯苓澤瀉各七分麥冬一錢或錢半五味子十粒水煎服此方藥味十倍之煉蜜丸即名冬味地黃丸又名八仙長壽丸涼血地黃湯治妊娠咳嗽吐血咳血生地三錢麥冬去心當歸酒洗各二錢黃芩一錢五分紫菀知母鹽水炒白朮土炒天冬去心各一錢犀角八分陳皮甘草各四分水煎服有喘加栝蔞仁一錢加味逍遙散見本卷子懸門附逍遙散下加味歸脾湯見本卷胎漏小産門附歸脾湯下紫蘇飲四物湯俱見本卷安胎門補中益氣湯東垣涼膈散小柴胡湯平胃散俱見本卷諸痛門子腫子氣子滿論子滿證即俗呼胎水證也妊娠子腫與子氣相類但子氣在下體子腫在頭面若子滿證又名為胎水則在五六月以後比子氣子腫不同蓋胎大則腹滿遍身浮腫凡子氣子腫子滿由臟氣本弱或因泄瀉下利耗傷脾胃或寒熱瘧疾煩渴加飲濕漬脾胃使頭面手足浮腫也然水漬於胞兒未成形則胎多損壞故初妊即腫急宜調治水去脹消仍用六君子調補所謂子腫者妊娠面目虛浮多因脾胃氣虛或久瀉所致宜健脾利水全生白朮散主之或用健脾利水湯如未應用六君子湯或加腹皮車前又專治肢體如水氣之證亦有用加味五皮湯治子腫之甚者所謂子氣者妊娠自三月成胎之後兩足面漸腫至腿膝或腰以下腫行步艱難以致喘悶不寧飲食不美似水氣狀甚至腳趾間有黃水出者蓋脾主四肢脾氣虛弱不能制水而發腫肺金少母氣滋養而氣促滿悶諸書名曰子氣即水氣俗名皺腳治此病者先服加味天仙藤散如不效則服茯苓湯再不效服補中益氣湯加茯苓若飲食失節嘔吐泄瀉六君子湯或加炮薑木香香附若脾肺氣滯加味歸脾湯佐以加味逍遙散或紫蘇飲至孕婦八九個月脛腿俱腫非水氣比不可以水氣治之反傷正氣凡有此者必易産因胞臟中水血俱多不致胎燥也所謂子滿者妊娠至五六個月胸腹急脹腹大異常或遍身浮腫胸脅不分氣逆不安小便艱澀名曰子滿又為胎水不利若不早治生子手足軟短有疾甚至胎死腹中宜服千金鯉魚湯治其水如脾虛不運清濁不分佐以四君五皮亦有用束胎飲以治子滿證甚效曾有妊娠腹脹服鯉魚湯三五劑大小便皆下惡水腫消脹去遂下死胎此證每因懷孕腹大終不知胎水之患即水漬損胎也全生白朮散治妊娠面目虛浮如水腫脹白朮一兩土炒生薑皮大腹皮豆汁制淨茯苓皮陳皮各五錢共為細末每服二錢不拘時米飲調下此方較淡寮五皮散稍善中間惟白朮易桑皮而功用懸殊誠點鐵成金手也全書云如未應佐以人參甘草健脾利水湯治孕婦面目虛浮多因脾胃氣虛或久瀉所致人參茯苓各一錢一方用皮白朮土炒當歸酒洗各二錢川芎大腹皮黑豆水制淨紫蘇陳皮各八分炙草三分薑皮一片水煎服加味五皮湯治孕婦面目身體四肢浮腫者此胎水泛溢謂之子腫淡寮五皮散無白朮有陳皮治病後浮腫小便不利大腹皮黑豆水制淨桑白皮炒生薑皮茯苓皮用赤白朮土炒加紫蘇連莖葉各一錢棗二枚去核水煎服服時以木香磨濃汁三匙入藥內加味天仙藤散治孕婦腰腳腫虛人多有此證天仙藤即青木香藤洗略炒制香附紫蘇各六分陳皮四分烏藥五分木香二分薑皮三片虛人加人參一錢土炒白朮二錢酒洗當歸二錢或兼服補中益氣湯茯苓湯治孕婦六七個月以來兩足腫大行步艱難腳趾間有黃水出此名子氣人多有之生子之後其腫自消甚者此湯主之白茯苓白朮土炒陳皮制香附烏藥各一錢紫蘇連莖葉炙草各五分木瓜三片生薑皮引水煎空心服千金鯉魚湯治孕婦胸腹脹滿或遍身浮腫小便艱澀名曰子滿又為胎水不利或胞中漬水以致胎死腹中白朮五錢土炒白茯苓四錢當歸身三錢酒洗白芍二錢鯉魚一尾重二斤要活的將魚去鱗腸加橘皮少許或五分薑七片用水扣湯煮取汁一盞半去魚入藥四味魚汁內煎七分空心溫服渣再製如前如脾胃氣虛當佐以四君五皮二湯合煎服之局方五皮湯治風濕客脾面目四肢浮腫兼治胎水五加皮地骨皮大腹皮黑豆水制淨茯苓皮生薑皮各等分水煎服每服三錢束胎飲治孕婦至七八個月其胎長大腹大脹滿逼迫子戶坐臥不安謂之子滿白朮土炒黃芩酒炒蘇葉各一錢五分枳殼麩炒大腹皮黑豆水制淨各一錢砂仁五分連殼略炒炙草三分薑三片水煎空心服豫謂蘇葉當易莖妙六君子湯補中益氣湯俱見本卷諸痛門加味歸脾湯見本卷胞漏小産門附歸脾湯下加味逍遙散見本卷子懸門附逍遙散下紫蘇飲見本卷安胎門四君子湯見本卷子懸門子煩並五心煩熱及煩躁口乾論妊娠心驚膽怯煩悶不安名曰子煩竹葉安胎飲主之大抵皆由心肺虛熱是以撩亂心煩或積痰於胸吐涎惡食亦令心煩劇則胎動不安如心肺虛熱或積痰於中千金竹瀝湯若吐甚胎動不安煩悶口乾不得眠又吐涎過多以致外雖不熱而覺五心煩熱或日間不覺而夜覺熱者並宜加味竹葉湯氣虛倍人參氣滯紫蘇飲痰滯二陳加白朮黃芩枳殼脅滿寒熱小柴胡脾胃虛弱六君子加紫蘇山梔至於妊娠煩躁口乾者緣足太陰脾其氣通於口手少陰心其氣通於舌臟腑氣虛熱乘心脾津液枯燥故心煩口乾與子煩大同小異宜用加減參麥湯又有用知母丸而效者如肝經火動加味逍遙散若腎經火動宜地黃丸隨證加味用之如孕婦口乾不臥一味黃連散或用尊生加味安胎飲查方書有婦人暴渴惟飲五味汁之證蓋血欲凝成胎脈息調和非疾病也因肺腎二經有火火入肺則煩入腎則躁胎繫於腎腎水養其胎元則不足以滋腎中之火火上爍肺變為煩躁者金虧水涸之候法當滋化源清金保肺壯水滋腎為主竹葉安胎飲治孕婦心驚膽怯煩悶不安名曰子煩證人參生地棗仁去殼炒研遠志甘草水制去骨各一錢當歸酒洗白朮土炒各二錢麥冬去心條芩川芎各八分陳皮炙草各四分竹葉十四片薑一片大棗二枚水煎服渴加竹茹七分千金竹瀝湯治妊娠子煩竹瀝一盞茯苓四錢麥冬去心防風黃芩各三錢上藥四味以水四升合竹瀝煮取二升分三服不瘥更作此乃古方分兩宜易今法用之加味竹葉湯治妊娠心煩不解名曰子煩並治五心煩熱原方竹葉湯無人參粳米人參黃芩各一錢茯苓一錢五分麥冬二錢五分去心竹葉五片粳米一撮水煎空心熱服肥人加製半夏生薑為引因血虛煩熱宜原方兼用四物湯因中氣虛弱宜原方兼用四君子湯一方照原方加當歸防風炒梔仁亦名加味竹葉湯二陳湯治痰積嘔惡陳皮一錢半夏制茯苓各一錢五分炙草八分水煎服加減參麥湯治孕婦心神煩躁壅熱口乾人參知母麥冬去心梔子炒各一錢栝蔞根犀角磨各八分條芩炙草各五分棗一枚水煎服夏加竹瀝八分薑汁少許知母丸又名一母丸治妊娠因服藥致胎氣不安有似虛煩不得眠巢氏謂之子煩醫者不知作虛煩治之損動胎氣宜矣知母二兩酒焙為細末棗肉丸如彈子大每服一丸煎人參湯化服一味黃連散治孕婦口乾不臥黃連一錢上為末粥飲湯調下或用丹溪安胎飲加麥冬乾葛服之亦妙尊生加味安胎飲治孕婦口乾歸身酒浸白芍炒熟地生地砂仁阿膠蛤粉炒成珠各一錢條芩一錢五分杜仲鹽酒炒斷絲白朮土炒各二錢川芎陳皮蘇梗各五分續斷炒取淨肉麥冬去心乾葛知母酒焙梔子炒黑花粉犀角竹瀝各八分水煎服考尊生安胎飲本方自歸身起至續斷止共藥十三味今此方名加味又自麥冬至竹瀝連前共二十味如嫌藥味過多臨證酌而減之可耳紫蘇飲四物湯丹溪安胎飲俱見本卷安胎門小柴胡湯六君子湯俱見本卷諸痛門加味逍遙散見本卷子懸門附逍遙散下地黃丸見本卷諸痛門附六味地黃湯下四君子湯見本卷胎逆上逼門子淋論妊娠小便淋漓澀少由氣血聚養胎元不及敷榮滲道遂使膀胱鬱熱又云妊娠胞系於腎腎間虛熱移於膀胱而成斯證名曰子淋加減安榮散主之然古方安榮散內有滑石但石乃鎮重之劑恐致墮胎若臨月猶可如在七八月之前宜去此味加石斛山梔為穩若日久倦怠右脈微弱者此氣虛下陷而時墜下氣弱腸虛而難流通大劑參麥飲補氣滋化源其便自易亦有治小便澀少用生料六味丸加麥冬五味車前為丸服之又治孕婦小便少澀痛者加味導赤湯兼治溺血全書云子淋證用安榮散不應兼服八珍湯如腿足轉筋而小便不利急用八味丸緩則不救加減安榮散治孕婦小便短澀或成淋漓人參當歸酒洗各二錢麥冬二錢或三錢去心白朮一錢土炒通草茯苓皮各八分生草五分燈心五分水煎服原方有細辛滑石無白朮茯苓皮如有痰或怒動肝火加酒炒枯黃芩七分以清肺金此方人參補氣當歸調血麥冬清肺以滋腎源通草燈心利便通鬱滯參麥飲見下卷暈厥門附參麥五味飲下六味丸見本卷諸痛門附六味地黃湯下藥料俱生用為之生料加味導赤湯八珍湯俱見本卷諸痛門八味丸見本卷諸痛門附六味地黃湯下豫謂桂附犯胎忌用當是麥冬車前之八味丸也轉胞淋閉論妊娠轉胞乃臍下急痛小便不通凡強忍小便或尿急疾走或飽食忍尿或忍尿入房使水氣上逆氣逼於胞故屈戾不得舒張所致非小腸膀胱受病而利藥所能利也法當治其氣則愈凡婦人稟受弱憂悶多性躁急食厚味者恆有之因胞不自轉為胎所壓胎若舉起胞系自疏水道自通矣用二陳升提飲又有用補中益氣湯服後探吐以提其氣自通通後即用參耆大補恐胎墮也如藥力未至脹痛難忍令老嫗用香油塗手自産戶托起其胎溺自出而脹急解須以大劑參耆補之但子淋與轉胞相類小便頻數點滴而痛者為子淋膀胱小腸虛熱也虛則不能制水熱則不能通利故淋若頻數出少不痛者為轉胞間有微痛終與子淋不同耳論中急痛乃急欲便而痛得便則止間有微痛與子淋點滴痛不同二陳升提飲治孕婦臍腹作痛小便淋閉不通或微痛與淋有別由氣虛胎壓尿胞人參一錢白朮土炒生地各一錢五分當歸二錢川芎八分半夏六分制或油炒柴胡升麻陳皮炙草各四分薑一片水煎服或空心飲鹽湯探吐以升其氣則下自行亦一法也豫謂探吐只可救急偶用還須通後服提補之藥補中益氣湯見本卷諸痛門遺尿論妊娠遺尿不覺胎滿故也用白薇散主之若脬中有熱加味逍遙散脾肺氣虛補中益氣湯加益智仁肝腎陰虛六味丸尊生云遺尿證虛人有此立加減六味湯治之甚效有婦人孕後水從陰戶出不止者千金鯉魚湯加肉桂人參治之白薇散治妊娠尿出不知白薇白芍藥各等分為末每服三錢食前溫酒調服考本草謂芍藥白補赤瀉蓋金收而火散故子淋方中宜用赤而遺尿方中則宜用白也加減六味湯治遺尿虛人多有此證熟地四錢丹皮一錢五分山萸去核淮山藥炒各二錢白薇白芍藥益智仁各一錢不用引水煎服加味逍遙散見本卷子懸門附逍遙散下補中益氣湯見本卷諸痛門六味地黃丸見本卷諸痛門附六味地黃湯下千金鯉魚湯見本卷子腫門子嗽論妊娠咳嗽屬風寒蓋肺臟內主氣外司皮毛皮毛不密寒邪乘之則咳嗽嗽久亦恐墮胎寧肺止嗽散加減用之亦有用蘇桔湯散寒理肺甚有久嗽不愈多因脾土虛而不能生肺氣以致腠理不密外邪復感或因肺虛不能生水以致陰火上炎治法當用補中益氣湯以培土金六味丸加五味以生腎水為善寧肺止嗽散治孕婦風寒咳嗽麥冬二錢去心知母一錢桔梗紫蘇各五分杏仁十粒去皮尖桑白皮六分甘草四分水煎服有痰加橘紅四分竹瀝薑汁火嗽加黃芩八分虛嗽加紫菀一錢款冬花六分寒甚加麻黃虛損加栝蔞一錢竹瀝薑汁嗽而心胸不舒加去心貝母百合各一錢紫菀八分若嗽不止胎不安宜服人參一錢甘草五分去皮尖杏仁十四粒桑皮一錢紫菀一錢二分去心天門冬一錢二分桔梗八分烏梅一個水煎服蘇桔湯治孕婦風寒咳嗽天冬六分去心桔梗一錢五分紫蘇黃芩貝母去心各八分杏仁十粒去皮尖陳皮知母甘草各四分水煎服火動作喘桔梗宜減補中益氣湯見本卷諸痛門六味地黃丸見本卷諸痛門附六味地黃湯下喘急論妊娠氣喘不得臥有因乍感風寒客邪為害者宜發散自愈參蘇飲主之若脾虛四肢無力肺虛不任風寒腎虛腰痠短氣不能行步猝然氣喘不息此脾肺素虧母虛子亦虛腎氣不歸元而上乘於肺也生脈散補中益氣湯去升柴主之丹溪云火動作喘此胎前最多豫謂嗽門蘇桔湯可加減用之獲效至於毒藥傷胎病喘世俗往往有之不可不察昔有一婦胎死於腹病喘不得臥診其脈氣口盛人迎一倍左關絃動而疾兩尺俱短而離經因毒藥動血以致死胎不下奔迫上衝非風寒作喘也大劑芎歸湯加催生藥服之夜半果下死胎而喘止此婦乃為人妾因正室所嫉故用藥去之人所不知也考濟陰綱目內有平安散一方治孕婦喘急録後以備採用耳參蘇飲人參紫蘇乾葛前胡製半夏茯苓陳皮各等分枳殼麩炒桔梗木香甘草各減半薑棗煎平安散治孕婦上氣喘急大便不通嘔吐不食腹脅脹滿川芎木香熟地陳皮炮薑厚朴制甘草各一錢水二鍾入燒鹽一捻煎至一鍾不拘時服生脈散見下卷暈厥門附參麥五味飲下補中益氣湯芎歸湯俱見本卷諸痛門泄瀉論妊娠泄瀉有風寒暑濕之外感飲食生冷之內傷病發一時察其所因如胃風加味理中加味治中四苓不換金正氣胃苓等方對證而治之即愈然又有由脾腎二臟虛者不可不知夫血統於脾血擁胎元則脾陰虛而食不運化脾主健運下焦壅滯而清氣難舒於是水穀難消而作瀉或因胎繫於腎胎竊其氣以擁護而腎氣既弱命門火衰不能上蒸脾土此皆妊娠泄瀉之由也如脾虛內傷用加味六君子湯隨所因而加之命門火衰加益智以助之至於妊娠久瀉元氣下陷發熱作渴肢體倦怠用補中益氣湯密齋治妊娠泄瀉以補中安胎為主用加味四君子湯如久瀉大渴者人參白朮散主之甚效胃風湯治風冷乘虛入客腸胃米穀不下泄瀉注下及腸胃濕毒下如豆汁或下瘀血或下如魚腦日夜無度人參白朮土炒茯苓當歸川芎芍藥炒肉桂各等分入粟米一撮水煎服如腹痛加木香此方治瀉久氣血兩虛誠妙然肉桂非久虛臟冷者斷不可用其曰胃風取其益胃而升舉也方中肉桂犯胎忌用如不得已或炒用或易桂炭如胃苓湯中肉桂亦不可不審用加味理中湯治妊娠臍下陰冷洞瀉人參白朮土炒白芍茯苓乾薑黃連木香藿香葉訶子肉肉豆蔻麵煨甘草各一錢生薑三片大棗二枚水二鍾煎一鍾飢時服加味治中湯治飲食過多脾胃之氣不足運化而作瀉人參白朮土炒炮薑甘草各一錢陳皮青皮各七分砂仁五分水煎服四苓散附五苓散治伏暑煩渴瀉水白朮土炒豬苓澤瀉茯苓各等分為末米飲調下此方加肉桂即五苓散不換金正氣散治妊婦傷濕泄瀉蒼朮制厚朴薑汁製陳皮藿香製半夏各一錢甘草五分薑棗為引水煎服胃苓湯治脾濕太過胃氣不和腹痛泄瀉水穀不化陰陽不分此平胃散與五苓散合方也蒼朮制厚朴薑汁製陳皮白朮土炒茯苓豬苓澤瀉各一錢官桂炙草各五分薑三片棗二枚水煎食遠服方中有桂孕婦忌用或易服不換金正氣散更妥加味六君子湯人參隨宜白朮一錢或一錢五分土炒茯苓一錢陳皮八分製半夏一錢炙草五分生薑引水煎服米食所傷加穀芽麵食所傷加麥芽肉食所傷加山楂如肝木侮土兼寒熱作嘔加柴胡生薑若兼嘔吐腹痛手足逆冷乃寒水侮土加薑桂若泄瀉黃色乃脾土本色加木香煨肉果若作嘔不食腹痛惡寒乃脾土虛寒加木香薑桂密齋加味四君子湯治妊娠泄瀉補中安胎為主人參白朮土炒茯苓各一錢炙草八分水煎服妊娠泄瀉加炒白芍一錢更分寒熱治之如發熱而渴者為熱加條芩一錢不渴者為寒加炒黑乾薑五分並用烏梅一個為引水煎食前服如渴瀉日久不止者加酒炒白芍訶子肉炒乾薑烏梅二個去核水煎食前服或服人參白朮散亦妙人參白朮散治久瀉大渴者人參白朮土炒茯苓炙草各一錢藿香木香乾薑各五分水煎頻頻與之以代湯水效補中益氣湯見本卷諸痛門霍亂論妊娠因甘肥過度腐積成痰或七情鬱結氣盛為火停蓄胃中乍因寒熱之感邪正交爭陰陽相混故令心腹絞痛吐利並作揮霍變亂謂之霍亂如邪在上則當心痛而吐多邪在下則當臍痛而利多邪在中脘則腹中痛吐利俱多吐多傷氣利多傷血血氣受傷不能護養其胎邪氣鼓擊胎元子母未有不殞者此危證不可不亟治也宜香蘇散加藿香葉或先服後探吐之又加味四味紫蘇和胎飲治心腹絞痛上吐下瀉亦效豫治孕婦霍亂用六和湯纍效又有回生散七味白朮散録後以備臨證擇用再考方書單瀉用胃苓湯飲食停滯用平胃散內傷飲食外感風寒用藿香正氣散皆治霍亂之劑也香蘇散此方治霍亂平正之至香附炒紫蘇各二錢陳皮一錢藿香葉縮砂炙草各五分水煎服如轉筋加木瓜一錢胎動不安加土炒白朮一錢五分如夏月得之加黃芩一錢五分炒黃連一錢香薷二錢如冬月得之加人參土炒白朮各一錢炮薑五分加味四味紫蘇和胎飲治心腹絞痛上吐下瀉紫蘇黃芩白朮土炒各一錢五分炙草以上四味和胎飲本方藿香葉陳皮各一錢砂仁五分炒薑棗引水煎服六和湯治霍亂吐瀉心煩腹脹陳皮四分製半夏七分杏仁十粒去皮尖竹茹木瓜各一錢扁豆二錢茯苓八分藿香砂仁研甘草各五分薑一片棗二枚水煎服如不愈再服四味紫蘇和胎飲回生散治中氣不和霍亂吐瀉但一點胃氣存者服之回生陳皮去白藿香各五分上銼水煎溫服七味白朮散治脾胃虛弱吐瀉作渴不食人參白朮土炒茯苓木香藿香炙草各五錢乾葛一兩上為末沸湯調服二錢吐甚者加生薑汁頻服胃苓湯見本卷泄瀉門平胃散藿香正氣散俱見本卷諸痛門中惡中暑中濕中風論妊娠忽然心腹刺痛悶絶欲死者謂之中惡即俗謂㽱腸沙是也蓋因血氣不和精神衰弱邪毒之氣得以中之孕婦病此亦致損胎薛氏云此證當調補正氣為善用金銀藤一味煎湯飲之或灶心土為末每服二錢井水調服白湯亦可濟陰鋼目內用散滯湯治之又煮艾方治真中惡極妙妊娠盛暑時中暑熱之毒其證發熱而渴自汗精神昏憒四肢倦怠少氣清暑和胎飲主之妊娠中濕或因早行感霧露之氣或冒水或久居下濕地或大汗出浴冷水其證發熱骨節煩痛身體重著頭痛鼻塞黃芩白朮湯主之妊娠中風因體虛則中之乃四時八方之氣為風自沖方來中人即病中其皮毛經絡者則發寒熱頭項身體皆痛或肌肉頑痹中其筋骨者則拘攣強直中其臟腑者則卒倒昏悶口眼喎斜手足瘛瘲口噤不語孕婦得此不可用常治風之法以補虛安胎為本兼用搜風之劑搜風安胎飲治之但胎前真中風者少子癇之證實多與中風見證無異醫者當審實是中風方可用搜風安胎否則子癇證治也散滯湯專治觸惡胃氣傷胎肚痛手不可近不思飲食青皮三錢黃芩芍藥各二錢歸尾一錢五分川芎一錢木香五分炙草少許上分二帖水三盞先煮苧根兩大片至二盞去苧根入前藥同煎至一盞熱服煮艾方治妊娠中惡心腹絞急切痛如鬼擊之狀不可按摩或吐衄血者熟艾如拳大煮汁頻服清暑和胎飲黃耆炙人參白朮土炒黃芩黃連知母麥冬去心炙草各一錢五味十二粒水煎服黃芩白朮湯黃芩白朮土炒各五錢蘇葉二錢五分薑五片水煎服搜風安胎飲歸身黃耆蜜炙羌活黃芩秦艽防風炙草各一錢薑棗引水煎多服以平為期子癇論又名風痙一名子冒亦名類中風附因破傷失血吐血衄血致類中風妊娠子癇乃為惡候若不早治必致墮胎其證或口噤項強手足攣縮與瘛瘲同言語蹇澀痰涎壅盛不省人事或忽然眩暈卒倒口不能言狀如中風實非中風之證不可作中風治即或無痰言語如常但似風狀多因血燥血虛亦不可概以風治而誤也羚羊角散主之馮氏云孕婦忽然僵仆痰涎壅盛不省人事乃是血虛而陰火炎上鼓動其痰左脈微數右脈滑大者名曰子癇宜四物養血酒芩清熱二陳化痰理氣治法仍以安胎為主勿過用中風之藥此由血虛生熱熱盛生風皆內起之風火養血而風自滅若心肝風熱用鉤藤湯肝脾血虛加味逍遙散肝脾鬱怒加味歸脾湯氣逆痰滯紫蘇飲脾郁痰滯二陳加竹瀝薑汁密齋云孕婦氣虛挾痰火證狀如中風卒倒即醒醒而復發清神湯主之兼服壽星丸豫謂妊婦子癇至有目昏黑而厥者胎前絶少但一有此證即是兒暈屬氣與痰故目昏黑髮厥只服紫蘇飲慎不可服蘇合丸及烏藥順氣散等藥至於破傷失血或吐衄血忽患口噤項強背直類中風證皆因失血所致不可不知用荊防安胎散治之羚羊角散治孕婦口噤項強手足攣縮痰壅不省人事羚羊角苡仁米棗仁去殼炒各一錢當歸二錢酒洗獨活五加皮茯神各八分川芎七分杏仁十粒去皮尖防風五分木香三分甘草四分薑引水煎服虛加人參一錢痰加竹瀝五分胃弱加白朮一錢鉤藤湯治孕婦手少陰足厥陰血虛風熱人參當歸茯神桑寄生鉤藤各一錢苦桔梗一錢五分水煎服清神湯治孕婦忽然眩暈卒倒口噤不能言狀如中風須臾即醒醒而復發乃氣虛挾痰火子癇證人參白朮茯苓白芍黃耆蜜炙麥冬去心歸身炙草各等分薑棗引水煎食遠服兼服壽星丸琥珀壽星丸寧神定志去風化痰天南星一斤掘地作坑深二尺用炭火二十斤將坑燒紅去炭掃淨用好酒五升澆之將南星趁熱放坑內用瓦盆急蓋定以黃泥封固經一宿取出焙乾為末入琥珀末一兩硃砂末五錢和勻以生薑自然汁煮麵糊熟再入豶豬心血三個攪勻和末為丸硃砂為衣每服五十丸人參湯下日三服神效荊防安胎散治孕婦或因破傷患類風證人參當歸酒洗白朮土炒各三錢生地天麻各二錢麥冬一錢去心條芩八分荊芥防風各三分陳皮甘草各四分水煎服二陳湯見本卷子煩門加味逍遙散見本卷子懸門附逍遙散下加味歸脾湯見本卷胎漏小産門附歸脾湯下四物湯紫蘇飲俱見本卷安胎門痢論妊娠痢下因飲食生冷脾胃不能克化致令心腹疼痛傷血則赤傷氣則白氣血俱傷則赤白相雜蓋血屬陰陰傷則受熱居多然又有陽氣傷不能統陰血而痢赤又不得不從事於辛溫故治血痢猶當以色之顯晦驗其虛實寒熱故凡積之瘀晦不鮮清稀不稠皆虛寒之候即陽不統陰之血急投人參薑艾或可保全倘不審而誤服芩連乃速其斃也惟積之稠黏紫赤而光澤者合用苦燥以堅腸胃之滑脫又必當佐以調氣之藥則陰邪解釋非若白痢之不可雜以芩連芍藥等味引領滯穢襲傷陰血也氣屬陽陽傷則受冷居多即有火注下迫皆陽氣鬱遏本寒標熱之證不可純歸於熱但當驗其積之稠黏如糊色白如脂方可暫與清熱治標若汁沫如水色晦如塵急須溫理其氣即有熱證皆假象無疑其虛實寒熱既分而又有三禁三善五審之不可不知也一禁滌蕩腸胃恐陽氣下陷胎氣愈墜二禁滲利膀胱恐陰津脫亡胎失榮養三禁兜澀滯氣恐濁氣愈滯後重轉加故善治妊娠之痢惟以調氣為先使已敗積沫隨氣而下未傷津液統之而安夫調氣有三善一使胃氣有常水穀輸運二使腹滿腹痛後重漸除三使濁氣開發不致侵犯胎元所謂五審者一審飲食之進與不進夫痢乃腸胃受病若痢勢雖甚飲食無妨者易已故痢以噤口為最劇在初起濁邪全盛之時不足為慮但要清理積滯飲食自進矣若七日以後尚不能食脈反數盛此必初時失於清理之故急需調氣理中則積沫漸下飲食漸進矣或初時能食至一旬一氣後反不能食脈息不振此必滌蕩太過胃氣受傷所致亦有過用芩連檳朴苦寒破氣而致厄逆嘔噦者胃氣大敗最危之兆惟峻與溫補庶可挽回若脈見數疾無倫或翕翕虛大或歇止不前或弦細搏指者皆胃氣告匱百不一生矣二審溲之通與不通下痢清濁不分若痢雖頻而水道順利者胎必無虞若月數將滿胎壓尿胞每多溲便頻數轉胞脹閟之患切忌利水傷津急與開提自通但須察其脈無過壯過硬之形便宜補中益氣稍加澤瀉車前以升清降濁投之無不輒應非特妊娠為然即平人久痢津液大傷而溲澀不通者亦宜此治法也三審腹之痛與不痛下痢腹痛必然之理然間有濁濕下趨而無郁沸之火者則不痛也但此多見於肥白人之白痢若血痢與瘦人多火者罕見也治宜調氣運積不用清火明矣原其腹痛有寒熱之分痛有止歇痛則奔迫下墜自圊不及者火也痛自下而攻擊於上者火也痛而脹滿不勝摩按熱飲欲甚者火也實也痛無止歇常時痛而無絞剌者寒也痛自上而奔注於下者寒也痛而不滿時喜溫手摩按飲熱漸緩欲至圊而可忍須臾者虛也寒也大約初痢脹痛為熱為實久痢㽱痛為虛為寒即初因火注切痛痢久傷氣亦必變為虛寒也故久痢腹痛之脈無論大小遲數但以按之漸漸小者並屬虛寒急需溫補慎勿利氣惟急痛脈實久按不衰者可稍用炮黑薑連和之四審後之重與不重下痢後重濁氣壅滯也夫開通壅滯必以調氣為本在妊娠猶為切要調氣則後重自除而胎息自安但初痢後重首宜開發其滯若久痢後重又當升舉其陽陽氣升則胃氣運胃氣運則周身中外之氣皆調達而無壅滯之患矣故治孕婦之後重無問胎之大小但脈見有餘則宜調氣脈見不足便與升提雖血痢亦宜陽藥一切滋膩血藥總無干預以氣有統血之功則血無妄行之慮也五審身之熱與不熱下痢為裡氣受病若見身熱表裡俱困元神將何所恃而得祛邪之力哉惟人迎之脈浮數可先用和營透表之法分解其勢然後徐行清理若初痢不發熱數日半月後發熱脈來漸小或虛大少力者此真陰內亡虛陽發露於外在平人或可用辛溫峻補斂之以歸其源若妊娠則桂附又難輕用惟藉參朮薑萸膠艾之屬非大劑濃煎峻投難望其轉日回天之績也或有痢久衛虛起居不慎而感冒虛風發熱者但當察其左手三部必顯浮數之象又需理中湯加桂枝合表裡而治之以內氣久虛之邪不得參術助其中氣則客邪不得解散也又有病後瘧後或本質虛羸之人及秋冬天令寒冷時下痢加以胎孕扼腕豈可與平人之痢同日而語哉其圓機活法因人論證因證立方調治之法在醫之神聖工巧耳考之醫通云常用厚朴去乾薑湯治妊娠能食腹脹後重積穢稠黏之白痢厚朴生薑甘草半夏人參湯治妊娠腹脹後重赤白相兼之痢黃芩芍藥湯送香連丸治妊娠能食後重積穢稠黏之血痢連理湯合千金三物膠艾湯治妊娠少腹疼重瘀晦不鮮或間有鮮血之痢駐車丸治妊娠發熱後重陰虛畏食之血痢白頭翁加甘草阿膠湯治妊娠熱毒內攻噤口不食腹脹後重膿血稠黏之痢千金膠艾榴皮湯治妊娠膿血清稀胎動不安久泄不止之痢補中益氣湯治妊娠先瘧後痢及瘧痢齊作元氣下陷胎氣下墜小便頻數或轉胞不得溺之痢以上諸方並加砂仁以調其氣烏梅以調其血未嘗不隨手輒效也又有用當歸黃芩芍藥湯者黃連阿膠湯者俱録方於後以備採用豫每用一味阿膠飲或阿膠黃連飲均治孕婦之痢甚妥獲效又用加味香連湯亦屢驗大全治妊娠下痢赤白痢疾絞剌疼痛雞子一枚烏雞者更良破孔去清留黃用入黃丹一錢攪勻厚紙糊好鹽泥固濟火焙乾為細末米飲服二錢一服愈者是男二服愈者是女厚朴去乾薑湯厚朴去皮薑汁炒陳皮泡去浮白茯苓炙草各等分煎服厚朴生薑甘草半夏人參湯治胃虛嘔逆痞滿不食之證人參隨宜厚朴一錢五分薑製製半夏二錢炙草八分生薑引煎服黃芩芍藥湯治伏氣發溫太陽少陽合病自利黃芩白芍各三錢炙草二錢大棗四枚擘水煎服香連丸治下痢赤白相兼白多於赤者川黃連六兩用吳茱萸揀去閉口者取淨一兩同黃連炒去吳茱萸不用只用川連木香一兩共末醋糊丸每服五十丸米湯砂仁湯任下連理湯治胃虛挾食痞滿發熱人參隨宜白朮一錢五分土炒焦炮薑六分黃連八分茯苓一錢炙草六分水煎服千金三物膠艾湯又名膠艾榴皮湯治血痢又痢下不止阿膠艾葉酸石榴皮三味等分煎服駐車丸治陰虛下痢發熱膿血稠黏及休息痢阿膠三兩黃連炒黑當歸各五錢炮薑一兩上四味搗篩醋煮阿膠為丸梧子大每服四五十丸晝夜三服米飲下白頭翁加甘草阿膠湯治挾熱痢下膿血及産後痢不止白頭翁黃連炒黑黃柏炒黑秦皮炙草各一錢阿膠三錢上六味先煮上五味去滓納膠煬盡溫分三服當歸黃芩芍藥湯治妊娠病痢清熱和胎行氣養血凡虛坐努力者防其損胎此方主之當歸黃芩炒芍藥炒黃連炒白朮土炒枳殼麩炒茯苓陳皮生地生草各一錢木香五分烏梅一個水煎空心服黃連阿膠湯治妊娠痢病日久不止黃連炒阿膠炒人參白朮土炒茯苓各一錢木香七分乾薑炒炙草各五分烏梅三個薑棗引水煎食前服一味阿膠飲治孕婦痢疾阿膠上好真者不拘多少酒化服日數次隨意飲之自愈阿膠黃連飲又名黃連阿膠湯治孕婦痢疾若安胎則痢愈重治痢則胎難全宜服此飲阿膠能止膿血之痢且止腰痛固胎以之為君黃連芍藥甘草皆以為佐枳殼麩炒少加二三分以寬其後重水煎服一劑痛痢俱減去枳殼再服加味香連湯治孕婦痢證白芍黃芩各二錢黃連陳皮各一錢茯苓六分木香五分黃柏八分乳香沒藥各分半酒煎服千金膠艾榴皮湯即本門三物膠艾湯補中益氣湯見本卷諸痛門瘧論妊娠患瘧無論胎息月數多少總以安胎為主而世之所謂安胎無過黃芩白朮不知黃芩乃治熱盛胎動不寧白朮乃治脾虛胎氣不固若氣虛下陷誤用黃芩氣滯壅逆誤用白朮為害何可勝言豫於前安胎方中亦多有用芩術然亦有棄而不用者總視其病之宜忌及人之氣血所謂可與意會難與言傳業醫之活法在隨機應變耳要知胎息安與不安全在母氣之調與不調故安胎先安母氣未有母氣乖戾而胎獨安之理亦有因胎氣有故而致母病者則先治胎而母病自愈如子死腹中之類是也又安有不去其胎而母得無恙乎故善治胎産證者必審孕婦形體之肥瘦氣血之偏盛若形盛色蒼肌肉䐃堅者必多濕多痰無論何疾必顯濕熱本病脈多滑實有力絶無虛寒脈弱之候可峻用豁痰理氣藥治其本質然後兼客邪見證而為製劑治宜二陳湯隨經加透表藥或合小柴胡用之蓋柴胡為瘧證之嚮導故多用之然有自汗過多尺中微弱或熱盛手足清始終不用柴胡而用建中桂芍收功者或見煩渴脈實大便六七日不通陽明腑實又宜涼膈去硝黃加鮮首烏調之須知稟質堅固者其氣多滯內外壅遏但有濕熱絶無虛寒之患如元氣本弱或病後得之必需理脾行氣惟六君子湯為合劑有痰食結滯則加枳實草果內有寒加炮薑外受風加桂枝胎動上逆不安加子芩胎下墜加柴胡倍人參以參乃舉胎聖藥也間有不應又需補中益氣湯升舉之若中有留滯則枳實理中加桂枝柴胡合表裡而治之大抵病邪初發元氣未耗疏風滌痰消導飲食在所必需然宜大劑白朮培護中土以脾胃為一身之津梁土厚自能載物其最可慮在三四發至六七發其勢最劇若過半月雖淹纏不止邪熱漸衰可無胎隕之虞矣或有瘧久氣血虛敗而小産者此皆失於調治也若六七發後不止即當和營健脾若稟質柔脆雖有風邪不得純用表藥以風藥性升能使胎氣上逆而為嘔逆喘脹膈塞痞滿之患雖有實滯不得過用降泄之味能引邪氣下陷致胎墜不安而為泄利不食小腹疼重之患矣若疫瘧毒盛勢劇急與涼膈承氣黃連解毒救之瘟瘧惛惛不爽煩熱大渴或壯熱無寒或先熱後寒者當與桂枝白虎人參白虎撤其在裡之熱不可與夏秋痁瘧比例而推也蓋有是證用是藥有故無隕惟在速祛邪毒以救胎息之燔灼若遲疑未決下手稍軟救無及矣又有氣血虛損其瘧由虛致不因暑氣而作如經云陽微惡寒陰弱發熱或風寒因虛而乘之若寒熱不已重蒸其胎胎亦受傷而墜宜輕解表邪兼大補氣血以主之更有患胎瘧者一遇有胎瘧病即發此人素有肝火遇孕則水養胎元肝虛血燥寒熱往來似瘧非瘧也以逍遙散清肝火養肝血兼六味丸以滋化源寒熱自退世醫治妊娠瘧初起用散邪飲不愈者用截瘧湯截之又有初用柴胡知母湯以平為期瘧久不退則用七聖散截之然截瘧內常山傷胎萬不得已須用白朮煎水煮透用之然亦宜少用即尋常治瘧再以白朮制之方免嘔泄又夜明砂單方亦治孕瘧豫常用加減丹溪安胎飲治孕瘧甚覺穩妥有效從未用截藥而孕瘧未嘗不愈也枳實理中湯附理中湯又附子理中湯治胃虛挾食及結胸本虛不能受攻人參一錢至三錢白朮一錢至二錢土炒焦炮薑炙草各五分枳實七八分麩炒茯苓一錢水煎服此方參朮薑草四味方名理中湯治胸痹心胸痞氣霍亂吐瀉不渴一切脾胃虛寒嘔吐清水飲食不入完穀不化理中湯內加熟附子名附子理中湯如方中人參用一錢附子則宜用三分承氣湯治少陽陽明腑證大黃四錢生厚朴六錢制枳實三枚此二方胎産忌用録之以備參考黃連解毒湯治熱邪內外俱盛黃連黃芩黃柏山梔等分煎服桂枝白虎湯附白虎湯人參白虎湯治溫病感冒客邪而渴及溫瘧先熱後寒石膏四錢生用碎知母一錢五分生炙草五分粳米一撮桂枝七分半水煎服此方去桂枝即白虎湯正方也去桂枝加人參一錢名人參白虎湯治熱病大渴發熱背寒散邪飲治瘧初起羌活柴胡紫蘇陳皮各六分蒼朮米泔水制厚朴薑汁製製半夏青皮各七分水煎服不愈者服後截瘧湯截之截瘧湯白朮土炒山楂並子檳榔常山白酒煮乾炒紫色再用白朮煎水煮透更妙各八分草果神麯各四分水煎遇發日五更服柴胡知母湯治孕婦病瘧不可輕用截藥恐致損胎此湯主之柴胡一錢五分知母人參黃芩白朮土炒歸身各一錢甘草五分薑棗引水煎多服以平為期七聖截瘧散如瘧久不退轉甚者宜用此散截之柴胡一錢五分黃芩知母各一錢常山八分白酒煮乾炒紫色再用白朮煎水煮透更妙草果仁五分烏梅二枚水酒各半煎露一宿臨發日五更溫服忌生冷雞魚麵食原方有炙草豫恐常山合之而作吐故去之明砂止瘧丹夜明砂三錢為末茶清調空心服豫謂此藥能行血且下死胎甚速非瘀血積聚成瘧及久成瘧母者不可輕用也加減丹溪安胎飲治孕婦瘧疾白朮土炒當歸熟地各二錢川芎條芩各八分製半夏七分人參一錢藿香五分草果青皮各三分紫蘇廣皮炙草各四分烏梅二枚薑一片煎服二陳湯見本卷子煩門小柴胡湯建中湯涼膈散六君子湯補中益氣湯俱見本卷諸痛門人參白虎湯見本門附桂枝白虎湯下逍遙散見本卷胎逆上逼門六味丸見本卷諸痛門附六味地黃湯下傷寒溫熱時疫論妊娠傷寒時值冬令為寒所傷其輕者淅淅惡寒翕翕發熱微嗽鼻塞數日即愈不藥亦可或用蔥白連須三五莖生薑三片煎服即解如所感者重以至頭疼先寒後熱久必傷胎藥多避忌務宜謹慎不可與常婦概治竟用發表以致損胎誤其母子性命但服蔥白香豉湯自愈故千金治妊婦傷寒用蔥白生薑水煎熱服取汗即安是以蔥白香豉湯香蘇散可解表邪又可安胎況蔥白不惟性能解表且善安生胎下死胎若感寒孕婦胎傷未死但用蔥一把水煮食之汗出即安如胎已死須臾自出不應加生薑蘇葉不可輕用表藥招尤若妊娠邪在半表半裡擇綱目內黃龍湯即小柴胡湯變體用法其加減亦可採擇而用如表證已愈但發熱大渴用香蘇散加金花湯便結者加入大黃或用三黃解毒湯所以凡胎前疫證與傷寒陽明腑證內實便祕須急通大便方不損胎若大便自利乃正氣下泄胎必難保惟大小便如常知里無熱則不傷胎氣故又有塗臍護胎之法其或汗或下各隨表裡脈證主治至妊娠熱證亦須急治恐致落胎千金用蔥白香豉湯取汗即愈又有用柴葛安胎飲者如嘔吐煩躁用生津葛根湯者甚則斑出黑色用梔子蔥豉湯者密齋用加味化斑湯此皆熱入於裡陽明證之方藥也醫通治孕婦溫熱時行及傷寒邪氣內犯熱毒逼胎並宜千金石膏大青湯急救庶可保全遲則不救又有石膏六合湯升麻六合湯立方甚穩録後以備採用凡胎孕藥內不得已而用大黃轉藥須用酒製薑桂附子用黃連甘草制之則無害矣蔥白香豉湯千金治時疫傷寒三日以內頭痛如破及溫病初起寒熱蔥白連須一握香豉三合上二味水煎入童便一合日三服秋冬加生薑二兩此方藥味雖輕功效最著凡虛人風熱伏氣發溫及産後感冒靡不隨手獲效與産後痢後用伏龍肝湯丸不殊既可探決死生且免招尤取謗正危證解圍良劑也尊生香蘇散治妊婦傷寒勿論日數但見惡寒頭疼此方主之香附炒黑紫蘇各二錢陳皮一錢甘草五分引加生薑三片蔥白五寸煎服頭疼加川芎一錢白芷一錢羌活一錢防風一錢如表證愈但發熱大渴加金花湯便結者加製大黃一錢金花湯黃連黃芩黃柏梔子各一錢水煎服濟陰香蘇散與尊生方同此則分五臟脈證加法故重緑以備擇用香附炒黑紫蘇各二錢陳皮一錢甘草五分生薑三片蔥白五寸煎服頭痛加川芎白芷各一錢名芎芷香蘇飲如惡寒里和外證見面青善怒得肝脈浮弦加羌活防風各一錢如惡寒里和外證見面赤口乾善笑得心脈浮洪加黃芩石膏各一錢五分如惡寒里和外證見面黃善噫得脾脈浮緩加白朮防己各一錢五分如惡寒里和外證見面白善嚏悲得肺脈浮澀加黃耆防風各一錢如惡寒里和外證見面黑善恐得腎脈浮濡加吳茱萸一錢黃龍湯治妊娠傷寒得之三五日後有惡寒發熱內有煩渴引飲小便赤澀之證此邪在半表半裡宜此方主之柴胡二錢黃芩一錢五分人參甘草各一錢薑棗為引水煎服如寒熱往來無汗口乾加葛根二錢去棗入蔥白三根如頭疼不止加川芎白芷各一錢去棗加蔥白三根如發熱有汗口渴加土炒白朮一錢半栝蔞根一錢半如脈浮大有力大熱大渴人參白虎湯去薑棗如心煩不得臥加白茯苓去心麥冬各一錢如嘔噦加製半夏白茯苓各一錢去棗如胸膈滿痛加炒枳殼炒黑香附川芎各一錢如大便祕初加製大黃五分得利則止不利加一錢以利為度三黃解毒湯治妊娠傷寒五六日後表邪悉罷並無頭痛惡寒之證止煩躁發熱大渴小便赤大便祕或利下赤水六脈沉實此病邪在裡此湯主之黃芩黃連黃柏山梔大黃各等分煎服護胎法治妊娠傷寒熱病護胎白藥子不拘多少為末以雞蛋清調攤於紙上如碗大帖臍下胎存處干則以濕水潤之又法治孕婦一切有熱內外諸證伏龍肝不拘多少為末用井底泥調敷心下令胎不傷柴葛安胎飲治孕婦熱病骨節疼痛如不急治則落胎柴胡葛根青黛各八分石膏一錢五分升麻五分梔子一錢知母七分蔥白三根水煎服有痰加竹瀝一小杯薑汁二匙生津葛根湯治孕婦熱病嘔吐不食胸中煩躁人參葛根蘆根麥冬去心知母炒梔子炒各一錢竹茹一團蔥白三寸水煎服梔子蔥豉湯治孕婦熱病斑出赤黑色小便如血氣急欲絶胎欲落之證梔子炒黃芩升麻各一錢生地二錢青黛八分豆豉四十九粒杏仁十二粒去皮尖石膏一錢五分煅蔥白七寸為引水煎服加味化斑湯治孕婦傷寒熱病不解遍身發斑赤如錦紋者人參知母生地黃芩梔仁甘草各一錢石膏二錢淡竹葉二十片豆豉半合水煎食遠服千金石膏大青湯治妊娠傷寒頭疼壯熱肢節煩痛此方既可散邪又能安胎允為孕婦傷寒溫熱時行神方也石膏二錢大青黃芩各八分前胡知母梔仁各一錢蔥白一莖水煎溫服石膏六合湯治妊娠傷寒身熱大渴而煩當歸川芎白芍生地各一錢石膏煅知母各五分水鍾半煎一鍾溫服升麻六合湯治妊娠傷寒下後過經不愈濕毒發斑如錦紋者當歸川芎白芍生地各一錢升麻連翹各七分水煎溫服譫語論妊娠譫語為臟腑熱極之候急宜童便時時灌之不應用生地黃黃連湯清其血中之火庶胎得安脈實者加酒大黃下之下遲則傷胎也亦有傷胎胎下而下血心神無主而譫語雖用峻補亦難有效其治法方藥俱載産後妄言妄見門若孕婦證見舌青者其子已死腹中急當下之若雙胎一生一死者必腹中半邊冷半邊熱如母患熱證臟腑熱甚蒸其胎兒因致死但服黑神散加生蒲黃以暖其胎則胎即出矣胎未死井泥塗臍以護胎氣多有保全者生地黃黃連湯治失血後燥熱瘛瘲脈數盛者生地二錢防風川芎各八分當歸一錢五分黃連七分黃芩炒山梔炒黑各一錢赤芍一錢水煎服血證黑神散治吐血衄血屢發不止炮薑肉桂各一兩熟地四兩當歸蒲黃篩淨炒黑各三兩白芍酒製炙草各二兩上為散每服四錢用黑豆半合微炒香淋酒半盞和水半盞煎一半入童便半杯和服氣虛加人參三兩炙黃耆六兩以固衛氣庶無營脫之患一方熟地蒲黃炮薑歸芍桂心各二兩炙草三錢黑豆二合五勺炒去皮共為末每服二錢童便和酒下世以豆去殼同藥為散不知豆之功全在殼也傷風論妊娠傷風皆由於天氣寒暄不一或暴寒暴熱人失防範起居不慎即鼻塞流涕微嗽惡風常作噴嚏與傷寒之輕者相似但傷寒惡寒此則惡風有間耳宜香蘇散去香附加蔥豉咳嗽多痰加桔梗或紫蘇飲加蔥豉安胎為妙嗽兼瀉氣口脈滑實有力中有宿食者胃苓湯去蒼朮俟脾胃調方理其嗽豫謂傷風咳嗽總不如濃煎蔥頭湯為上蓋風藥皆能墮胎故嗽喘胎寒多用連須蔥湯大能安胎散氣胎始無虞或加香豉猶妙若不喘者紫蘇飲加砂仁童便香蘇散見本卷霍亂門紫蘇飲見本卷安胎門胃苓湯見本卷泄瀉門傷食論妊娠傷食多由脾胃中氣虛弱不能運化故東垣云脾胃之氣壯則過時不飢多食而不傷蓋胃主司納脾主消化凡素常脾胃虛弱飲食難化以白朮陳皮等分為末神麯糊丸常服最善枳朮丸但可暫用枳實峻厲能耗正氣治者慎之又經云飲食自倍腸胃乃傷若飲食不節生冷厚味恣性食啖致傷脾胃若投以峻劑則脾胃復傷而胎亦損且胎以脾胃為主脾胃強則胎系如懸鐘而不墜若傷食不化則脾困而胎不能固矣故凡治消食導滯皆先以補脾健胃為主兼推揚穀氣則飲食自化若徒事消克使脾傷而又傷化源之機告竭胎元猶易於墮耳豫治傷食用砂仁合四君子湯或香砂四君合平胃散屢獲有效世有用平胃散本方治孕婦傷食此必少壯村婦粗糲黏滯之食填滯於中肚腹作痛不得不平其胃土如富貴之家皆美食恣啖臟氣素嬌未有不兼補而施治也況平胃散加以朴硝即為下胎峻劑用者可不慎乎豫再考方書有用六君子湯為主分別肉面米魚腥辛熱生冷所傷而加以山楂麥芽酒麴陳皮黃連砂仁木香視其所因而加入甚為穩妥如傷肉食加山楂於六君子湯內余以類推四君子湯見本卷胎逆上逼門平胃散六君子湯俱見本卷諸痛門臟躁悲傷論妊娠臟躁悲傷欲哭象如神靈所憑數欠伸蓋肺志為悲胎熱火炎肺不自持故悲屬肺病燥也胎前氣血壅養胎元則津液不能充潤而肺為之燥當補母仲景用甘草小麥大棗湯主之因甘草大棗補脾治以甘緩佐以涼瀉無不愈矣立齋用淡竹茹湯佐八珍湯其用八珍補養氣血更發前人之所未發又治臟躁悲哭及自笑自哭用紅棗燒存性米飲調下甘麥大棗湯治婦人臟躁悲傷不止甘草三兩小麥一升大棗十枚上以水六升煮取三升溫分三服蓋此方甘能生濕濕生又何燥焉淡竹茹湯治妊婦心虛驚悸臟躁悲傷不止又治虛煩甚效麥冬去心小麥製半夏各一錢人參茯苓各一錢甘草五分上引加生薑三片棗一枚淡竹茹一團如指大水煎服八珍湯見本卷諸痛門大便燥論妊娠大便結燥蓋因血養胎元大腸血少燥結難出雖無大害然便時甚苦潤燥湯主之潤燥湯阿膠一錢五分條芩蘇梗防風各一錢當歸麻仁芝麻各二錢水煎服子喑論經曰婦人重身九月而喑者胞之絡脈絶也無治當十月復蓋因孕至九月兒體已長胞系於腎少陰之脈上系舌本脈道阻絶不通故不能言者間有之十月分娩後而自能言不必加治若強以通聲開發治之則誤矣夫喑者有言無聲經曰不能者非絶然不語之謂凡音出於喉嚨發於舌本因胎氣肥大阻腎上行之經腎脈入肺循喉嚨系舌本喉者肺之部肺主聲音其人切切私語心雖有言而人不能聽故曰喑肺腎子母之臟故云不必治若大全解作不語則為心病以心主發聲也與子喑了不相干若張子和有降心火之説馬元臺有補心腎之言如果腎之脈絡絶則其病不治豈有産後自復之理乎故經云胞之絡脈絶此絶字當作阻字解如富貴之家及不明醫理必欲強治惟有濃煎參麥五味飲空心服地黃丸助肺腎之氣以養胎可耳切不可謂痰閉心竅而用化痰開竅通聲之藥致誤母子之性命也參麥五味飲見下卷暈厥門六味地黃丸見本卷諸痛門附六味地黃湯下腹內兒哭鐘鳴論妊娠腹內兒哭或鐘鳴者因腹中臍帶上疙瘩兒含口中妊婦或登高舉臂脫出兒口以此作聲令妊婦曲腰就地如拾物狀或合作男子拜揖狀或令掃地其疙瘩仍入兒口即止亦有胎熱不安而啼者以黃連濃煎汁妊婦時時呷之即止胎不長養過期不産並枯胎論妊婦有按月行經而胎日長者名曰盛胎其婦血氣充盛養胎之外血有餘故也有數月之胎而血大下謂之漏胎因事觸胎動其任脈故血下而不傷子宮也然孕中失血胎雖不墜氣血亦虧多致逾月不産曾見有十二三月或十七八月或二十餘月而生者俱是血氣不足胚胎難長故耳凡十月之後未産者當大補氣血之藥以倍養之庶無分娩之患所以胎氣本乎血氣而長其胎不長者亦惟氣血之不足故有受胎之後而漏血不止則血不歸胎者有婦人中年血氣衰敗泉源日涸者有因脾胃病倉廩薄化源虧而衝任窮者有多鬱怒肝氣逆血不調而胎失所養者有血氣寒而不長陽氣衰生氣少者有血熱而不長火邪甚真陰損者種種不一凡治此病則宜補宜固宜溫宜清因其病而隨機應之胎氣漸充自無不長然又有妊母氣血自旺而胎不長者此必父氣孱弱又當大劑保元專補其氣不得雜一味血藥助母則子氣方得受益總之胎之能長而旺者全賴母之脾土輸氣於子凡長養萬物莫不由土故胎之生髮雖主乎腎肝而長養實關乎脾土所以治胎氣不長必用八珍十全歸脾補中之類助其母氣以長胎免致多延日月試觀瘠薄之土雖蓻不獲得沃澤灌溉便能成實義可見矣其過期不産有屬氣虛者當補其氣有血虛氣滯者用補血行滯湯服之即産復有胎氣因母舉動失調或所稟怯弱不能自固致兒內失榮養不能長髮仍不隕墜者此與果實幹萎在枝無異名曰枯胎惟宜急早資母血氣則胎自長若失於早為滋養以致萎燥既成無能為矣曾有孕婦十七月不産自五月以後胎則不動用丹參一味日服七錢兩旬余胎下已死而枯又一婦十三月不産脈來微結用十全大補湯二十餘劑而下胎枯色白如過期不産而脈沉細但當臍下悸動此為瘀積化水當作鬼胎治之保元湯治營衛不足黃耆三錢至六錢蜜酒炙人參三錢至一兩炙草一錢水煎服十全大補湯治營衛俱虛人參黃耆蜜炙白朮土炒茯苓熟地當歸各一錢川芎白芍炒各八分肉桂炙草各五分薑棗引水煎服補血行滯湯又名催生湯治過月不産又能催生當歸酒浸川芎白芍炒熟地香附制各一錢桃仁去皮尖枳殼麩炒砂仁碎紫蘇各七分薑一片棗二枚水煎服歸脾湯見本卷胎漏小産門八珍湯補中益氣湯俱見本卷諸痛門鬼胎論又名夜叉胎凡婦人氣血充實臟腑調和秉心正真則無鬼胎證矣若營衛虛損精神衰弱邪思蓄注衝任滯逆脈道壅瘀不行狀如懷娠故曰鬼胎然細究其理鬼胎者偽胎也如人邪淫之念一起則肝腎相火自動有夢與鬼交者非實有鬼神交接成胎也即經所謂思想無窮所願不遂白淫白濁流入子宮結為鬼胎乃本婦自己血液淫精聚結成塊血隨氣結而不散以致胸腹脹滿儼若胎孕耳非偽胎而何故鬼胎之脈沉細弦澀或有時虛浮有時沉緊忽大忽小皆陽氣不充之驗其腹雖漸大而漫起重墜終與好胎不同當臍或臍下左旁雖微動亦與真胎迥別所以一見經候不調就行調補庶免此患若停經瘀滯而得即血癥症氣瘕之類則病已成當調補元氣為主而繼以去積之藥乃可然欲於補中兼行無如決津煎欲去其滯而不猛峻無如通瘀煎若由陽氣不足或肝脾鬱怒所傷不能生髮致陰血不化而經閉為患肚腹漸大以加味歸脾湯加味逍遙散再加去白陳皮八分如干嗽用蜜制治之自愈此外如狐魅異類之遇者則實有所受而又非鬼胎之謂當於癥瘕類求法下之又常見婦人得孕經止尺脈或澀或微弱而無他病此子宮真氣不全精血雖凝而陽虛陰不能化終不成形每致産時而下血塊血胞必大劑溫補預調而後方能成孕也決津煎治婦人血虛經滯不能流暢而痛極者以水濟水若江河一決而積垢皆去用此湯隨證加減主之此用補為瀉之神劑也當歸三五錢或一兩澤瀉一錢五分牛膝二錢肉桂一二三錢熟地二三錢或五七錢或不用亦可烏藥一錢如氣虛者不用亦可水二鍾煎七八分食前服如嘔惡加焦薑一二錢陰滯不行非加附子不可如氣滯而痛脹加香附一二錢或木香七八分如血滯血澀加酒炒紅花一二錢如小腹不暖而痛極者加吳茱萸七八分如大便結澀加肉蓯蓉一二三錢微者以山楂代之如氣虛少用香陳之類甚者不用亦可通瘀煎治婦人氣滯血積經脈不利痛極拒按及産後瘀血實痛並男婦血逆血厥等證歸尾三五錢山楂香附制紅花新者炒黃各二錢烏藥一二錢青皮澤瀉各一錢五分木香七分水二鍾煎七分加酒一二小鐘食前服兼寒滯者加肉桂一錢或吳茱萸五分火盛內熱血燥不行者加炒梔子一二錢微熱血虛者加芍藥二錢血虛澀滯者加牛膝血瘀不行者加桃仁二十粒去皮尖或加蘇木元胡之類瘀極而大便結燥者加大黃一二錢加味歸脾湯見本卷胞漏小産門附歸脾湯下加味逍遙散見本卷子懸門附逍遙散下腸覃似孕並蓄血似孕論婦人腸覃似孕乃寒氣客於腸外與衛氣相搏氣不得榮因有所繫瘕而內著惡氣乃起瘜肉乃生其始生大如雞卵稍以益大狀如懷子按之則堅推之則移月事以時下此結氣大腸為氣病而血不病故月事不斷當用散氣之劑治之其蓄血似孕因多鬱怒經閉不月腹漸大初時人以為孕至過月不産諸證漸見此蓄血子門為血病當破血藥下之孕婦出痘論凡孕婦出痘熱能動胎胎落則氣血衰敗而不能起發灌漿矣故始終以安胎為主外用細軟之帛緊兜肚上切不可用丁桂燥熱之品及食牛蝨毒物之類以致觸犯其條芩白朮艾葉砂仁之類與痘相宜者採而用之其初發熱則以參蘇飲發之痘即出後則多服安胎飲保之渴者則用人參白朮散加減瀉者則用黃芩湯合四君子湯內加訶子血虛者則以四物湯加托藥色灰白而起發較遲者則用十全大補湯去桂服之總之不問輕重悉以清熱安娠為主更有孕婦出痘正當盛時忽臨正産者勢必氣血俱虛亦只以十全大補湯大補氣血為主虛寒者少加熟附若腹中微痛者此惡露未盡也宜四物湯加乾薑桂心木香黑豆用熟地黃而去芍藥蓋恐寒涼有傷生氣然有當用者酒炒用之若寒戰咬牙腹脹不渴而足冷身熱者此乃脾胃內虛外作假熱也宜參耆歸附木香之類一二劑而愈者吉不愈者凶若孕婦肥胖者則氣居於表而慊於內也人參可多黃耆宜少多加帶殼縮砂切忌脫蒂果子之類至有痘將收靨忽作泄瀉口渴飲水小便短少其痘胖壯紅潤者此內熱也宜用五苓散內加黃芩芍藥之類若至滑瀉不止食少腹脹而足冷痘色灰白脈細無力者此犯五虛必死之證也凡婦人方産之後或半月左右適逢出痘者此無胎孕繫纍惟氣血尚虛治宜大補營衛為主若痘出多者則加連翹黏子之類大便自利者則用肉果炮薑之類余即照常一例而治不必多疑反生他誤至於孕婦出痘在於初出之時胎落者則血氣雖為大虛然熱毒亦因走泄兼之未經起脹灌漿則血氣未曾外耗倘痘非險逆加以大補托裡每多得生至於收靨之時胎落者則毒已出表消散亦多無事但重虛而元氣易脫倍宜補益耳若正當起脹灌漿而胎落者則氣血衰敗內外兩虛既不能逐毒以外出則毒必乘虛而內攻其為不救者多矣黃芩湯治熱痢黃芩炙草芍藥各等分大棗五七枚水煎服參蘇飲見本卷喘急門安胎飲四物湯俱見本卷安胎門人參白朮散見本卷泄瀉門四君子湯見本卷胎逆上逼門十全大補湯見本卷胎不長養門五苓散見本卷泄瀉門附四苓散下妊娠麻疹論妊娠出疹當以四物加減而加條芩艾葉以安胎清熱為主則胎不動而麻疹自出矣然熱毒蒸胎胎多受傷但胎雖傷而母實無恙也蓋疹與痘不同痘宜內實以痘當從外解故胎落毒氣乘虛而內攻其母亡疹宜內虛以疹當從內解故胎落熱毒隨胎而下其母存雖然與其胎去而母存孰若子母兩全之為愈也且古人徒知清熱以安胎不思疹未出而即以清熱為事則疹難出而內熱愈深是欲保胎反足以傷胎也宜輕揚表托則疹出而熱自清繼以滋陰清解則於疹於胎兩不相礙不安胎而胎自安矣如疹出不快宜白虎湯合用升麻葛根湯倍加元參牛蒡治之胎氣上衝急用苧根艾葉煎湯磨檳榔服之再以四物湯進之熱甚胎不安服固胎飲數劑如又不愈腹疼腰痠即知胎有必墮之機如胎墮即以産法論治矣升麻葛根湯葛根升麻白芍甘草各等分水一盞煎七分溫服此解表發散之方也表熱壯盛邪實於表經曰輕可去實故用升麻葛根以疏表所以然者升麻能解疫毒升陽於至陰之下以助發生之氣葛根能解熱毒兼疏營衛以導起發之機二味之外又加甘草佐之以和在表之氣芍藥佐之以和在裡之營去其實邪和其營衛風寒自解麻疹自出固胎飲止痛安胎地黃川芎各五分歸身人參白芍陳皮各一錢白朮土炒黃芩各一錢五分甘草三分黃連黃柏各一分桑上羊兒藤七葉圓者上細切每服二三錢入糯米二十粒水一鍾煎至七分溫服痛加砂仁血虛加阿膠白虎湯見本卷瘧門附桂枝白虎湯下四物湯見本卷安胎門
