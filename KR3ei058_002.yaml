body:
  text: 卷之中脈訣歌欲産之婦脈離經一息六至一息三至皆曰離經又云脈如歇止亦謂之離經沉細而滑也同名腎脈沉滑與離經同夜半覺痛應分娩來朝日午定當生身重體熱寒又頻舌下見脈黑且青捲舌流涎腹覺冷腹中子女已歸陰面赤舌青細尋看母活子死是定斷唇口俱青沫又出母子雙雙入鬼案面青舌赤沫又頻母死子活定知真新産婦脈緩滑吉實大弦急死相侵若得沉而小者昌忽若堅牢命不長寸口澀疾不調死沉細附骨不絶生吉凶生死全憑脈疹者須教指下明啓蒙曰欲産之婦脈離經離經之脈認分明其來大小不調勻或如雀啄屋漏應腰疼腹痛眼生花産在須臾卻非病脈經云脈勻細易産大浮緩氣散難産保産論凡妊娠之於分娩母子性命懸於頃刻調理失宜安反成危將養有方逆可使順故凡胎前諸證當隨證加減保護調理甫及臨月若婦女初産原未慣經不免驚畏失錯雖慣産之婦然氣血亦傷又安得恃為無虞也是以保産之方斷不可廢故達生散宜用於八九月之時而養胎神寢等藥當用於臨月之際倘遇過月不産則補血行氣之方不可稍緩至於居處失宜頓撲動胎及身居安逸食物不節憂樂不常致胎氣難轉或胞漿先破惡水來多胎幹不下則保生千金不換萬全保氣滑胎等劑猶宜按證選方制服豫家傳胎産金丹不特治胎前産後為第一奇藥即臨産服之保生易産且勝催生諸藥更無産後諸患若制此藥備用較勝諸藥萬萬矣至於神煞符咒亦難謂盡妄如受胎之後胎殺所在不惟損胎甚至損母俱宜謹慎而臨月安産産下藏衣猶為緊要不可不知至所謂雷公招搖運鬼力士天狗等神方向及生氣方之宜向禍害月絶命方八床方之宜避昔人填入産圖使人知所趨避似屬太瑣若拘拘於圖又不免避此觸彼之疑不若體玄子之借地法既可以避神煞又可以消俗疑因並録之於後達生散孕婦八九個月時宜服數劑人參陳皮紫蘇各五分白芍酒炒白朮土炒當歸酒炒各一錢炙草三分大腹皮一錢五分用黑豆汁洗曬黃楊腦三個即黃楊樹葉梢兒也蔥白三根水煎服春加防風五分川芎五分夏加酒炒黃芩五分酒炒黃連五分五味子十粒秋加澤瀉五分冬加砂仁五分或通加炒枳殼砂仁胎動不安加金銀箔些須野苧根一錢生地黃一錢氣上逼心加柴胡紫蘇多怒人加炒黃芩佐之食少者加砂仁炒神麯口渴加去心麥冬酒炒黃芩能食倍加黃楊腦此味瘦胎若胎瘦不用有痰加薑製半夏炒黃芩豫按達生散即紫蘇飲方去川芎加黃楊腦白朮又一方無當歸白芍白朮祕傳達生散孕至八九個月服之易産奇效大腹皮三錢黑豆水洗淨人參紫蘇連莖葉陳皮炙草砂仁各五分白朮土炒白芍酒炒當歸酒炒各二錢枳殼七分麩炒青蔥五根水煎食前服至十餘劑甚得力豫謂前達生散不及此方穩妥有效但大腹皮體輕此方用三錢似乎太過不若依前方一錢五分或加至二錢則此方更覺全美矣養胎散宜與神寢丸兼用當歸酒洗川芎黃芩陳皮白朮土炒制香附各一錢白芷甘草各三分人參七分人虛者倍之水煎去渣調益元散服臨産小便多者不宜加益元散神寢丸臨月服之易産氣盛者可服素虛者忌用乳香一兩透明者另研枳殼二兩麩炒為末煉蜜成丸如梧子大每早溫酒送下三十丸保生無憂散臨産服之補其血順其氣自然易産當歸酒洗川芎白芍酒炒枳殼麩炒乳香木香血餘上等分每服二三錢水煎日二服神效為末服三錢亦可或胞肥厚根蒂堅牢者服之使其易産又治小産瘀血腹痛如臨産胞衣既破其血已涸或元氣困憊非此藥可治急用八珍湯斤許水數碗煎熟時飲救之亦有得生千金不換方一名保産無憂散當歸酒浸川芎菟絲子各一錢五分黃耆八分蜜炙白芍一錢二分冬季用一錢川貝母一錢去心枳殼六分麩炒厚朴七分薑汁炒蘄艾羌活各五分荊芥穗八分生草五分加生薑二片水二碗煎八分空心服臨産不拘時服制度分兩不可加減如臨産一二日前覺動履不安服一劑可保無憂此方屢經試效保氣丸治孕婦居處失宜頓撲動胎服此寬氣進食瘦胎易産制香附木香各四分山藥二兩益智仁五分砂仁粉草各一兩紫蘇葉五分為末煉蜜成丸如梧子大每服二錢滾水送下滑胎煎胎氣臨月宜常服數劑以便易生當歸三五錢熟地三錢杜仲鹽水炒斷絲山藥炒各二錢川芎枳殼麩炒各七分水二鍾煎八分食前溫服如氣體虛弱者加人參土炒白朮隨宜用之如便實多滯者加牛膝一二錢滑胎散臨月服之易産人參八分如壯實不用陳皮七分川芎制香附黃芩紫蘇大腹皮各八分黑豆水洗淨白芍炒白朮土炒當歸酒洗各一錢砂仁五分炙草三分加薑三片蔥頭一個水二鍾煎八分溫服如冬月加麩炒枳殼一錢尊生書云孕婦月足臨産八珍湯預服十數劑最易生育再無難産之患家傳胎産金丹治婦人經水不調諸虛百損種子安胎及胎前産後諸證應效如神當歸酒洗丹皮水洗曬乾勿見火蘄艾醋煮延胡索酒拌炒乾川芎益母草取上頭半截童便浸曬乾青蒿人多內熱者更宜不用亦可白薇洗淨人乳拌人參赤石脂火煅水飛亦可白茯苓川藁本洗淨白朮土炒各二兩生地酒洗煮不犯鐵器鱉甲醋炙各四兩香附共四兩醋酒鹽童便各浸一兩桂心沒藥去油粉草酒炒各一兩二錢北五味一兩去梗焙沉香六錢以上共為細末再用新鮮頭次男胎紫河車一具長流水浸半日洗淨黑鉛打成大鉛罐一個將河車放在鉛罐內再將黃柏四兩放在河車下加白酒釀二斤清水二碗灌滿鉛罐仍以鉛化封口再以鐵鍋盛水將鉛罐懸在鍋內煮兩日夜為度取出搗爛和入藥內拌勻曬乾再研為末煉蜜丸彈子大每丸重三錢五分水飛硃砂為衣再以黃蠟為皮如蠟丸式收貯治證開後一婦人臨産米湯化服一丸助精神氣力分娩順利一産下童便好酒服一丸神清體健再無崩暈之患一産後每日服一丸服過五日氣血完固自無他病一行經後川芎當歸湯服一丸服之三日必然有孕一苦於小産者胎動欲産白滾湯服一丸睡半日其胎自安每月常服二三丸保全足月分娩無憂一産後血崩童便好酒服一丸即止一産後血暈者當歸川芎湯服一丸即醒一産後驚風防風湯服一丸即解一兒枕痛者山楂黑砂糖湯服一丸即止一胞衣不下乾薑炒黑煎湯服一丸即下一産後虛怯者川芎當歸湯每日服一丸十丸全愈一凡産後諸證俱加好酒童便服皆保命護身回生起死其功不能盡述家有孕婦者宜早備之催生萬全湯見本卷催生門益元散見下卷淋證門八珍湯見上卷諸痛門胎殺方位孕婦宜避正月在房床二月在窗戶三月在門堂四月在灶五月在身床六月在床倉七月在磨碓八月在側戶九月在門房十月在床房十一月在爐灶十二月在房床子丑日在中堂寅卯辰酉日在灶巳午日在門戌亥日在房未申日在籬下房中遊神方位忌安床換帳甲辰乙巳丙午丁未日在房內東庚子辛丑壬寅日在房內南六戊六己日在房內北生子宜向方子午卯酉日宜西南寅申巳亥日宜西北辰戌丑未日宜東南安産藏衣宜向方正三五七九十一月壬日安産丙位藏衣其餘皆雙月甲位安産庚位藏衣又云藏衣忌太歲方三殺方宜用稍大平穩瓷瓶將衣胞內安入五種果子如棗兒蓮子之類每樣數枚宜單取再生兒之意並將胞埋深土以防畜類刨挖安放平穩令兒不驚瓶器稍大兒不吐乳至於遊年白虎殺神安産藏衣俱忌太歲退一位即是也如子年在亥丑年在子余以類推體玄子借地法凡孕婦臨月擇天月二德吉日令善書者先期齋戒三日至日汲新水研朱於黃紙上焚香書曰東借十步西借十步南借十步北借十步上借十步下借十步壁方之中四十餘步安産借地或有汙穢或有東海神王或有西海神王或有南海神王或有北海神王或有日遊將軍白虎夫人遠去十丈軒轅招搖舉高十丈天符地軸入地十丈令地空間産婦某氏安居無所妨礙無所畏忌諸神擁護百邪速去急急如律令書畢帖孕歸牆壁上則不須避忌矣臨産須知十四則一孕婦似産未産須知凡胎孕臨月胎忽亂動而腹痛不甚或作或止或一二日或三五日之後方生名曰弄胎不可孟浪坐草須靜以待時或胎水已來腰不痠痛而不生者亦曰弄胎所以有瀝漿生其漿流一二日不産俟流漿漸少方生倘漿來過多恐胞干難産亦非所宜須八珍時服助其血氣可望無慮又有一月前忽然腹痛狀如即産卻不産者名曰試月又有腹雖痛而腰不痠痛脈未離經而不産者又有腹雖痛而未下垂胎雖轉而兒身未正亦非當産時也要知腹中痛陳乃兒破衣轉身也氣壯者轉身自易氣弱者轉身較難衣薄則破速衣厚則破遲所以有腹痛一二日方生凡孕婦須當寬心以待其自然之勢切不可亂用氣力強産以致枉命至於自然當産之時必有緊陳如臍腹痛急腰痠重痛眼中如火肛門迸急等類齊至待兒身已正頭到産門用力一送即下然亦有腹覺微痛或腹竟不痛止覺腰痠下墜而産者蓋腎候於腰胞系於腎故也古人云時至自然分娩譬如登廁未急不能催時急不能止此理雖俗知此免患一臨産自有先兆須知凡孕婦臨産或半月數日前胎腹必下垂小便多頻數至欲産時脈先離經拭捏産婦手中指中節或本節跳動方是臨盆時候一轉胎調攝須知凡孕婦兒身轉動其腹必痛雖遲日不生切勿驚怕且令人扶持在房中行走或倚物而立直其體腹倘精神稍困則以被褥壅墊脊背仰臥少頃又令行立聽腹中慢慢轉身雖遲無害且宜稍寬裙帶以便兒在腹中轉舒有餘地也若不禁痛苦或傴僂屈曲斜倚側靠胎中不免為之擁擠迷其出路穩婆不解此理但見生遲頻頻試水誤傷胎破或風入産戶而成腫脹或胎未至而胎水先干分娩愈難矣遇此者惟令産婦勉強飲食調其氣息或用活血滑胎之藥佐之活血滑胎藥方俱見催生門候子逼門戶方盡力一努胎隨漿下矣此乃瓜熟蒂落之理切不可預使氣力令精神失倦臨期反致疲困此産家最要緊處曾見一婦臨産畏痛曲身坐臥以致胎元轉動不順兒出胞時尋到産門被母曲身遮閉因不得出少頃再轉母又護痛再閉如此兩三遭則子無力而不能動至於難生人又見子不動則謂死胎其實子無力非死也隨令産母正其體腹不時行動坐立心安氣和勉強飲食俟兒少停氣復再轉至産門果順易生下一穩婆宜加選擇須知凡孕婦臨産當選年高有經識穩婆及純謹婦女一二人扶持倘誤用無知孟浪婦女收生不審察是正産與轉胎一見腹痛亂將雙手摸孕婦腹上夾腹兩邊重按欲其直下以免橫生此第一誤人性命者夫腹初痛則胞衣未破而欲破之時也兒將分娩心中亦有靈性矣見腹外揣摩兒不知為何物遽生驚恐則縮不敢動胞衣又何時而得破乎更有穩婆無知害人私用手指掐破水衣者極須防範夫胞漿乃胞內養兒之水兒既折破自隨水而下若過時不得分娩是胞元無力轉頭較遲恐致漿盡血來閉塞道路令子無路可通胎澀不行用保生無憂散以固其血如血已耗八珍湯加益母草濃煎時飲之倘元氣困憊急用上好人參兩許當歸二錢煎飲飲盡再煎服助其氣血最為得力舍此而用催生耗氣諸藥總無一效也或先服八珍補養氣血次煎濃蔥湯令穩婆洗産戶使氣上下通暢更用酥油滑石塗産門次服催生萬全湯亦妙一臨産避忌須知凡孕婦臨産之月不可洗頭濯足犯者胎多難産若至臨盆之際凡系門窗箱籠瓶甕之屬俱宜鬆開以及一切外來親戚並孀婦閨女喪孝尼姑與穢汙不潔或月經適至或原有體氣婦女皆足以觸胎致殃俱宜防備避忌俗忌多人知覺蓋多一人入房則多一時遲延此雖俗論卻有至理恐産婦心煩以致難産也一臨産宜肅靜須知凡孕婦臨盆房中不得喧鬧即有意外緊事戶外不得叫喊倘令産母恐懼驚心則胎滯氣結不行而難産經云驚則神散憂則氣結恐則氣怯怯則上焦閉閉則氣還還則下焦脹氣乃不行矣此氣結不行以致難産更有産母兩尺脈絶他脈平和此乃下焦脹氣閉不行難産之脈急用紫蘇飲散結行氣而産矣一臨産飲湯須知凡孕婦分娩之時心下煩悶口渴用白蜜半杯溫湯化開飲之如欲飲水但可與清米湯飲之蓋蜜能潤燥滑胎米飲能助中氣也有人臨産進飲食及服藥而皆吐出吐後仍進飲食服藥使其人不乏力不幹澀亦自立下不必慮其吐出也是以産母不可令其飢餓飢則中氣虛乏無力送胎須少用粳白米稀粥或飲以母雞煮汁但不可食肉及堅硬食物恐凝於上焦氣不得下不惟難産須防內傷又不可太飽常令稍飢為佳蓋飢則氣下氣下則産速也豫謂口渴不能食及吐須飲以獨參湯最妙且能催生一孕婦産異須知幾婦人常産之外有異産者八曰橫産逆産坐産礙産偏産脹後産盤腸産浪臍産等名皆由孕婦氣血虧虛或坐草探水用力太早所致凡遇此等異産須令産母仰臥勿得驚懼選其歷練有經識穩婆料理各産治法列之於後如橫産手先露者世傳為覓鹽生令産母安心仰臥以鹽塗兒手心再以香油抹其所出之手穩婆輕輕送入或兒手得鹽肌肉醃螫且痛且縮而收者待兒轉身頭正扶起産母用力一努兒即出矣如逆産足先露者相傳為踏蓮花生令産母仰臥不必驚憂用鹽塗足心亦用香油抹其所露之足穩婆輕輕送入候兒轉身頭正用力生下凡遇橫逆之産母子存亡在頃刻若無急救之方法何以成醫之神聖歟其胎産之所以致橫逆者或因兒身尚未轉順方轉至手足被産母用力逼出或因産母氣血素虧其子無力轉身而手足先出者俱速用塗鹽抹油法送入其用力逼出手足者送入猶易轉正勿藥亦可若素虛無力轉身者急煎救逆湯服之助其氣血送入少頃兒自有力轉身俟頭正産門而生下矣但兒之手足切不可任其久出更不可令其多出若見兒手或足略出時則急以鹽塗法治之若出多及時久則手足青硬難以送入而子必傷切不可誤聽凶婦用刀斷兒手足一動刀刃子必腹中亂擾而傷母矣世有用針刺兒手足者有治逆産用手抓兒足心者豫謂恐兒驚縮有傷觸母心之虞不若鹽塗為便也如坐産臀先露者世俗為坐臀生令産母仰臥亦如前法抹油推入候兒轉運扶正然後用力送出或於當高處牢系手巾一條令産母以手攀之輕輕屈足舒伸以開生路兒即順生如礙産乃門戶俱正兒亦露頂而不下者此必臍帶絆住兒肩俗名背包生亦令産母仰臥穩婆輕輕推兒向上以手中指輕按兒肩摸去臍帶扶正兒身一努即生下如偏産乃生路未正被産母用力一逼兒頭偏抵産戶不下者不知者但云兒已露頂非頂也乃額角也亦令産母仰臥輕輕推兒近上以手正其頭用力一送即下如脹後産乃兒頭後骨偏柱産母穀道不得下者令穩婆以棉衣炙暖裹手急於穀道外旁輕輕推頭令正然後用力即生下矣或用膝頭令産母抵住亦可如盤腸産子腸先出者世人莫不驚畏然無妨礙令産母安心仰臥急將淨盆盛溫水冬則再加稍熱加入香油養潤待兒並胞衣俱下穩婆香油塗手徐徐送入令産母兩足夾緊穀道腸自收上有用醋和冷水令人噴面一噴一收以漸收之又有神應丹貼法然此噴貼之法腸雖可收豫恐誤事不若皂角末吹鼻嚏作自上又有腸被外風吹乾不收者用磨刀水少許火上溫過以潤其腸後用好磁石煎湯一盞服之其腸自收又有兒並胞衣下後膀胱即尿胞壅出産戶者同前法送入凡此子腸膀胱先出皆平日氣虛因努脫出並用力太早內臟動搖氣虛下元不固關鍵不牢之故若此番經過須防下次此後無孕時多服地黃丸加五味子肉桂各一兩以固下元之關鍵及有孕多服胡連丸加人參以補氣又服三補丸以涼血如滑胎瘦胎等劑不可輕服八個月時宜服八珍加訶子瞿麥粟殼蜜十餘劑豫意須預服補中湯升提之藥於前庶臨盆可免較之服胡連三補以及粟殼等藥穩妥而不繁雜也如浪臍産胞衣臍腸先出者凡兒出胞時頭必轉向産門自然正産若無力轉運腳踏胞衣臍腸先出急令穩婆理清推入稍俟氣平乘勢就其腳下不可推轉久延久則臍腸復下便難收拾矣一臨産雙生須知凡孕婦臨産一兒已下又見一兒此係雙胞惟穩婆自知之只云取胞待生下方言恐驚母成産患也一候胞衣生下須知凡産母生子出戶時人即以兩手抱産母胸前産母亦自以手緊抱肚腹令胎衣下墜如胎衣來遲切勿慌忙用草紙燒煙燻鼻即下如再遲則急斷臍帶洗兒仍用軟帛物系墜臍帶此帶極脆系時尤宜輕巧牢固然後截斷若不斷臍帶恐血反潮入胞中脹而不下攻心則傷如穩婆諳事者能以手指取下甚便取法見後胞衣不下門一悶臍生須知凡兒産下即啼此正理也如兒下地氣悶不啼相傳寤生呼父乳名手拍兒股即啼者此理亦未講明蓋兒糞門有一膜悶住兒氣故不能出聲拍之則膜破而能叫哭矣如拍之猶不破須令女人中有輕巧者以銀簪腳輕輕挑破甚便或不能挑急用棉絮暖衣將兒緊包拘於懷內勿令散放未可遽斷臍帶速用熱水浸其胞衣寒天則置炭火中煨之仍作大油紙捻點燈於臍帶上往來燎之蓋帶連兒臍久則熱氣內鼓其膜自破膜破則出聲而蘇方可斷帶洗浴亦有用蘄艾為捻香油浸潤熏臍帶至焦使熱氣內鼓破膜又一法用燈心囟門點爆數下均治悶臍生法也一兒生即死須知凡兒生下即死者急看兒口中前上齶上有泡以手指摘破用帛拭血令淨若血入喉即死去血即生其泡中白米如針嘴尖亦須刮去不可令其入喉也一凍産須知凡孕婦臨盆時值冬月天寒産母經血因冷則凝致兒不能速下務於房內四處設爐置火常有暖氣如春且下部不可脫去棉衣並不可坐臥冷處使産母背身溫和臍下腿膝間常暖血得熱則行兒自易生也炭須在房外燒紅送進産房否則生炭氣味恐産婦發暈一熱産須知凡盛夏産婦要溫涼得所用冷水房內灑灑或多放水盆或遠設冰塊以解其鬱蒸之氣若遇風涼陰雨亦當謹避不可貪涼恐增疾病房內不可人多恐熱氣逼襲令産母心煩熱血沸騰有鬱冒沖暈之患救逆湯治産母氣血素虧子無力轉頭手足先出人參一兩當歸三兩川芎二兩紅花三錢水煎速服久之不順再煎再服三補丸專治血熱黃芩炒黃連炒黃柏炒各等分為末蜜丸白湯下八珍湯見上卷諸痛門保産無憂散見本卷預服易産諸方催生萬全湯見本卷催生門紫蘇飲見上卷安胎門神應丹見本卷惟生門六味地黃丸見上卷諸能門附六味地黃湯下胡連丸見上卷安胎門補中益氣湯見上卷諸痛門難産有五因一凡婦人懷孕惟賴氣血養護時常行動則氣血周流胞胎活動骨縫關節處亦常鬆動臨産自易如久坐久臥氣不運行血不流順胎亦沉滯而不活動骨節亦緊而不松泛故令難産常見田野勞苦婦女忽然途中腹痛立便生産可知一胎之所以養賴母之所嗜因子母之氣呼吸相通是以胎之肥瘦在母之素日奉養厚薄何如耳如母平時恣食厚味不知節減多致胎肥衣厚而難産常見糟粳之婦容易生産可知一古者婦人有孕即居側室不共夫寢恐欲火動中氣血沸騰而消耗胎系胞中全資氣血育養一有所犯五月以前故多胎漏小産五月以後每致胞厚難生更且漏泄胎元子多不壽瘡痘疹毒子疾難醫不然但看馬牛犬豕胎胎易個個存何也蓋因馬牛犬豕一受孕後絶不交合而人受孕不能禁絶矧有縱欲無度者乎人畜不同稟生則一可不慎歟一凡新婦初産神氣怯弱未曾經慣切不可與言産變之事恐懷憂懼心懸氣餒原本易生反成難産矣況子戶未舒更恐護痛腰屈不伸展轉傾側撩亂多時精神困乏兒不得出即中年婦人生育既多氣血虛少均慮産時艱難氣血虛少精神困乏俱宜獨參湯催生甚妙余則參看臨産須知並催生及交骨不開門一孕婦有素常虛弱飲食減少至臨産乏力或因兒未欲出用力太早及兒欲出母已無力令兒停住産戶乾澀産亦艱難用催生萬全湯最妙或獨參湯催生亦妙有等婦人臨産不能飲食用人參三二錢煎湯服之大助精力甚於肉食百倍催生論經曰一息不運則機緘窮一毫不續則霄壤判所謂氣血周流循環一身無有間斷也是以妊子者兒在腹中母子一氣流通全賴漿水滋養十月數足其子形神俱備氣血完全忽如夢覺自然求路而出兒既出胞母子分體呼吸殊息豈可久羈於內而使氣血不運不續哉所以産子譬諸果熟蒂落有自然分體之勢豈可早用催藥以逆其性至於催藥原為調扶失宜致成難産不得已而用也如胎壯則隨漿易産何必用藥催生若胎弱則轉慢遲生有致困乏漿干瘀塞不下橫逆子死難産等類治者滋其營益其氣使子母精神接續運行得力溫其經開其瘀使道路通暢子易轉舒再得老成穩婆在外細心接取自獲大小平安切勿用力太早虛費精神猛劑催生反傷血氣更不可妄信符水況符水非得真傳亦未必靈驗且血得寒則凝血凝則胎亦滯矣何能望其速生也夫産育一門全仗氣血用事無補精神之藥焉圖胎産之功徒傷氣血之和反貽産後之疾加獨參湯者大補元氣助精神而生津液臨産服之易生再如催生萬全湯細心周匝補接開導升降溫行産際用之催生甚為有益産後亦備得其宜是以名為萬全湯者矣後開催生諸方以備擇用其內有治橫逆産者當用臨産須知內手法施治為上但恐人又不善用手法致産母經久困乏難生不得不借藥力助其氣血精神使兒轉正速生也丹溪用佛手散治死胎不下並催生最效捷豫曾用胎産金丹催生死胎亦下再催生湯催生甚穩而效獨參湯附論催生第一方人參二三錢或四五錢論曰人參固為催生之妙品然用之不得其法往往有失誤之處而人不知覺也若生産之痛陳未來兒先必轉胎腹痛人未明此理以為將生之時即煎參湯與飲助其氣力未免失之過早如産母平素氣血虧虛則有益無害若遇壯實婦人並非因虛難産致提固胎氣上逼心胸脹悶不下反成難産矣如生陳已來腰痠腹痛穀道迸迫目中流火適值兒正出戶方飲參湯且一飲而盡豈不失之過遲而急及産下之後正欲逐瘀之時其參力方鋭瘀血受補凝滯不行勢必上行奔心等患且有用至一二兩者尤宜慎之是以古人治産後非急證不用人參且多以芎歸合用其意深矣豫謂臨産之時預備上好人參四五錢如産婦少壯臨盆安順亦無需參湯以助其力如中年産婦産育過多或平素瘦弱或生産艱難經日不下或錯過生陳或亂用氣力以致氣乏力倦及至正産之時反無力送胎可用人參二錢或三錢煎服自然易産至於尋常生育恐臨期艱難預用人參二三錢煎就用重湯溫著俟漿胞破時令産婦飲兩三口以助氣力少停再飲二三口頻與慢服不過助其氣力以催生耳生下即已不必多參盡飲以招尤也或用上好人參一枝含口內生津助氣亦妙至於橫逆等生須用前論手法施治再服參湯以助之蓋人參能補氣升提使産母不至倦乏亦能令兒升舉轉身為順自易生矣催生萬全湯附論人參三錢至五錢大補元氣以為君當歸三錢大補營血以為臣去蘆川芎一錢入肝以疏鬱滯少寓升提之性則降下之藥得力桃仁十三粒不去皮尖搗碎取苦可去舊甘能生新滑能潤下乾薑一錢溫能通行血分炒焦黃色則令其下降而遏其上升也炙草六分令其藥性少緩中宮得受補益不使即為下墜也牛膝梢二錢既能下行復走十二經絡令其經絡無壅則氣血效力以為運行推出之勢紅花三分多則破血少則活血生新耳酒炒肉桂臨煎方去皮切碎六分冬天用八分藉此引經率領諸藥直入血分且溫可通行散瘀則生産自易加膠棗一枚水煎食前溫服如産婦壯實及無力服人參者去參用之其催生之效尚能倍於佛手散多多矣論曰婦人臨産關係母子性命實存亡頃刻之時是以古人立方甚多然産育乃大傷氣血者也其難産又多由氣血不足産後諸疾固屬氣血大虧然産後諸虛皆因産前所致奈佛手散兔腦丸及葵花益母諸方無非活血順氣滑胎破瘀溫暖通竅以圖運行推出之勢全不管運行推出之源産婦精力壯者藉此開導得以易生倘氣血不足則雖有催生開導之功而無運行藥勢之力抑何補哉至於手握石燕足貼萆麻設遇實證順證假此安心候時如當氣血精神虧極用此敷衍之方神氣內竭勢如隔靴搔癢不調氣血而強用催生何以為運行之具徒存虛名而無實效誤人性命於頃刻豈不痛哉惟達生散立方平正奈只可調理於産前生化湯用意甚深又只可調理於産後並非可濟危急催生之用者今萬全湯乃體二方之意合成一方務取萬全屢用甚驗故以萬全名之先以調補氣血佐以散瘀下降溫中使氣血得力自能健用催生此不催之催也故用人參當歸為君培補氣血壯其主也少加桃仁川芎黑薑炙草酒紅花溫中而散其瘀也牛膝梢桂心溫行導下使無上逆衝心之患不惟催生神效産後更無瘀血凝滯百病不生補而兼溫則不滯溫而兼補則不崩升少降多則氣得提而易下降而兼升則瘀自去而新自歸補多瀉少邪去而元氣無傷苦少甘多瘀逐而中和仍在豈非萬全催生者乎催生佛手散全當歸一兩川芎五錢龜版七錢酥炙透水煎服一方去龜版加益母草三五錢油蜜飲治産難數日不下並瀝漿胞干白蜂蜜半碗真麻油半碗共一碗煎一二沸掠去浮沫服一方加童便服三合濟生湯治臨産艱難一二日不下服此自然轉動下生當歸三錢川芎二錢枳殼二錢麩炒紫蘇八分大腹皮一錢五分薑汁洗甘草七分水煎服待腰痛甚服之即産魚膠散治難産魚膠五錢同麵炒成珠去面將膠研細末用熱酒沖服少頃即産催生簡易方催生時藥不便就將本年大統歷日黃紙殼面刊有欽天監奏準云云並有印信在上者扯來不要人見用火燒為灰將灰調酒一杯與産婦吞之即時産下又有請本地方官或府州縣差簽一枝在簽上朱書某縣知縣某人要寫名字在此立候催生將簽字倒豎於産房門檻內即刻産下仍既將簽繳回本縣奇驗奇驗催生如意散臨産腰痛方可服用人參一錢乳香一錢辰砂五分共為末臨産時用雞子清一個調藥以生薑自然汁調開和勻冷服如橫生倒産即時轉正子母全安催生芎歸湯即佛手散但與佛手散煎服之法不同耳故又名催生芍歸湯治因事觸胎子死腹中疼痛口噤用此探之不損則痛止子母俱安損則立下臨産催生並治橫逆難産等證當歸六錢川芎三錢水二鍾半煎欲干時入頭酒一鍾煎沸溫服口噤灌之如人行五里再服不過三服即生有一婦人生産三日不下用此方加入益母草二兩酒水各一碗煎飲服之即生曾有人止用本方治橫生倒産頻服順生屢效蔥白益母湯治難産益母草五錢蔥頭三錢用紋銀一錠要重四兩水二碗煎一碗服之即生神柞飲催生甚速並治橫逆倒産死胎在腹生柞樹刺枝如小指大者一握水洗淨切碎一葉一刺者處處有之甘草五錢一方五寸新汲水一碗半用新瓦罐入水與藥於內以紙三層密封文武火煎八分溫服不煎渣凡覺腹疼腰重欲坐草時即將此藥溫服一盞便覺心下開豁如渴又飲一盞覺下重便産更無難生橫逆之患若遇橫生倒逆不過三服即正子死腹中不過三服即下能保母子兩全最為神驗曾有一婦橫産兒手先出致胛腫脹欲截其手不保其生屢服催生藥不效以此藥濃煎一碗與服頃刻蘇醒再與一碗困睡少時忽云我骨節都拆開了快扶我起來血水湧下拔出死胎全不費力此方救人百發百中然據石室祕録云宜慎用論見後加味神柞飲方中祕録加味神柞飲附論治兒頭已到門久而不下此交骨不開之故柞木枝一兩或五錢當歸二兩川芎一兩人參一兩煎湯服之如兒頭到門久而不下服此少頃必然一聲響亮兒即生矣真至奇至神之方也論曰倘兒頭不下萬萬不可用柞木枝蓋此味專開交骨兒未回頭而兒門先開亦死之道故必須兒頭到門而後可用此方也豫謂前方獨用柞木枝治橫逆及難産且云欲坐草時即溫服一盞須防太早有失不若俟兒頭到門久不下時服之為當乳朱丹一名開骨膏治難産並交骨不開乳香不拘多少或遇三月三日五月五日七月七日研細用豬心血為丸梧子大硃砂為衣曬乾收藏值難産者以涼酒化下一丸不産再服或蓮葉蒂七個水二鍾煎一鍾化服神效伏龍肝散治橫逆難産伏龍肝即對灶心之土多年紅者佳速研細末溫酒調下一錢兒頭即帶土而出矣二脫散治橫逆難産蛇脫全一條蠶故紙一張二味新瓦瓶內鹽泥固濟燒存性為末煎乳香湯調下一錢連三服神效綱目煎榆白皮湯調下一錢豫謂此方藥峻宜慎用膠葵散治橫逆難産阿膠一兩蛤粉炒成珠黃葵子一兩每服四錢水煎服催生如神散一名黑神散治橫逆産並治月水不止崩漏證百草霜血得黑則止胞水過多催生可用白芷各等分不見火為末每服二錢以童便醋和如膏加沸湯調連進三服能固血又免血涸一方加滑石每服三錢催生如聖散治胞水乾澀兒在腹中不動或漿血來閉塞道路難産之證黃葵花二錢焙乾為末熱湯調下神效或有漏血胎臟乾澀難産痛劇者並進三服良久腹中氣寬胎滑即時産下如無花以黃蜀葵子為末二錢酒服亦可如胎死不下紅花煎酒調下經驗方用子四十九粒或三十粒歌曰黃金丙子三十粒細研酒調能備急命若懸絲在須臾即令眷屬不悲泣手握丹即兔腦丸治産婦生理不順臨産艱難十二月兔腦髓去皮膜研成膏乳香一分研細一方二錢無麝香母丁香一錢研末麝香一字研細將藥研勻用兔兒腦髓和丸如芡實大陰乾油紙封貯每一丸溫水送下則男左女右手握出琥珀黑龍丹治臨産難生或胎衣不下産後血暈不省人事血崩惡露腹中刺痛血滯浮腫血入心經語言顛倒血風相搏身熱頭痛胎前産後諸證五靈脂酒研澄去沙當歸酒洗乾地黃川芎良薑各二兩上入砂鍋內紙筋鹽泥封固煅紅候冷取出研細百草霜三錢乳香生硫黃琥珀花蕊石煅各二錢上五味計一兩一錢為末同前研細之藥和勻米醋煮麵糊為丸如彈子大每臨用炭火煅藥通紅投入生薑自然汁浸碎以無灰酒童便相合頓服豫謂此藥峻厲亦宜慎用催生起痘神驗方治難産並治痘瘡不脹不漿山羊血七八分或一錢此血用酒化開服之頃刻即産且不傷人又無産後瘀阻血暈之患有云此血仍聚兒頂而出又治小兒出痘不起脹不灌漿亦用此血量兒大小或幾釐或一二分或三四分加以酒釀化服其痘不起脹者即起脹不灌漿者即起漿與用雞冠血酒釀之意相同然雞冠血不如山羊血多多矣尊生救生湯治難産並交骨不開全當歸一兩川芎二錢龜版一片酥炙脆打碎頭髮一握燒灰存性酒水煎服虛人或産多力衰者加人參二三錢如人行四五里即下不下急宜再服其他催生藥皆受傷豫謂此方即加味芎歸湯分兩雖殊藥味則一尊生用之而驗多在虛人加參之力耳神應丹又名萬全膏萆麻子七粒去殼將萆麻研如泥入麝一分再研成膏塗産母足心胎下即洗去遲則恐子腸出也如子腸出即移塗産婦頂心腸即收上速去之此方催生下胎雖速藥性猛峻用者慎之一方萆麻子四十九粒去殼研爛治盤腸産敷在産婦頂心待腸收盡而急去之催生湯見上卷胎不長養門又名補血行滯湯胎産金丹達生散保産無憂散滑胎散以上俱見本卷保産門預服易産諸方救逆湯見本卷臨産須知紫蘇飲見上卷安胎門脫花煎見本卷子死腹中門丹溪佛手散見上卷諸痛門附佛手散下子死腹中論凡孕婦胞衣未下急於胎之未生子死腹中急於胎之未下蓋胞衣未下子與母氣尚通呼吸若子死腹中則軀形已冷胞臟氣寒胎血凝沍氣不升降欲下死胎若以至寒之藥用之不惟無益而害母命多矣所以古人有用附子湯使胞臟溫暖凝血流動以附子能破寒氣墮胎也又有因患傷寒熱病溫瘧之類胎受邪熱毒氣內外交攻因致胎死留於胞臟古人深慮胎受毒氣必然脹大故用朴硝水銀硇砂之藥不惟使胎不脹又能使胎形化爛再副以行血順氣之藥死胎即下此古人立方之意後人遵意仿而行之所以有立候下胎散一方然藥味俱多峻厲且有爛肉之能即遇壯實村婦豫猶未敢輕用又何敢施於富貴弱質之體哉況豫屢見死胎人不慌迫亦能遲遲生下並不傷母其故何也蓋人腹中極熱食物入內俱化其胎雖死若産母不驚恐能安心飲食腹內熱氣熏蒸胎自柔軟腐化亦生而不傷母但所出穢氣令人難聞耳豫每治胎死不下用胎産金丹一粒服下頃刻即生但子死在腹其故多端要不過急去其死胎以安産母如胎氣薄弱不成而殞如産母久病胎萎而死如胎肥氣滯惡露已盡致胎乾子死身冷不能出如臨産孕婦護痛兩足不開夾住兒頭以致子死如䦛穩忍耐當值之人不善扶持緊抱其腰傷胎而死如生路不順逆側等證穩婆蠢厲用手莽撞傷子而死如臍帶纏項氣絶而死如兒頭到門交骨不開久而不下以致子死如孕至五七個月胎漏跌僕時證等類傷胎而死用烏金散脫花煎香桂散牛膝琥珀等丸新法下胎神柞飲類擇其宜服者服之死胎自下又有雙軀一死一生者不可不知但雙軀之脈三陽俱盛如少陰腎脈微緊血即凝濁經養不周胎即偏夭或因難産一死一生不去其死害母失胎千金神造散主之但恐虛弱人下胎或有貧富不等醫藥一時未便豫故又擇諸書內丸散及簡易單方開載於後以備選用然下胎最宜謹慎必先驗明産母面赤舌青腹中陰冷重墜口穢氣喘的確方可用下若見紫黑血塊血縷猶為確候亦必先固妊婦本元補氣養血而後下之豫故重佛手散香桂散滑胎煎為下死胎之王道藥也倘孕婦遇有不安醫者未能審詳遽用峻厲攻伐難免不測之禍慎之慎之立候下胎散治臨産或橫逆或血海乾涸或胎死不下死在頃刻皮硝一錢少壯者一錢五分大附子體弱者加三五分煨去皮壯者不用如寒天亦加附子三五分煨去皮用黃酒半鍾煎一二沸溫服立下烏金散局方名黑神散靈苑名肉桂散治産難或熱病胎死腹中或因顛仆或從高墜下或房室驚搐或臨産驚動太早觸犯禁忌或産時未到經行先下惡露已盡致胎乾子死身冷不能出熟地酒焙乾蒲黃當歸交趾桂芍藥軍薑即炮薑去皮粉草各一兩小黑豆二兩炒百草霜五錢上為末每用二錢米醋半合許沸湯六七分浸起溫服疑二之際且進佛手散酒水合煎二三服探之若未死子母俱安若胎已死立便逐下如的知其胎已死進此藥後更進香桂散須臾如手推下常用催生更加好滑石末半兩葵子五十粒捶碎黃柞葉七八皮蔥白二寸順流水煎湯調下蓋滑石能利小便柞葉行氣逐血蔥白能通陽氣氣盛血行即産矣查局方黑神散無百草霜用童便酒各半調服二錢良方黑神散有炮附子半兩無蒲黃簡易方黑神散止用百草霜一味又有加乳沒血竭之黑神散綱目用熟地一斤生薑半斤同炒乾為末烏梅湯下二錢為治産後塊痛之黑神散俱各有證治録此以別黑神散之方不一脫花煎凡將産者宜先服此藥催生最佳並治産難經日或死胎不下俱妙當歸七八錢或一兩肉桂心一二錢或三錢川芎牛膝各二錢車前子一錢五分紅花一錢催生者不用此味亦可水二鍾煎八分熱服或服後飲酒數杯亦妙若胎死腹中或堅滯不下者加朴硝一二錢即下若氣虛困劇者加人參隨宜若陰虛者加熟地三五錢香桂散一名桂香散附救苦散治胎死腹中不下簡便而最效桂心三錢麝香三分一方五分為末蔥湯調服死胎即出溫童便酒調亦可加生川烏三錢為下私胎猛劑一方單用桂末一錢童便調下名救苦散或童便酒調亦可牛膝丸下死胎杜牛膝三兩紫金藤即紫木香蜀葵根各七錢當歸四錢肉桂二錢麝香五分上為末米糊為丸如梧子大硃砂為衣每服五十丸乳香湯送下琥珀丸治婦人或老少或産前産後百病及療三十六種諸病七疝八瘕心腹刺痛卒中癱瘓半身不遂八風十二痹手足痠疼乳中結核結毒懷胎驚動傷犯不安死胎不下琥珀硃砂各另研沉香阿膠炒珠附子制川芎肉桂五味子石斛各五錢牛膝酒浸當歸肉蓯蓉酒洗去泥曬人參熟地續斷木香沒藥各一兩上煉蜜為丸彈子大每服一丸空心食前午後溫酒化開服一方有牛黃珍珠乳香元胡各一兩共二十一味為丸備服凡服法或薑湯或米湯或酒或燈心湯隨證用引若傷寒中風角弓反張用麻黃湯送下孕婦臨月宜一日一服至産順利不覺疼痛凡婦人服至五服十服之後日倍飲食其功不能盡述服者當自覺也新法下胎方即平胃散之變局比平胃散穩妥治胎死腹中最妙或有用半劑者當歸一兩厚朴三錢陳皮二錢酒水各一鍾煎至一鍾入朴硝或一錢或二錢再煎十餘沸去渣熱溫服死胎自下或化水而出或止用脫花煎更妙脫花煎方見前或用佛手散以酒調服亦妙千金神造散如妊娠雙軀一死一生服此生者安死者出矣蟹爪一升阿膠二兩甘草二錢以流水先煮蟹爪甘草去滓納阿膠煬化服之血凝不下加桂心三錢此方用蟹爪以去其死阿膠以安其生甘草和藥性扶羸小品方虛弱人欲下胎宜用此人參粉草川芎肉桂乾薑桃仁黃芩蟹爪上等分每服一兩水二鍾煎八分空心服未動再服仙傳保命丹一名安禳丸又名奪命丹凡孕婦下血不止或小産下血及子死腹中其人憎寒手指甲黑唇青面色黃黑胎上攻心冷汗自出悶絶欲死或食惡物毒藥傷動胎氣下血不止胎尚未死服之可安胎若已死服之自下此方得之仙傳與黑龍丹媲美皆産科之聖藥也丹皮赤芍桂心桃仁白茯苓各等分上為細末蜜丸彈子大每服一丸細嚼淡醋湯下連進三丸神效官桂散治産婦面赤舌青子死母活者或面青舌赤沫出母死子活者或唇舌俱青黑沫出子母俱死者此方下死胎如神官桂五錢去皮丹皮川芎葵子各一錢五分為末蔥白煎湯調下三錢黑神散凡臨産血多胎為血裹以致難産宜棄子救母橫生逆産子死腹中以及胎衣不下血迷心竅頭暈眼花敗血乘虛流散四肢浮腫口渴舌燥乍寒乍熱煩躁發狂言語錯亂其狀如癲或月內飲冷敗血凝聚大便艱難小便閉澀或血流小腸小便出血或惡露未盡誤食酸物收斂因而崩漏或肺敗鼻中氣黑或敗血衝心喉口氣急或血滯脾胃心腹脹滿嘔吐亦似翻胃服之神效當歸熟地白芍炒肉桂炙草各一兩棕灰蒲黃沒藥血竭各五分乳香三錢赤芍八錢為細末每服二錢溫酒調下雞尉下死胎法烏雞一隻去毛細切水煎二三升候湯通手用衣帛蘸摩腹中胎自出下胎單方牛糞不拘多少上牛糞炒極熱入醋半盞以青布包裹於母臍上下尉之立下千金榆皮湯治胎死腹中或母有疾欲下胎榆白皮一握上白皮煮汁服之自下返魂丹治生産諸證並死胎惡血胎衣不下橫生逆産産前清熱養血産後推陳致新野天麻一名益母草四五月採花葉子陰乾半斤赤芍六錢當歸七錢木香五錢為末蜜丸彈子大或童便酒或薄荷湯或米飲或桂枝湯或棗湯或秦艽湯隨證酌湯化下一丸胎産金丹滑胎煎俱見本卷保産門易産方神柞飲見本卷催生門佛手散見上卷諸痛門胞衣不下論婦人一生莫重於生産臨産莫急於催生既産莫甚於胞衣不下所以不下者有因血少乾澀或子宮空虛吸貼而不下有因氣血虛弱産母力乏氣不轉運不能傳送而停閣不下其證但見無力腹中不痛脹治當補氣助血速煎生化湯大劑速進二三鍾或兼進益母丸使血旺氣和而衣自下或用保生無憂散以固元氣至於萬密齋用五苓散豫恐無助血之能不敢遵而用之不若景嶽全書決津煎或滑胎煎無憂散局方黑神散之類又有因惡露流入胞中脹而不能出蓋兒既生胞帶必下墜故胞在腹中形如荷葉之仰仰則盛聚血水而脹礙難下將兒抱定不可斷臍帶惟老成有識見隱婆以右手二指緊跟臍帶而上帶盡處將指向上半寸余摸之覺有血便是胎衣向下一捺其血覆其衣自下或以手指頂其胎底使其血散或以指摸上口攀開一角使惡露傾瀉則腹空自下矣法甚簡明當為下胞衣第一妙法亦有人因衣遲不下恐天寒不便於子急斷臍洗兒用帛系墜臍帶其系法已見前候胞衣生下須知論中矣但血滲胞中不下又不能用手法下之停蓄既久漸充心胸為脹痛或喘急非逐血破血不可古人用良方奪命丹或用失笑散以熱酒調服使血散脹消衣下緩則不救又有下胎衣單方擇録以備鄉村無藥處急迫之用世俗有以本婦頭髮令攪入喉中使之作嘔則氣升血散胞軟亦自下矣亦有用産婦鞋底炙熱尉小腹上下即出又有血極膏三奈方花蕊石散良方牛膝散神應丹灸足小趾法牛膝湯蛇蛻烏金丸半夏散皆治胎衣不下之方豫謂既有手法下衣簡便又不傷人當以用手法為最至於吐法雖效如不出反逆上者必死至下胎衣諸方中用硝膝花蕊石硫黃等藥非惟不效即使得下胃氣大傷況金石峻厲之品恐非腸胃大虛者所宜後方録之以備參考耳用者慎之況藥力未必如手法之速效而無損於人也如不能手法必欲用藥總不若以失笑散或萬全湯去人參並可取效為至當其次亦惟決津煎為善益母丸一名返魂丹附益母膏治婦人赤白帶惡露時下不止及治胎前産後經中諸般奇痛無所不療本草云此草胎前無滯産後無虛故名益母益母草一味一名茺蔚子一名野天麻方梗對節生葉葉類火麻四五月開紫花是白花者非上於五月採取曬乾連根莖葉勿犯鐵器磨為細末煉蜜丸如彈子大每服一丸用熱酒和童便化下或隨證用湯引送下一方以此為末每服二錢或酒或童便或隨證用引服之一方凡産時倉卒未合只用生益母草搗汁入蜜少許服之其效甚大一益母膏方依前採取搗爛以布濾取濃汁用砂鍋文武火熬成膏如黑砂糖色為度入瓷罐收貯每服二三匙酒便調下或於治血湯藥中加一匙服之猶妙良方奪命丹治瘀血入胞脹滿難下急服此藥血即消衣自下豫謂此方藥峻不可輕用附子炮五錢乾漆碎炒煙盡牡丹皮當歸各一兩上為末另用大黃末一兩以好醋一升同熬成膏和前藥丸桐子大溫酒吞五七丸失笑散治婦人心痛氣刺不可忍及産後兒枕蓄血惡血上攻疼痛並治小腸氣痛更治胞衣由瘀血脹滿不能出者五靈脂生酒研澄去沙蒲黃生篩淨為末每服二三錢蔥湯調末服之一方用酒煎熱服一方用好醋一杓熬成膏再入水一鍾煎至七分熱服一方用醋糊和丸龍眼大每服一丸以童便和水各半鍾煎七分溫服按此方如行血各等分俱生用如止血俱炒用或五靈脂減半用若用以止痛蒲黃宜減半又一方蒲黃一半生一半炒用下胎衣單方治胞衣不下此方與前下死胎相同但治法各別故重録之黑牛糞不拘多少上略焙帶潤以布裹之束於腹上即下又方治胞衣不下芒硝三錢牛膝當歸各五錢黃酒煎服即下非壯實婦人此方不可輕投血極膏又名醋大黃丸治胞衣不下惡血衝心並腹中血塊沖逆作痛錦紋大黃一兩上為末以好醋半升熬成膏丸桐子大以酒化五丸服之須臾即下又治女人乾血有熱脈弦數者臨臥溫酒化服大便利一二行經脈自通亦治經閉通用三奈下胞方三奈一二斤含口內有水咽下其胞自落花蕊石散治胎衣不下胎死腹中並治産後敗血不盡惡血奔心血暈等症或至死而心頭尚熱急以童便調服一二錢取下惡物如雞肝片終身不患血虛血暈若膈上有血化為黃水即時吐出或從小便而下並治諸血凝滯氣絶欲死凡血證人弱不能攻者服之凝血皆化為水花蕊石一兩硫黃四錢為粗末入瓦瓶內鹽泥固濟曬乾以炭火叢堆煅煉一日候冷取出再研細用一錢童便調服此石藥也不可輕用姑録之以備參考耳因産後腸胃之虛何堪當此也良方牛膝散治胞衣不下腹中脹痛急服此藥腐化而下牛膝川芎朴硝蒲黃各三兩當歸一兩五錢桂心五錢每服五錢薑三片加生地黃一錢水煎服灸足小趾法治産難及胞衣不下將産母右足小趾尖上灸三炷炷如小麥粒大即易産也此法或可治村農不裹足婦人若纏足者則不便行之矣千金牛膝湯治兒産胞衣不下牛膝瞿麥各一兩當歸通草各一兩五錢滑石二兩葵子半升上六味水煎分三服一方無滑石有桂心一兩蛇蛻烏金丸胞衣不下古法用蛇蛻一條香油燈上燒研入麝香為末童便調服或加蘄艾阿膠蘇木各一錢麥芽末打糊為丸名為烏金丸遇有難産及死胎不出俱童便服之亦有單用蛇蛻酥炙為末童便調下一錢匙者半夏散治産婦肥盛多痰阻逆氣道而至産難及子死胎干或子下而胞衣不出半夏制不拘多少上為散童便服方寸匙連進三服並用吹鼻取嚏以激動關竅大妙生化湯見下卷生化湯論後保生無憂散見本卷保産門易産方決津煎見上卷鬼胎門滑胎煎見本卷保産門易産方局方黑神散見本卷子死腹中門烏金散即此方也治胎衣不下用童便酒各半調服神應丹保産萬全湯俱見本卷催生門交骨不開論交骨不開者陰血虛也或年幼受胎陰氣不足陰不足則氣不達所以不開或年大方嫁脈絡長成或元氣虛弱胎前失調皆有此證用參便佛手散補而開之或十全大補湯亦可古法用加味芎歸湯每見服此藥者惡血凝滯反成不救惟大劑人參童便入於芎歸劑中助其氣血開闔之功立效也證見咬牙昏暈急以熱小便灌之稍遲則無濟矣若元氣不虛者只用佛手散入小便服之人參不必用也又有用開骨膏以參便佛手散煎湯送下豫謂又不如用加味神柞飲開交骨如神也豫曾治彭姓女初次生産經日不下交骨不開神柞飲並諸催生藥服之無效用人參三錢煎服立下參便佛手散治臨産交骨不開其驗如神當歸三錢川芎一錢人參三五錢去血過多加至一兩水煎臨服入童便半盞續續進之質壯氣實者但加童便其參不用可也加味芎歸湯治交骨不開並死胎不下川芎當歸各一兩龜版一個自死者酥炙婦人發五錢曾生子者燒存性上共為末每服一兩水煎服開骨膏治交骨不開即催生方乳朱丹彼兼治難産此獨開交骨明乳香一兩五月五日研細豬血為丸如雞頭大硃砂為衣涼酒化服一丸十全大補湯見上卷胎不長養門佛手散見上卷諸痛門加味神柞飲見本卷子死腹中門獨參湯催生見本卷催生門
