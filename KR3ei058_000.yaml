front:
  text: 序一介之士苟存心於利物於人必有所濟矧更擇一藝以自居者其為功於世可勝言哉卜氏有言曰雖小道必有可觀論者謂如農圃醫卜之屬四者之中精其業勻足以濟世然而農圃為聖人所弗道卜筮之學君平而後鮮得其傳則夫士大夫從博覽之餘一分其聰明才力以寄其愛人利物之心者要莫如醫之一途為雅馴而功溥雖然難言之矣蓋人稟陰陽五行之氣以生命於天者既不無厚薄之殊而其繼也或傷於寒暑或縱於嗜欲或苦於抑鬱勞瘁與夫一切戕生拂性之端種種相攻求疾病之不起也得乎苟非有挾岐黃之術者以調劑其間則斯人貿貿亦大覺可哀故諸家之中唯醫道為難而醫道之中惟治胎産為更難也余同寅友閻君文侯器宇宏深善氣迎人且於書無所不窺於藝無所不通而尤留心醫學每謂婦人胎産所關非小誠以受胎之後調養有法臨産之際保護有方既産之時調理有術稍一弗慎則存亡判於俄頃生死關乎兩人嘗見庸醫多誤輒為嗟嘆不置爰及諸名家所論説而折衷之以己意著為胎産一書顏曰心法余於共事之暇得閲其概因取而讀之其於藥性脈理辨析於毫芒徵驗引據融會乎古今誠業斯道者之津梁也良由閻君居心仁恕常懷利物故即一藝之微而亦必筆之於書以覺世而訓俗今方特膺聖天子簡命監使西粵固將拴是心以措之經綸設施行見事業爛然有以上報聖主特達之知下慰寮友期望之雅則其溥利蒼生正無窮也豈特肘後丹方徒令人向閻君多種杏樹哉然是書亦急宜付之梨棗以功業醫者竣後幸寄一卷示豫勿相忘也是為序賜進士出身楚竟陵年家眷同寅弟龔健揚拜書於燕臺客舍時雍正三年秋八月自序豫不敏少年未嘗學問雖於醫書多所涉獵亦知其大略而未究其精微何敢自矜一得以法當時而傳後世耶第念醫以寄死生其道固難而胎産一門宗嗣攸系兩命所關尤為醫道之最難者緣是博採方書日取先賢名論而探求其奧理考驗揣摹歷三十餘年似有以得其要領不為岐途所惑乃敢折衷先代之書參以鄙見匯成一集分為上中下三卷顏曰胎産心法凡婦人受胎之始有以固其根臨産之際有以防其變既産之後有以保其生始終常變曲折周詳不敢自私爰付剞劂願世之業醫者得是書而融會貫通神明變化固可以茂育群生即不然依論擇方對症加減亦可以保全子母後之善學胎産者當不以豫言為河漢耳爰勒其概於篇首以為之序時雍正庚戌季菊月之中浣廣西左江觀察使上谷閻純璽誠齋氏書於官署
