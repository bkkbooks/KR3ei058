body:
  text: 卷之下脈訣論脈經云産後之脈寸口洪疾不調者死沉微附骨不絶者生又曰沉小緩滑者吉實大堅弦疾者凶牢革結代及澀滯不調者不治丹溪曰胎前脈當洪數既産而脈仍洪數者死又曰胎前脈細小産後脈洪大者多死豫見産後多有洪數而生者要知血虛之脈浮洪而數者居多産後血虛故現此脈若不明以告醫俗醫多誤認為外感虛虛之禍在於頃刻然此洪數之中自有和滑之象非如牢疾而少胃氣之謂故多死也産經曰胎前之病其脈貴實産後之病其脈貴虛胎前則順氣安胎産後則補虛消瘀此其要也大凡孕婦臨産氣血動蕩胞胎迸裂與常經離異必有水先下俗謂之胞漿即養胎之液也水下則胞裂而産既産則氣血兩虛脈宜緩滑緩則舒徐不因氣奪而急促滑則流利不因血去而枯澀均吉兆也若實大弦牢非産後氣血兩虛所宜實則邪實大為邪進弦為陰斂宣布不能牢為堅著近乎無胃皆相逆之脈故凶産後大補須分虛不虛全實三證論全書云丹溪曰産後當大補氣血即有雜證以末治之此其意謂血氣隨胎而去必屬大虛故無論諸證當以大補為先其他皆可緩也今産科所宗無非此法但産後氣血俱去誠多虛證然有虛者有不虛者有全實者當隨證隨人辨其虛實治療不得執有誠心概行大補以致助邪此辨之不可不慎也今豫遵生化湯加減兼治之法未嘗敢大補而置諸證於緩治觀暈厥總論中塊痛未除未可遽加耆木之語概可知矣又云産後虛證無非隨人元氣必素弱之人多有之或於産後血氣既去而更弱者亦有之此當因人察脈因脈察證若脈氣形氣病氣俱不足此當以全虛治之若形氣不足病氣有餘或兼火邪或兼外感或以飲食停滯是亦虛中有實不得不詳審而治今豫治全虛者後立有加參從權生化湯等方治虛中有實亦立有隨證加減生化湯等方隨其虛實以投之是皆重産而兼治者也又云産後不虛證或素日無病或年少當時或素耐辛苦貧勞之質此輩本無不足及其一旦受孕乃於腹中添入此物故至氣血壅塞為脹為嘔是皆添設有餘之病及其既産始見通快所留得去仍復故吾常人之産此類極多果何虛之有或因內傷外感難保必無倘有所患去之即愈若概行大補果能堪否即臨盆帶去血氣未免暫見耗損然以壅滯之餘不過皆護胎隨從之物去者當去生者旋生不出數日必已來復此生化自然之理何至是産皆虛也若執云産後必當大補則實實之病必所不免致輕者甚甚者危矣豫謂少壯婦人産後不虛只用黑糖水湯或少加以酒去瘀可耳原可不必服藥即服生化湯一二劑亦非大補實實之藥有益無損者也倘有內傷外感生化湯因證加減用之又云産後全實證如外感風寒頭痛身熱便實中滿脈緊實洪大有力此表邪之實證也又火之盛者必熱渴躁煩或便結腹脹口鼻舌焦黑酷喜冷飲眼眵尿管痛赤脈見洪滑此內熱之實證也又鬱怒動肝胸脅脹痛大便不利脈弦而滑此氣逆之實證也又惡露未盡瘀血上衝心腹脹滿疼痛拒按大便難而小便利此血逆之實證也又凡富貴之家保護太過或過用人參耆術以致氣壅或過用糖酒炭火以致內熱或産本不虛而妄用大補之藥以致增病此調攝之實證也又或因産過食恐其勞困固令勉強以致停蓄不散此內傷之實證也以上諸證姑舉要者以見其概然既有表邪不得不解既有火邪不得不清既有內傷停滯不得不開通消導也今豫治各證後開生化湯中俱有隨證加減一以重産一以兼治所謂道並行而不相悖可保萬全者矣四物湯不宜産後論凡産後諸病古方多用四物湯加減何也以方中有芎歸之辛溫佐以地芍之寒涼溫寒適中可謂無虞矣不知四物乃女科雜證諸疾妙劑若用以産後大非所宜豫考方書之意以為白芍用酒重復制炒去其酸寒之性但存生血活血之能或再加黑姜辛熱佐之有何不可又謂芍藥性清微酸而收最宜於陰氣散失之證豈不為産後要藥但觀其再製以酒炒則他寒涼峻削之不宜用概可知矣豫思芍藥初産三五日所當禁用若産日已久以酒製透為他藥之佐猶可惟四物湯中生地更涼直走血分且傷脾胃為害愈甚或云易以熟地補益真陰則稱為至當獨不思熟地性滯更使血滯不快雖有芎歸反行牽制而少行動亦非新産者所宜蓋新産之婦血氣俱虛但存秋冬肅殺之氣而鮮春夏生髮之機故最忌寒涼大宜溫藥以助資始資生之源也是以丹溪先生謂芍藥伐生髮之氣禁而不用良有深意矣豫嘆世之概以四物治産後者胡不思乎生化湯論附方生化湯論曰産後諸證皆緣氣血驟下元氣大虧用藥不同常法是以有虛極不能姑待者則當峻補之中加入溫行之藥峻補則力大而可宣通溫行則流暢而不凝滯至於逐瘀之劑即實證亦不可用峻厲之藥況産後大虛恐血無主宰一任藥力便為崩而不止虛則易脫勢如覆水難收矣夫人遇大病之後血氣兩虛猶當調補況産後脾胃血氣之虛衰更有甚焉者乎今之治産後者亦云元氣因産而虧運行失度不免瘀血停留致成諸疾必以去瘀為先瘀消方可行補甚有用回生丹攻血塊下胞衣殞人性命者此蓋止知專攻舊瘀而不知新血轉傷之害豈知塊固當消而新血猶當生也蓋專消則新血不生專生則舊血反滯豫考新産諸方莫若生化湯為産後第一妙方其方芎歸桃仁溫中行血善去舊血驟生新血佐以炙黑乾薑炙草引三味入於肺肝行中有補化中有生故名生化蓋因功用而立名也又有加入益母草一錢五分功效亦同此實治産之良方保全産婦之聖藥也故馮氏因此方之妙變化用於臨産加人參桂牛膝紅花又為催生之神劑矣生化湯方凡孕婦臨月即預備生化湯數劑俟臨産之時即為預先煎就産下隨服二三道以逐瘀生新再無産後諸證之患無論正産半産雖少壯産婦俱宜服之故此湯為産後七日內要藥倘産下之時未及煎服凡産後諸證仍以此湯治之全當歸八錢酒洗川芎四錢乾薑四分炙黑存性桃仁十粒去皮尖打碎炙草五分水二鍾煎七分加酒小半鍾如素日不能飲酒者加六七茶匙稍熱服之其藥渣留並後帖藥渣合而再煎兩帖共三煎在産下一二時辰內未進飲食先相繼煎服能速化舊血而驟長新血不特可免目前暈厥汗崩惡露停滯等患且諸病不生精神百倍矣如胎前素虛之人産後又當再製兩帖煎服以防倦怠若産下已服一二帖而塊痛未除仍當再進幾帖塊痛自消矣調攝論凡孕婦産畢血氣未定不宜睡倒不宜側坐須床頭厚鋪裀褥高倚仰靠宜豎膝不宜伸足並遮圍四壁使無孔隙免致賊風為害倘閉目睡倒或忿怒逆氣即令人眩暈也再用醋塗鼻房中或用醋炭更燒以漆品輕輕以手從心按摩至臍則惡露盡下又何血暈血逆之有常見人産畢即飲熱童便一盞又有三日內以童便和酒溫服五七次豫謂酒雖能下惡露行乳汁産後臟氣方虛即素日善飲者亦不可多飲並不可産畢即飲蓋恐引血入四肢或引上行能令血暈至於童便味臊而性涼如胃氣弱者得臊氣而嘔惡里無火者得涼性而滯血且能傷胃氣均非所宜不若預煎生化湯産畢即服為妙或用紅糖滾水沖化頻飲以行其瘀時食白米薄粥煮石首魚甘淡食之如此調攝自無事矣有人先於臨月時用有毛淡菜十餘個紙包吊風處二十餘日陰乾勿令人知産下即煎湯一鍾熱服産後再不生病生化湯見本卷生化湯論後産後禁忌論凡生産既下不必問是男是女恐因言語而泄氣或以愛憎而勞神最忌大喜大怒喜則氣散或生紅汗怒則氣逆或生癥瘕不可獨宿恐致虛驚不可刮舌恐傷心氣不可刷齒恐致血逆勿勤梳頭恐頭皮作痛須氣血平復方可治事犯時微若秋毫成病重如山嶽凡初産其牛羊豬肉雞鵝鴨肉及蛋並豬蹄豬腎緑豆涼粉蕎麥麵食等類一切滯氣堅韌難化之物及生冷膩滑皆不宜食恐新産脾胃氣虛難於運化易致內傷也凡産逢暑月切不可當風睡臥最忌食涼用扇及洗足澡浴雖盛暑不可用冷水洗手足凡新産驟虛最忌著寒寒則血氣凝滯諸變冗生每致飲食不化腹痛作瀉此時欲去其瘀則正氣並脫欲止其瀉則瘀結不行可不慎歟治法見後泄瀉門凡産逢冬月宜重棉兜護其腹雖夏月亦當復巾裹之以免厥陰受寒凡産後百日內不詈罵少勞碌禁淫欲終身無病而且多子若未滿百日交合則虛羸百疾從此而生必患臍下虛冷手足腰腿痠痛等證名曰蓐勞最難治療凡産後勿用椒姜艾酒雖血塊得熱流通然新血為之不寧耳即砂仁湯亦能動血咸在禁忌産後乳汁乃血氣所成不可食鹹咸能止血令無乳汁且發嗽難治産後南北風土不同江以南新産後即食雞子雖告之以利害相沿成習毫無疑懼且竟多安然無事者豫亦只得隨俗令其豁開淡煮而食之尚有養胃卻痰之功也産後藥誤須知産後勿輕用烏藥香附木香及耗氣順氣等藥用之反增滿悶雖陳皮用不可過五分産後勿輕用青皮厚朴山楂枳殼陳皮消食藥多損胃減食即枳殼香砂等丸亦多損氣血産後勿用青皮枳實蘇子以下氣定喘用之元氣必脫産後浮麥傷胃耗氣五味能阻惡露棗仁油滑致瀉均為禁忌之品産後身熱誤用黃芩黃連黃柏梔子損胃增熱致不進飲食且黃芩苦寒無論惡露淨與不淨皆非所宜産後四日肉未服生化湯以消血塊勿先用人參耆術致塊不除産後勿輕用牛膝紅花蘇木枳殼等類以消塊猶忌多用獨用至於三稜莪朮枳實山楂等峻藥更不可用若誤用舊血驟下新血亦隨之而損禍不可測也豫每見俗用山楂一味煎汁以攻血塊致成危證頻服兩三帖必死産後勿輕用生地黃以滯血路産後不可用大黃芒硝以通大便反成膨脹産後不可用五苓以通小便用之愈閉産時不可用濟坤丹以下胞胎不可信婦人良方及産保百問俗醫多有守此二書以治産用芎歸白芍生地誤人實甚余可知矣凡人有疾病多有求卜以問吉凶並卜何方何姓人醫治可愈此蓋人不明醫理不知醫者孰良孰庸亦無可如何之計耳豈知竟有醫卜相通醫求卜薦許以分謝卜者貪利假神道以指引因卜而薦誤人性命比比然也産後之證吉凶在於頃刻不可不知而慎重也三沖論産後危證莫如敗血三沖其人或歌舞談笑或怒罵坐臥甚者逾牆上屋口咬拳打山腔野調號佛名神此為敗血衝心多死醫通云花蕊石散最捷琥珀黑龍丹亦效如雖悶亂不致癲狂者失笑散加鬱金豫謂當於妄言妄見門參看治療若其人飽悶嘔惡腹滿脹痛者為之沖胃醫通云用平胃散加薑桂往往獲效不應送來復丹嘔逆腹脹血化為水者金匱下瘀血湯豫謂當於飽脹嘔逆等門參看治療若其人面赤嘔逆欲死為之沖肺醫通云二味參蘇飲甚則加芒硝蕩滌之豫謂當於口鼻黑衄門參看治療大抵衝心者十難救一沖胃者五死五生沖肺者十全一二其醫通所用金石及峻藥等治法亦無可如何之思與其視死不若救生之意耳豫謂治此等證宜用生化失笑抵聖等類平穩藥當亦通神至來復黑龍等丹花蕊平胃等散及下瘀血湯均未敢輕用姑録之以備參考耳來復丹治上盛下虛裡寒外熱及伏暑泄瀉如水硫黃同硝石為末銀石器內慢火炒柳木攪之不可猛火以傷藥力硝石太陰玄精石水飛青皮去穰陳皮去白各一兩五靈脂二兩水飛去沙石澄定曬乾上為末古法以醋和丸米飲下因醋易沖壞今改用米飲糊丸如梧子大每服三十丸空心醋湯下二味參蘇飲治惡露入胞脹大不能出及産後敗血沖肺喘滿面赤幾死者人參二錢蘇木四錢碎水煎服又有入童便熱服一方人參一兩為末蘇木二兩捶碎水碗半煎蘇木水一碗去渣調人參末隨時加減服大便溏泄者禁用花蕊石散失笑散俱見中卷胞衣不下門琥珀黑龍丹見中卷催生門平胃散金匱下瘀血湯俱見上卷諸痛門生化湯見本卷生化湯論後抵聖湯見本卷氣逆嘔吐不食門産後不宜汗下利小便論産後陰血驟下陽無所附孤陽外越每多發熱此乃陰虛生熱切勿作外感而表散生化湯善能退熱以其內有薑草所謂甘溫能除大熱也故産後雖有表證一切風藥性升不可用恐載血上行令人發暈且慮重竭其陽必至汗脫而死即佛手散中川芎辛散能發汗走泄亦須臨時因證審酌用之産後陰血既虧津液自少況臨産勞倦氣虛虛則傳化自遲二腸枯燥勢所必然久則自復或用生化湯養血兼生津助液亦可故産後雖二便暫有不甚通利然於下利等藥必須禁用非特硝黃五苓難於輕試即四物湯中生地芍藥純陰而伐生氣且作瀉而凝血五苓利水傷陰愈通之而愈枯結若誤用而重亡其陰難免孤陽無輔而走脫矣故機要有云胎産之病從厥陰無犯胃氣及上下二焦不可汗不可下不可利小便也生化湯見本卷生化湯論後新産三審論凡治産後三審不可缺一也一審少腹痛與不痛以徵惡露之有無二審大便通與不通以徵津液之盛衰三審乳汁行與不行及飲食多少以徵胃氣之充餒審斯三者以脈參證以證合脈脈證相符有疾治之即愈脈證相反縱無危候必多變端即如産後惡露常以彌月為期然間有六七朝即淨者又未可以概論也此雖産母稟質不同而因胎之所稟亦異如胎息壯盛則氣血盡歸其子瘀血自少胎息孱弱則氣血涵養有餘瘀血必多亦有産時去多産後必少産時去少産後必多勢使然也大抵常産之婦開闔有權産後子宮即閉兒枕隨氣攻注碎作小塊續續而下所以延綿日期又有由於艱産過傷子宮關閘廢弛不能收斂或下血塊大小形色與茄無異此名兒枕是也全塊頓出自無淋瀝之患即有餘血盡歸溲便如皂莢汁少腹略無痛苦切勿認為産後瘀尚未行妄行攻下誤人性命産後又有似乎兒枕痛者摸之亦有塊按之亦微拒手人皆指為兒枕宿血此大不然夫胎胞俱去血亦豈能獨留蓋子宮蓄子既久忽爾相離血海陡虛所以作痛胞門受傷必致壅腫所以亦若有塊而實非真塊腫既未消所以亦頗拒按治此者當安養其臟不久自愈若有瘀服藥生化湯為最殿胞煎或四神散亦可若誤用蘇木紅花元胡青皮之屬反損臟氣必增虛病慎之慎之豫曾見孕婦産後少腹旁邊以手按之內有一條形如小黃瓜斜長而硬頗似瘀積然無痛苦産婦先以為瘀滯後以為癥瘕每愁成病豫開導之云無痛苦不拒按是虛非實血足自消不須疑慮遲數月果漸消沒也殿胞煎治産後兒枕疼痛等證如神當歸五錢川芎一錢茯苓一錢炙草一錢肉桂五分水一鍾煎八分熱服如脈細而寒或嘔者加乾薑炒黃色一錢如血熱多火者去肉桂加酒炒芍藥一錢如脈弱陰虛者加熟地三錢如氣滯者加制香附一錢腰痛加鹽水炒斷絲杜仲一二錢生化湯見本卷生化湯論後四神散見本卷腹痛門血塊痛論産後血塊是孕成余血之所積也夫婦人血旺氣衰二七而天癸至三旬一見以象月盈則虧行之有常則曰經有孕則經水不行其餘血注於胞中以護胎元一月名胎胚二月名始膏三月始成形而名胎方受母血之癊庇胎形尚小雖食母血而尚有餘汁並前兩月之血積於胞中日久成塊至産時當隨兒下或因産婦送兒送胞勞倦無力或調護失宜腹缺溫暖至血塊日久不散疼痛拒按並宜生化湯助血行血外用熱衣暖腹可也慎勿輕服峻劑至崩脫不救生化湯見本卷生化湯論後暈厥論凡産後暈厥二證皆由氣血並竭苟非急補何能挽其將絶之元神無庸疑議者也但暈在臨盆證急猶甚於厥用藥不及急救法救之如其人微虛者則眼花頭眩或心下滿悶神昏口噤不知人事少頃即蘇或因亡血過多以致虛火乘虛泛上而神不清身無所主其陰血暴亡心神失養心與胞絡君相之火得血則安亡血則危火上熾故令人昏冒火乘肺故瞑目不省人事是陰血暴亡不能鎮撫也經云病氣不足宜補不宜瀉瞑目閣眼病悉屬陰暴去有形之血則火上熾均宜頻灌生化湯或從權急救生化湯二三帖先補血分之虧則塊化血旺神清而暈止大虛者其證面白眼閉口開手冷多汗神昏六脈微細之甚是氣隨血脫而欲絶當大劑人參方可回陽恐勢急而補陰不及須以氣藥兼之此陽生陰長之理也從權急救加參生化湯或加參生化湯最效如製藥不及速用獨參湯兩許煎湯急救之但得下咽即可望生若少遲延則無及矣有人謂産後七日方可用參此愚昧訛傳不知始自何人萬不可信但暈發頃刻而急救外治之法又不可緩速宜輕輕扶坐勿令臥倒或燒紅炭沃之以醋或燒舊漆器令煙氣透入口鼻即蘇急捏人中靜以待之元氣漸復不可亂動致令神氣散亂或用菲菜一握切碎入有嘴瓷瓶內將醋煎滾澆入瓶內急蓋瓶口以瓶嘴向婦鼻孔令氣透入鼻中即蘇但凡大病大虛之人皆能作暈産後之暈因血去而名之曰血暈實非因血而致暈也若偏信古方認暈證為惡血搶心而輕用蘇木牛膝紅花等類以及牡丹奪命等方或認為痰火而用無補消痰之方誤之甚矣俗治産婦或因死胎及胎衣惡血上逆搐嘔昏暈用小便乘熱灌之但得一口下咽即止設遇胃氣壯盛之婦不畏臊氣獲效者有之然童便非能止暈回元蓋取其下行舊路降火消瘀考之方書內云敗血流入肝經眼生黑花頭目昏暈不省人事此血熱乘虛逆上湊心故昏迷不省氣閉欲絶也服童便最好此論但照管敗血全不顧産虛且有氣閉欲絶四字豈童便可挽回元氣欲絶乎即有惡血上逆血滯等證亦莫若生化湯溫而行之去瘀止暈之妙也豫見江南産科有用當歸二錢益母草一錢人參二錢紅花六分炮姜八分煎熱沖童便服之以治暈此方兼得之義庶幾近之如婦人有血暈之證者不若於將産數日前預前擇服八珍歸脾十全等類調補氣血臨産又用人參催生補於未産未虛之前産後無虛可乘無暈可發矣至於厥證在分娩之後因産時用力過多勞倦傷脾孤臟不能注於四旁故手足逆冷而發厥經云陽氣衰於下則為寒厥厥氣上行滿脈去形蓋逆氣上滿於經鉻則神氣浮越去身而散也宜大補回陽生化湯連用二服俟氣血旺而神復厥證自止矣又非偏補血分之可得而愈也若服藥而口渴另用參麥散以代茶助津以救臟燥也又有四肢逆冷泄痢類傷寒陰證不可用四逆湯必生化湯倍參煎服或加熟附子一片則可以止逆回陽而見參歸之功矣若血塊痛止而厥滋榮益氣湯最效凡暈厥乃産後危急二證若新産塊痛未除又未可遽加耆術故急加人參從權以救之俟暈止厥回再去參以除塊痛此要訣也急救暈法凡兒方生下母即昏暈不醒者此時即有藥不能入口遲則不救其法急以極軟舊衣緊閉産戶以知事婦女用膝抵住勿令下面氣泄又令一人一手挽住頭髮一手捫住鼻口勿令上面氣泄俟稍轉略有聲息方用熱水接氣急服生化湯從權急救生化湯治三等血暈兼化瘀生新川芎三錢當歸六錢或八錢酒洗乾薑四分炙黑桃仁十粒去皮尖炙草五分荊芥穗四分炒黑汗多忌用棗二枚水煎服勞倦甚及血崩或汗多形氣脫而暈加人參三錢肉桂四分急服一二帖其效如神決不可疑參為補而緩之痰火乘虛泛上而暈加橘紅四分虛甚亦加用人參八分肥人加竹瀝數匙薑汁少許從權急救加參生化湯治産後形色脫暈人參四錢酒洗川芎二錢當歸四錢酒洗乾薑四分炙黑桃仁十粒去皮尖炙草五分荊芥穗四分炒黑汗多忌用棗二枚水煎服血塊痛甚加肉桂七分渴加去心麥冬一錢五味子十粒汗多加麻黃根一錢如無塊痛加蜜炙黃耆一錢以止汗傷麵食加炒神麯八分炒麥芽五分傷肉食加山楂砂仁各六分加參生化湯附大補回陽生化湯人參二錢川芎四錢當歸八錢酒洗乾薑四分炙黑炙草五分桃仁十粒去皮尖棗二枚水煎服此方産後諸危急證通用一日夜須服三四帖方能接將絶之氣如産後三日內塊痛未除俟元氣稍復已有生意當去參仍服生化原方虛脫厥逆汗多加人參三四錢脈與形俱脫將絶必用此方頻灌厥而兼汗加去心麥冬一錢汗多渴甚加去心麥冬三錢汗多痰喘加竹瀝薑汁去皮尖杏仁十粒汗多喘嗽聲重加桔梗去皮尖杏仁各五分無汗喘嗽氣短加製半夏一錢去皮尖杏仁十粒桔梗五分汗多身熱氣短加人參左尺脈弱亦加人參汗不止三四劑後加蜜炙黃耆一錢一方川芎當歸減半名大補回陽生化湯治新産厥證棗引速煎二服即效若厥證作渴佐以生脈五味飲代茶以救津液則渴減厥回參麥五味飲去五味子名參麥飲又名生脈湯又名生脈散人參二錢一方三錢麥冬二錢去心五味子七粒捶碎煎湯作茶時時飲之煎湯用銀器或砂器為妙滋榮益氣湯治血塊痛止而厥人參當歸各三錢川芎白朮土炒黃耆蜜炙各一錢五分或一錢熟地二錢麥冬八分或一錢去心炙草四分五味子十粒川附子五六分或一錢制水煎服汗多加麻黃根炒棗仁各一錢大便難加酒洗肉蓯蓉一錢五分生化湯見本卷生化湯論後八珍湯見上卷諸痛門歸脾湯見上卷胞漏小産門十全大補湯見上卷胎不長養門大補回陽生化湯附本門加參生化湯下血脫氣脫神脫三證論産後暴崩為血脫氣短似喘為氣脫妄言妄見為神脫三證雖有氣陽血陰之分於精散神促無異比前暈證治可少緩亦危證也若非大藥急方頻服失之者多矣倘誤為氣實痰火妾治鮮有不殞生者若勢急並宜用加參生化湯補中寓行免致血虛之失其血脫患崩一證由衝任已傷氣血未復或因勞役驚恐或因惡露未盡固澀太速以致停留一旦復行然經血大來當審血氣而辨血色之紅紫視形色之虛實如血多紫色有塊乃當去之敗血也其少腹必脹滿按之而痛止之反能作痛或致淋瀝此不可言崩只服生化湯幾帖自愈如鮮紅之血大來乃驚傷心不能生血怒傷肝不能藏血勞傷脾不能統血血不歸經血臟有傷當以崩證治之崩非經病産婦得之是為重虛猶不可忽故宜急治用荊芷治崩湯若有血塊痛而形色脫或有汗或氣促宜服加參生化止崩湯以益氣使陽生而陰血自旺非十灰散之可止者如血塊痛止或産後半月外崩證者又宜滋榮益氣止崩湯或升舉大補湯少佐黃連墜火寧血歸經或用尊生升舉大補湯亦妙亦有少腹空痛不可誤認有瘀察其下血少而無紫塊者是也當以崩治宜重用熟地若小腹滿痛不已而脈實大緊數者此肝經已竭肝氣隨敗矣難治醫通有治産後崩中去血赤白相兼或如豆汁用千金伏龍肝湯治之其氣脫短氣似喘一證因産所下過多營血暴竭衛氣不能運行獨聚於肺肝腎不接故令呼吸短促語言不相接續有似於喘實非喘也夫肺受脾氣散精生脈而通水道呼吸所以清肅上下調和營衛而為平人若值産後血亡氣窮浮脫於上孤陽絶陰無根將脫之兆最為危候惟大進參附或可得生世有妄論痰火實證反用散氣化痰之方治之必死有塊痛者當用大補回陽生化湯連二三服世人多疑參助喘不用致不救者多矣況同芎歸黑姜不加耆術萬無有失要知人生於氣氣壯則根本固而臟源者斂納於下運行者強健於中何有為喘為脹之虞又有用人參加陳皮監製則盜泄元氣反致耗散只可消導藥中監之耳考全書貞元飲亦治似喘妙藥也如無塊痛當用續氣養榮湯最妙或倍參補中益氣湯少佐熟附助參以治氣脫攝氣歸元亦可如氣虛兼寒者宜大補元煎或理陰煎主之其神脫妄言妄見一證因心肝脾三陰血少而神魂無依也然有譫語鄭聲之分甚至發狂等證統歸於妄耳其輕者睡中呢喃重者不睡亦語或言日用尋常之事或如見鬼狀昏不識人語言不休此譫語之謂也若虛甚而聲轉無力言語不能接續有頭無尾一兩句即止或重言疊語說過又說或如造字出於喉中若鄭聲之輕怯此鄭聲之謂其精氣衰奪更甚於譫語矣夫人之心藏神生血者也而言乃心之聲心有血而神存則言不妄發肝藏魂藏血者也目得血而司視則瞳瞭而視正若夫産後氣血暴竭而心神失守故言語無倫肝魂無依則瞳眊妄見況心為五臟之主目乃百脈之官虛證見於心目則十二官各失其職可知矣是以視聽言動皆成虛妄當論産期塊痛有無先後施治方為得法若分娩兒下之後塊痛未止者宜服寧神生化湯確知瘀血不行合失笑散同服如痛止者則服寧心定魄茯神湯連進大補十數劑生氣養血安神定志服至元足其病始愈矣或以生地易熟地而清心火寧君主之官亦可病家毋求速效勿信邪祟若噴以法水驚以法尺多致不救屢治此病服八珍加炮姜十數劑方效丹溪云虛病猶似邪祟也又云欲泄其邪當補其虛此古人之確論但人不能體認其意反言攻補難施若必攻邪盡方可言補則誤矣不特醫家治産後虛證即高年及虛弱人妄言妄見等證亦當如是慎重也産後間有敗血停積上干於心心不受觸而有妄言妄語如見鬼神者此必心下脹悶煩躁昏亂臥起不安誤作中風治必殆芎歸瀉心湯主之醫通云虛則四物湯換生地加桂心炮薑生蒲黃石菖蒲實則四烏湯加川連煎成入龍腦一捻服後得睡即安心悸恍惚語言錯亂千金遠志湯如內虛敗血攻心狂言亂語者龍齒清魂散主之心脾血少八珍加炮姜馮氏云産後陰血暴崩肝虛火妄之極而發狂者宜澤蘭歸地牛膝茯神遠志棗仁加童便主之若因敗血停積用調經散豫謂不若生化湯合失笑散若心血虛用柏子仁湯豫謂不若寧神定魄茯神湯余室人沈氏於康熙癸巳冬至月患産後神脫之證為醫人妄用降氣消痰清火方藥變為痙證仍不知峻補猶以風痰為患驅風化痰余正奉差大通橋轉運軍糧幾及百萬督催歲內全米進倉不遑歸視直至病篤僕人持方來云服藥罔效奈何余閲之非正治之方悉促死之藥也彼時心神瞀亂又未得親視其證未敢定方即大書速用人參救脫六字令僕持歸復慮醫者執産後不宜用人參之見差人往問果如所料且知仍用蘇子降氣下痰餘情不能已星速馳歸時已初更而其氣在呼吸間已遷出外舍余急用人參三錢煎湯調胎産金丹一粒下咽時許即復蘇起坐而言矣其時夜半奈無參可繼竊念既已少愈不妨待旦市服詎漏絶時參力已竭又復脫去救無及矣雖日數也命也而清痰降火之誤實有以致之矣荊芷治崩湯治産後血崩其色鮮紅川芎一錢當歸身四錢乾薑二分炙黑荊芥穗六分炒黑炙草四分白芷五分棗煎服十灰散不用故不録方加參生化止崩湯治産後血塊痛鮮血崩形色脫或汗多或氣促人參二三錢當歸身四錢川芎二錢乾薑炒黑炙草各四分白芷荊芥穗炒黑各五分桃仁十粒去皮尖棗二枚水煎服滋榮益氣止崩湯治産後無塊痛或半月外崩證人參川芎黃耆蜜炙各一錢白朮土炒生地各二錢當歸四錢酒洗陳皮黃連白芷荊芥炒升麻炙草各四分棗二枚水煎入童便溫服如汗多加麻黃根一錢浮小麥一撮大便難加酒洗蓯蓉一錢有氣滯加木香二分為末沖服有痰加竹瀝薑汁去心貝母咳嗽加去皮尖杏仁桔梗各八分炒知母七分驚悸加柏子仁一錢炒棗仁一錢傷飲食加炒神麯八分炒麥芽八分傷肉食加山楂八分砂仁五分身熱倍加參耆去黃連升舉大補湯治産後日久血崩不止或崩如雞蛋大或去血片宜大補脾胃升舉氣血少加鎮墜心火之劑並治老壯婦人崩淋人參二錢黃耆一錢蜜炙熟地二錢白朮土炒當歸酒洗各二三錢防風三分荊芥炒黑羌活升麻白芷陳皮黃連炒黃柏炒褐色炙草各四分棗二枚水煎服口燥加去心麥冬一錢五味子十粒泄瀉去黃柏加澤瀉五分去心蓮子十粒有痰加製半夏一錢白帶多加製半夏製蒼朮各一錢尊生升舉大補湯治産後血塊痛止崩證人參當歸白朮土炒各二錢川芎麥冬去心黃耆蜜炙各一錢熟地三錢陳皮炙草白芷荊芥穗炒黑升麻血餘灰各四分棗二枚水煎服汗多加麻黃根浮麥便難加酒洗蓯蓉一錢痰加去心貝母六分咳嗽加桔梗去皮尖杏仁各一錢不寐驚悸加炒棗仁柏子仁各一錢本方少加黃連三分以墜火亦妙凡遇崩證有如此等余病大忌峻利千金伏龍肝湯治勞傷衝任崩中去血赤白相兼或如豆汁臍腹冷痛口乾食少伏龍肝如彈子大七枚生薑生地各一兩五錢甘草艾葉赤石脂桂心各六錢上七味㕮咀以水一升煮取三升分四服日三夜一貞元飲熟地七八錢甚者一二兩炙草一二三錢當歸二三錢水二鍾煎八分溫服此方治氣短似喘呼吸促急提不能升咽不能降氣道噎塞勢劇垂危者常人但知為氣急其病在上而不知元海無根虧損肝腎此子午不交氣脫證也猶為婦人血海常虧者最多此證宜急用此飲以濟之緩之可稱神劑凡診此證脈必微細無神若微而兼緊猶為可畏倘庸衆不知妄云痰逆氣滯用牛黃蘇合及青陳枳殼破氣等劑則速其危矣如兼嘔惡或惡寒者加煨姜三五片如氣虛脈微至極者急加人參隨宜如肝腎陰虛手足厥冷加肉桂一錢續氣養榮湯治産後氣短促問無塊痛宜用此方人參二三錢熟地二錢當歸四錢酒洗川芎一二錢黃耆蜜炙白朮土炒各一錢陳皮乾薑炙黑炙草各四分棗二枚水煎服如手足冷加熟附三五分汗多加麻黃根一錢浮麥一撮渴加去心麥冬一錢五味子十粒大便不通加酒洗蓯蓉二錢芝麻一撮傷食或面加炒神麯一錢炒麥芽五分傷肉食加山楂五個或五分砂仁五分一方無熟地黃寧神生化湯治産後塊痛不止妄言妄見未可用耆朮者人參二錢當歸三錢酒洗乾薑炙黑炙草各四分茯神柏子仁川芎各一錢桃仁十粒去皮尖益智仁八分陳皮三分棗二枚龍眼肉五個水煎服瘀血不行合失笑散寧心定魄茯神湯治産後塊痛已止妄言妄見證人參當歸酒洗熟地各二錢川芎黃耆蜜炙白朮土炒棗仁炒去殼柏子仁茯神益智仁麥冬去心各一錢陳皮三分五味子十粒碎炙草四分棗二枚建蓮肉去心八枚桂圓肉八分水煎服芎歸瀉心湯治積血上干於心脹悶昏亂起臥不安以致妄言妄語如見鬼神歸梢酒洗川芎延胡索蒲黃牡丹皮各一錢桂心七分水煎另研五靈脂末一錢食後調服千金遠志湯治産後心悸恍惚語言錯亂人參當歸遠志肉甘草水泡去骨芍藥炒麥冬去心桂心炙草各一錢茯苓一錢五分大棗四枚生薑三片水煎服心胸逆氣加製半夏五七枚龍齒清魂散治心虛挾血振悸不寧産後敗血衝心笑哭如狂人參龍齒醋煅遠志甘草水泡去骨歸身各五錢茯神麥冬去心桂心炙草各三錢延胡索一兩細辛一錢五分為散每服四五錢姜三片紅棗一枚水煎調服此即平補鎮心丹去棗仁柏仁菖蒲生地山藥五味硃砂加延胡細辛甘草加參生化湯見本卷暈厥門生化湯見本卷生化湯論後大補回陽生化湯見本卷暈厥門附加參生化湯下大補元煎見本卷惡露不止門理陰煎見上卷惡阻門失笑散見中卷胞衣不下門四物湯見上卷安胎門補中益氣湯八珍湯四烏湯俱見上卷諸痛門惡露不止論産後惡露不止非如崩證暴下之多也由於産時傷其經血虛損不足不能收攝或惡血不盡則好血難安相併而下日久不止漸成虛勞當大補氣血使舊血得行新血得生不可輕用固澀之劑致敗血聚為癥瘕反成終身之害十全大補湯主之如小腹刺痛者蒲索四物湯主之如産後月餘經血淋瀝不止宜用升陷固血湯全書云因血熱者宜保陰煎清化飲因傷衝任之絡而不止者固陰煎加減用之若肝脾氣虛不能收攝而血不止者宜壽脾煎若氣血俱虛而淡血津津不已者宜大補元煎若怒火傷肝而血不藏者宜薛氏加味四物湯若風熱在肝而血下泄者宜一味防風散以上諸治法與濟陰綱目理同血崩門亦可參看通治蒲索四物湯治産後惡露不止當歸一錢五分川芎八分熟地黃二錢白芍酒炒延胡索醋炒各一錢蒲黃七分炒乾薑五分炒黑産後忌芍藥而此方用之審惡露不止四字則産日已久矣故不忌也升陷固血湯治産後月餘經血不止陷下者舉之當歸川芎熟地白芷升麻血餘灰各一錢水煎服保陰煎治一切陰虛內熱動血等證生地熟地芍藥各二錢山藥川續斷黃芩黃柏各一錢五分生草一錢水二鍾煎七分食遠服如小水多熱或兼怒火動血者加焦梔子一二錢如夜熱身熱加地骨皮一錢五分如肺熱多汗者加去心麥冬炒棗仁如血熱甚者加酒炒黃連一錢五分如血虛血滯筋骨腫痛者加當歸二三錢如氣滯而痛去熟地加陳皮青皮丹皮香附之屬如血脫血滑及便血久不止者加地榆一二錢或烏梅一二個或百藥煎一二錢醋炒文蛤亦可如少年或血氣正盛者不必用熟地山藥如肢節筋骨疼痛或腫者加秦艽丹皮各一二錢此方芩連梔柏等類當於産後日久方可用之清化飲治婦人産後因火發熱及血熱妄行陰虧諸火不清等證此方清涼産後日久方可用之芍藥麥冬去心各二錢丹皮茯苓生地各二三錢石斛一錢水一鍾半煎七分食遠溫服如覺骨蒸多汗者加地骨皮一錢五分熱甚而渴或頭痛者加煅石膏一二錢下熱便澀者加木通一二錢或炒黃柏炒梔子皆可隨證用之如兼外邪發熱加柴胡一二錢以上保陰清化二方蓋因産家或過慎太暖或因年力方壯而飲食藥餌大補過度致火動病熱下血日久不止此産後間有之實證故録是方以備用固陰煎治陰虛滑泄帶濁淋遺及因虛不固此方專主肝腎人參隨宜熟地三五錢山藥二錢炒山茱萸一錢五分去核遠志七分甘草水泡去骨炒用炙草一二錢五味子十四粒菟絲子二三錢炒香水二鍾煎七分食遠溫服如虛滑遺甚者加金櫻子肉二三錢或醋文蛤一錢或烏梅二個如陰虛微熱而經血不固者加制川續斷肉二錢如下焦陽氣不足而兼腹痛溏泄者加補骨脂吳茱萸之類隨宜用之如肝腎血虛小腹痛而血不歸經者加當歸二三錢如脾虛多濕或兼嘔惡者加土炒白朮一二錢如氣陷不固者加炒升麻一錢如兼心虛不眠或多汗者加炒棗仁二錢壽脾煎治脾虛不能攝血等證及婦人無火崩淋凡兼嘔惡猶為危候速宜用此救脾則統血歸源矣若再用寒涼胃氣必脫無不死者人參隨宜一二錢急者用一兩白朮二三錢當歸二錢山藥二錢棗仁一錢五分遠志三五分制乾薑一二錢炮黑炙草一錢蓮肉二十粒去心水二鍾煎服如血未止加烏梅二個凡畏酸者不可用或加地榆一錢五分亦可滑脫不禁者加醋炒文蛤一錢下焦虛滑不禁鹿角霜二錢為末攪入藥中服之氣虛甚者加炙黃耆二三錢氣陷而墜者加炒升麻五七分或白芷亦可兼溏泄者加炒補骨脂一錢陽虛畏寒者加製附子一二錢血去過多陰虛氣餒心跳不寧者加熟地七八錢或一二兩大補元煎治男婦血氣大壞精神失守危劇等證人參一二錢多則用一二兩山藥二錢炒熟地二三錢多則用二三兩杜仲二錢鹽水炒斷絲當歸泄瀉者去之枸杞各二三錢山萸肉如畏酸吞酸者去之炙草各一錢水二鍾煎七分食遠溫服如元陽不足多寒者加製附子肉桂炮姜之類隨宜用之如氣分偏虛者加炙黃耆土炒白朮若胃口多滯者不必用如血滯者加川芎去山茱萸滑瀉者加五味炒故紙之屬薛氏加味四物湯養肝血清肝火熟地當歸各三錢芍藥二錢川芎山梔炒柴胡丹皮各一錢水二鍾煎服良方一味防風散一名獨聖散防風去蘆為末每服二錢空心食前用酒煮白麵清飲調下治肝經有風以致血得風而流不歸經者極效十全大補湯見上卷胎不長養門氣喘論凡産後若因風寒外感邪氣入肺而喘急者必氣粗胸脹或多咳嗽自與氣短似喘上下不接者不同治當疏散中兼補為主宜金水六君煎或六君子湯若單以寒邪入肺氣實氣壅而本無虛者宜六安煎或二陳湯加蘇葉之類主之又有瘀血入肺必面黑髮喘與氣短似喘大不相同用二味參蘇飲治之或有氣虛血痰泛上者用六君子調服失笑散亦效金水六君煎治肺腎虛寒水泛為痰或年邁陰虛血氣不足外受風寒咳嗽嘔惡多痰喘急等證當歸半夏制茯苓各二錢熟地三五錢陳皮一錢五分炙草一錢水二鍾生薑三五片煎八分食遠溫服如大便不實而多濕者去當歸加山藥如痰甚氣滯胸脅不快者加白芥子七八分如陰寒甚而嗽不愈者加細辛五七分如兼表邪寒熱者加柴胡一二錢六安煎治風寒咳嗽及非風初感痰滯氣逆等證陳皮一錢五分半夏二三錢制茯苓二錢杏仁去皮尖碎甘草各一錢白芥子五七分凡老年氣弱及産後者不用水一鍾半加生薑三五片煎七分食遠服若氣虛猝倒及氣平無痰者不可用此劑六君子湯見上卷諸痛門二陳湯見上卷子煩門二味參蘇飲見本卷三衝門失笑散見中卷胞衣不下門惡露不下論凡産後臟腑勞傷氣血虛損或胞絡挾於宿冷或當風取涼風冷乘虛而搏於血壅滯不宣積蓄在內故不下也宜溫暖活血則血自行此必小腹脹滿刺痛無時宜用血證黑神散豫每治此證用生化湯倍桃仁調失笑散生新行瘀頻以黑沙糖沖滾湯少滴無灰酒服之如素不飲或恐發暈即不加酒亦可每每獲效又或因脾胃素弱中氣本虛敗血亦少氣乏血阻不能盡下其證乍痛乍止痛亦不甚不可用大黃等藥攻之反增別病加減八珍湯主之或生化湯多服數帖亦效薛氏止用失笑散治之尊生錦囊均用四味散治效一産婦患前證服峻厲之劑惡露隨下久而昏憒以手護其腹此脾氣復傷作痛故用手護也以人參理中湯加肉桂二劑補之而愈加減八珍湯人參八分或一錢白朮土炒茯苓各一錢歸身二錢川芎赤芍各八分熟地一錢五分延胡索炒制香附各七八分炙草五分薑棗引水煎食前服四味散治瘀血不下及療才分娩一切諸疾當歸延胡血竭沒藥各五分為末用熱童便半鍾調服血證黑神散見上卷譫語門生化湯見本卷生化湯論後失笑散見中卷胞衣不下門脫汗亡陽及諸汗論産婦分娩既已亡血而又多汗極危證也蓋汗者心之液榮於內為血發於外為汗血液屬陰陰亡陽亦隨之而走故曰脫汗亡陽其用藥與他證不同但血塊作痛耆術又未可遽加如倦甚濈濈汗出形色又脫速灌加參生化湯倍參以救危急毋拘塊痛俟汗止再去參服之經曰陽氣者精則養神柔則養筋多汗不止必發柔痙氣血俱虛當用十全大補湯不應加附子豫謂無塊痛者當用之此證若服參耆重劑而汗多不止及頭汗出不至腰足難治自汗不止皆由勞傷心神不能鎮守其液治當健脾胃散水穀之精以歸肺益其營衛而虛血歸源灌溉四旁不使妄行於外而為汗也亦用加參生化湯或麻黃根湯並間用黃耆五味煎湯送六味丸醫通云因外感多汗者黃耆建中湯治之盜汗者睡中汗出醒來即止猶盜賊之瞰人睡而盜之謂之盜汗非自汗可比此因亡血陰虛陽氣偏盛內經云陽加於陰則發汗治當兼用血分藥品雜病雖有當歸六黃湯然寒而膩膈又不可治産後之盜汗也宜止汗散主之頭汗者或因濕熱或因瘀血當審虛實治之半身汗出昔人用二陳合四物治多不效以血藥助陰閉滯經絡也此屬氣血不充而有寒痰留滯非大補氣血兼行經豁痰不效宜十全大補人參養榮加星半川烏若肥人多加豁痰行氣藥如瘦人乃氣血本枯夭之徵也麻黃根湯治産後虛極自汗不止人參一錢或二錢當歸二錢黃耆一錢五分蜜炙麻黃根牡蠣煅麥冬去心浮麥各一錢桂枝五分炙草四分水煎服如無塊痛加土炒白朮一錢熟地三錢手足冷加熟附子一片炮姜四分渴加去心麥冬一錢五味子十粒惡風寒加防風五分肥人加竹瀝一小盞生薑汁半茶匙以清痰火並間服六味丸七八十丸用炙黃耆五味子煎湯送下黃耆建中湯附小建中湯內補建中湯桂枝三錢白芍六錢炒炙草二錢黃耆一錢五分蜜炙膠飴一合生薑五片大棗四枚劈上開乃古方分兩後人多有減用者桂枝一錢白芍二錢炙草七分膠飴三錢姜三片棗二枚千金多人參二錢桂枝湯者和營表藥也倍芍藥加膠飴便能建立中氣故名小建中湯以芍藥之酸斂護營血膠飴之甘培養中土能治風木乘脾寒熱腹痛再更加炙黃耆即黃耆建中湯治虛勞感寒發熱自汗以黃耆實衛氣使營衛臟腑俱和而受益多矣千金於小建中方加入當歸名曰內補建中其調和中外之力可知止汗散治産後盜汗人參二錢麻黃根一錢五分當歸酒洗熟地各三錢如有塊痛不用黃連五分炒浮麥一錢水煎服一方用牡蠣末五錢炒小麥麩八兩二味兼服三五錢豬肉汁調服人參養榮湯治心脾虛寒榮血不足寢汗發熱人參黃耆蜜酒炙炙草白朮土炒茯苓陳皮熟地當歸酒拌各一錢芍藥一錢五分炒肉桂八分遠志五分甘草水制去骨淨取肉五味子七分炒捶碎姜三片棗二枚水煎服二陳合四物名八物因不用故不録方加參生化湯見本卷暈厥門六味丸見上卷諸痛門附六味地黃湯下十全大補湯見上卷胎不長養門傷食論産後形體勞倦脾胃俱傷是以新産之後去膏粱遠厚味食粥茹蔬以為調攝不知者惟慮産後之虛以厚味為有補更有本不思食而強與之胃雖少納脾難轉運易至食停痞塞甚而傷食發熱切勿誤認為陰虛更有食滯腹痛又勿錯疑為血凝治斯證者體認真實如發熱而飲食調者方可補血若惡食噯酸者食滯之徵即當扶元為主補氣養血健脾助胃審傷何物佐以何藥消導則脾氣復而轉輸易滯物行而胃思谷矣如此補消兼治無有不安故善治者治法有先後緩急論證因塊痛有無産後有日數新久能重産虛之本而兼去停積之標攻補如法無不應手而愈故有生化消食湯健脾消食湯之分別施治如誤服峻藥過於消導致不思谷惟活命丹可救豫每見治産者但知速消食物反損正氣益加滿悶一劑不效又加峻藥一醫無功又更一醫先後互異輕證反重以致命絶病家自歸命數醫家以為盡技豈不惜哉生化消食湯治産後塊痛未止停食痞塞川芎二錢當歸五錢酒炒乾薑炙黑炙草各四分桃仁十粒去皮尖神麯炒麥芽炒各六分水煎服傷肉食加山楂五分砂仁五分傷寒物加吳茱萸一錢肉桂五分虛人加人參一錢或二錢健脾消食湯治産後塊痛已除停食痞塞人參二錢當歸三錢酒洗川芎神麯炒各一錢白朮一錢五分土炒山楂砂仁各六分麥芽炙草各五分水煎服或停寒日久脾胃弱甚雖藥不能即運須以手揉按或炒麩曲尉法亦妙長生活命丹治過服消導之藥致令少食或本思食之人反令絶食人參三錢用新罐或銀銚水鍾半煎七分再用飯鍋焦研粉先用些許以參湯調送二三茶匙引開胃口後漸慚加多漸加參湯陸續調服煎參不可用藥罐恐聞藥發嘔此方曾活數十餘命神效忿怒氣逆論産後忿怒氣逆胸膈不舒甚而作痛者兼之血塊又痛宜木香生化湯則自然血塊速化怒氣易散並治而不悖也若輕産而重氣偏用香附烏藥枳殼香砂之類以散氣行塊而元氣反損悶滿疼痛益增非善治産者也又如怒後即食胃弱停悶已無塊痛宜用健脾化食理氣湯再審何物所傷則佐以何藥消之痛悶即除慎勿輕用檳榔丸流氣飲等方以散氣化食則虛弱産婦重虛之禍不可勝言矣木香生化湯治産後塊痛未除日受氣惱至效川芎二錢當歸六錢酒洗乾薑四分炙黑陳皮三分木香二分磨沖服水煎服若怒後傷食與傷食治同審傷何物以何藥消之健脾化食理氣湯治産後無塊痛而受氣傷食者人參白朮土炒當歸酒洗各二錢川芎一錢乾薑炙黑炙草各四分陳皮三分水煎服如傷面加炒神麯炒麥芽傷肉加山楂砂仁傷寒物留滯脅間作痛加桂枝吳茱萸亦有止加桂枝八分亦可頭痛論人身之中氣為陽血為陰陰陽和暢斯無病矣夫頭者諸陽之會也産後去血過多陰氣已虧而虛陽失守上湊於頭則令頭痛但補其血則陽氣得從而頭痛自止間有敗血停留子宮厥陰之位其脈上貫巔頂作巔頂痛者雖有身熱惡寒之候只宜生化湯加減慎不可用羌獨等藥蓋由真陽虧損濁陰得以犯上陷入髓海為脹為痛是非清陽升復則濁陰不降在裡內起之邪為病非若外入之邪可表而愈也況生化湯中芎姜亦能散表邪桃仁亦能逐瘀血是又可兼治再少為因證加入又何用另方輕産而施治乎尊生治血虛頭痛用芎歸湯治感冒頭痛參蘇芎歸湯密齊治停瘀頭痛用血證黑神散如真頭痛旦發夕死不治産後芎歸湯即佛手散此方因證加藥治法治産後血虛頭痛當歸川芎各二錢五分水煎服有汗是氣虛加人參五七分桂心三分感寒加天麻白芷羌活各四分參蘇芎歸湯治産後感冒人參紫蘇乾葛各一錢當歸川芎各二錢姜一片煎服生化湯見本卷生化湯論後血證黑神散見上卷譫語門心痛即胃脘痛論人之胃脘居於心下産後或傷寒氣及冷物而作痛因痛近於心俗呼為心痛殊不知心為君主之官主血行氣統馭臟腑血氣盛則泰然安寧血不足則怔忡驚悸不安耳豈可痛乎若寒傷心經為真心痛與真頭痛證同皆無藥可救手足甲見青黑色旦發夕死諸書論之詳矣凡胃口痛當散胃中之冷物生化立效方治之無有不安若獨用熱藥攻寒其痛雖止而血妄行反虛産母況寒者必挾虛而燥熱者必佐陰藥方能制其僭越也至於綿綿而痛當問血塊盡又可揉按而少止是虛當用補劑大抵産後寒食上攻於心則心痛下攻於腹則腹痛治心腹之痛大約相同馮氏云産後陰血虧損隨火上衝心絡名曰心包絡痛宜歸脾湯主之醫通用理中加當歸治之生化立效方治産後因傷冷物胃脘作痛川芎二錢當歸四錢桃仁十粒去皮尖乾薑炙黑炙草各五分肉桂吳茱萸各四分水煎服一方無桃仁傷肉食加山楂砂仁傷麵食加炒神麯炒麥芽大便祕加酒洗蓯蓉尊生云如不止蒲黃二錢五分五靈脂一錢四分木通一錢赤芍一錢沒藥一錢延胡一錢五分薑黃一錢五分鹽滷一滴此蓋因瘀作痛服前藥痛仍不止而用也歸脾湯見上卷胞漏小産門理中湯見上卷瘧門附枳實理中湯下腹痛論産後腹痛先問血塊如有血塊只服生化湯甚則調失笑散其塊消而痛自止尊生亦用生化湯稍久始調失笑散下延胡一錢若風冷乘虛入腹或內傷寒涼之物作痛得人按摩略止或熱物尉之略止宜加味生化湯密齊用當歸建中湯治之馮氏云産後惡露或因外感六淫內傷七氣致令斬然而止瘀血壅滯所下不盡故令腹痛當審因治之如産後數朝內飲食如常忽作腹痛六脈沉伏四肢厥冷此惡血不盡傷食裹血而脈不起也不可誤認氣血兩虛而用大補須兼消導行血之藥但産後惡露不盡留滯作痛亦常有之然與虛痛不同必其由漸而甚或大小便不行或小腹硬實作脹痛極不可近手或自下上衝心腹或痛極牙關緊急有此實證當速去之近上者宜失笑散近下者宜通瘀煎未效用決津煎為善又有腹痛定於一邊及小腹者此是側臥敗血留滯所致醫通用四烏湯加蓬朮然亦不若決津煎為當也金匱云産後腹中㽲痛當歸生薑羊肉湯主之蓋㽲痛者緩緩痛也屬客寒相阻故以當歸通血分之滯生薑行氣分之寒君以羊肉者所謂形不足補之以味況羊肉又能補氣㽲痛屬氣弱故宜之若婦人産當寒月寒氣入産門臍下脹痛手不可犯此寒疝也亦宜當歸生薑羊肉湯治之密齊云産時寒氣客於子門入於小腹或坐臥不謹使風冷之氣乘虛而入此寒疝但不作脹且無形影為異治以金鈴子散豫考金匱密齊之論寒疝不同金匱云臍下脹痛手不可犯蓋有寒凝瘀滯也密齊云但不作脹且無形影是無瘀滯也又有産後脾虛腎虛而為腹痛者此不由産而由臟氣不足若脾氣虛寒為嘔吐為食少而兼腹痛者宜五君子煎及六君子湯主之若腎氣虛寒為瀉為痢而兼腹痛者宜胃關煎或理陰煎主之馮氏用六君子湯送四神丸治之若胸膈飽悶或惡食吞酸腹痛手不可按此飲食所傷治法見傷食門若食既消而仍痛按之不痛更加頭痛煩熱作渴惡寒欲嘔等證此是中氣被傷宜溫補脾胃為主若發熱腹痛按之痛甚不惡食吞酸此是瘀血停滯失笑散消之若止發熱頭痛腹痛按之卻不痛此是血虛初産生化湯日久用四物加炮薑參術以補之若産後惡露既去而腹仍痛四神散調補之不應八珍湯治之醫通云若下焦虛寒用六味丸加桂加味生化湯治産後風冷或傷寒物腹痛川芎二錢當歸四錢炮姜四分桃仁十粒去皮尖炙草五分桂枝四五分水煎服傷食照生化立效方加法尊生於生化湯內加炒白芍五分桂技五分痛止減去當歸建中湯治風冷乘虛入腹或傷寒冷物腹痛當歸酒洗白芍酒炒桂心炙草各二錢姜五片棗三枚水煎入飴糖三匙攪勻熱服金匱當歸生薑羊肉湯治産後腹中㽲痛及寒月生産寒氣入於子門手不可犯臍下脹滿並治寒疝虛勞不足及脅痛裡急者當歸一兩生薑一兩五錢羊肉二斤生先煮羊肉去滓及沫取清者煮當歸生薑溫分三服亦有加入蔥椒鹽以適口者若寒多者倍生薑痛多而嘔者加橘皮土炒白朮後人治産後腹中㽲痛用大劑人參阿膠生薑煎服效此即當歸生薑羊肉湯之變法金鈴子散治産後寒氣入於小腹而為寒疝非若血滯之作脹而有形影者川楝子去核小茴香炒補骨脂桂心各一錢姜引水煎加木香一錢水磨汁和勻食前熱服豫謂木香磨汁二三分沖服亦足矣五君子煎治脾胃虛寒嘔吐泄瀉而兼濕者人參二三錢白朮土炒茯苓各二錢乾薑一二錢炒黃炙草一錢水煎服胃關煎治脾腎虛寒作瀉或甚至久瀉腹痛不止冷痢等證熟地三五錢山藥炒白扁豆炒各二錢吳茱萸五七分制焦乾姜一錢白朮一二三錢土炒炙草一二錢水煎服瀉甚者加麵煨肉豆蔻一二錢或破故紙亦可氣虛勢甚者加人參隨宜用陽虛下脫不固者加製附子一錢腹痛甚者加木香七分或加製厚朴亦可滯痛不通者加當歸二三錢滑脫不禁者加烏梅二個或北五味二十粒若肝邪侮脾者加肉桂一錢四神丸附二神丸治腎虛肝氣逆不能消克腹脹泄瀉並治五更腎瀉神效補骨脂四兩酒浸一宿炒肉豆蔻二兩面里煨去面吳茱萸一兩鹽湯泡五味子三兩或二兩炒為末蒸餅丸或姜煮棗取棗肉去姜搗為丸梧子大每服二錢米湯溫酒任下一方補骨脂肉豆蔻等分吳茱萸五味子減半止用補骨脂肉豆蔻二味棗肉為丸名二神丸治五更早瀉功同四神散治産後血虛或瘀血腹痛當歸二錢川芎白芍炒透各一錢炮姜五分水煎服豫謂白芍治血虛腹痛則可若治瘀血作痛未必然也今炒透而與炮姜合用故血虛瘀痛兼治之生化湯見本卷生化湯論後失笑散見中卷胞衣不下門通瘀煎決津煎俱見上卷鬼胎門四烏湯六君子湯八珍湯六味丸俱見上卷諸痛門理陰煎見上卷惡阻門四物湯見上卷安胎門小腹痛並兒枕痛論産後虛中感寒及飲食冷物下攻小腹作痛前已論之矣又有因血虛痛及小腹者亦服生化湯妙至血塊作痛俗名兒枕痛者亦用生化湯不應用延胡生化湯均可馮氏用芎歸益母山楂香附陳皮煎服甚者加炒五靈脂密齊云臍下胞胎所繫之處血之所聚也産後血去不盡即成小腹痛證刺痛無時痛則有形須臾痛止又不見形血證黑神散主之然有産婦小腹作痛服行氣破血藥不效其脈洪數此瘀血內潰為膿也是因營衛不調瘀血停滯宜急治之緩則腐化為膿最難治療若流注關節則患骨疽失治多為敗證脈數而洪已有膿遲緊乃瘀血也下之愈若腹脹大轉側作水聲或膿從臍出或從大便出用蠟礬丸太乙膏下膿而愈延胡生化湯治小腹兒枕塊痛川芎二錢當歸四錢酒洗桃仁十粒去皮尖炮姜炙草各四分延胡一錢水煎服或用生化湯送延胡索一錢治同亦能治寒氣痛如無塊但小腹痛可按而止者屬虛以生化湯加入延胡索散再加入熟地二錢延胡索散肉桂延胡各等分合為細末聽用蠟礬丸治一切瘡癰惡毒先服此丸護膜托裡使毒不攻心或為毒蟲蛇犬所傷並宜服之黃蠟二兩白礬一兩先將蠟溶化候少冷入礬和勻為丸如小緑豆大每服十丸或二十丸漸加至百丸則有力瘡愈後服之亦佳一方加雄黃名雄礬丸治蠱毒蛇犬蟲咬毒黃蠟甘溫白礬酸澀並能固膜護心解毒定痛托裡排膿使毒氣不致內攻故外科諸證之所必用也太乙膏治內外一切癰瘍黑參白芷歸身肉桂大黃赤芍生地各二兩上切為片麻油二斤浸春五夏三秋七冬十日煎熬去滓濾淨再熬徐下黃丹不住手攪滴水不散為度內癰可丸服之生化湯見本卷生化湯論後血證黑神散見上卷譫語門腰痛論産後腰痛者由腎位系胞腰為腎府産則勞傷腎氣損動胞絡或虛未平復而風冷乘之二者皆致腰痛若寒冷邪氣連滯背脊痛久未已後忽有孕必致損動宜養榮壯腎湯主之如産後日久腰痛濟陰大造丸治之如惡露方行忽斷絶不來腰中重痛下注兩股痛如錐刺入骨此血滯經絡不即通之必作癰疽醫通用調經散加陵鯉甲或琥珀地黃丸亦宜切勿誤用五積散等辛溫之藥蓋五積之治瘀血作痛以蒼朮為君麻黃為臣厚朴枳殼為使雖有歸芍之補血僅及蒼朮三分之一不思産後之婦即有寒邪血氣未充似難發汗不過借藥性溫和可以推陳致新豈可用麻黃之悍蒼朮之燥散虛而又虛禍不旋踵矣養榮壯腎湯治産後腰痛屬勞傷或風寒所乘當歸二錢獨活桂心川芎杜仲鹽水制斷絲續斷制取淨肉桑寄生各八分取真桑樹上者防風四分生薑三片煎服如服二帖後疼痛不止腎虛也加熟地三錢再服失血過多者加當歸二錢蜜炙黃耆酒炒白芍各一錢五分局方調經散治産後敗血乘虛停積於五臟循經流入於四肢留滯日深腐壞如水漸致身體面目浮腫或因産敗血上干於心心不受觸致心煩躁臥起不安如見鬼神言語顛倒並宜服之赤芍沒藥別研琥珀別研桂心當歸各一錢細辛去苗麝香別研各五分上為末和勻每服一錢溫酒入生薑少許服一方每服五分以痛止為度琥珀地黃丸治産後惡露未淨胸腹痛小便不利琥珀別研延胡同糯米炒去米當歸各一兩蒲黃四兩生半炒半乾生地八兩生薑一斤上將地黃咀碎酒浸生薑切片各搗取汁留滓無油杓中用薑汁炒地黃滓地黃汁炒姜滓各干為末忌犯鐵器煉白蜜為丸彈子大每服一丸空心當歸煎湯調服濟陰大造丸見上卷補益門脅肋痛論産後脅痛乃敗血流入肝經其厥陰之脈循行脅肋故作痛此證有虛實宜分治之不可誤也如脅下脹手不可按是瘀血也宜去其血芎歸瀉肝湯主之如脅下痛喜人按其氣閃動肋骨狀若奔豚者此去血太多肝臟虛也當歸地黃湯主之醫通云脅痛宜分左右蓋左屬血血藏於肝肝傷有死血故痛加減小柴胡湯右屬脾脾有痰積則痛加減補中益氣湯左右俱痛者屬虛補中益氣湯加桂下六味丸然痰氣亦有流於左脅必與血相持而痛血積亦有傷於右脅然必因脾氣衰而致又左有怒氣傷肝右有氣鬱傷脾不因血與痰而痛其間治法善雜證者可默悟矣馮氏云産後脅痛若肝經血瘀延胡索散若肝經氣虛四君子加柴胡薄桂若肝經血虛四物加參朮柴胡若腎水不足不能生肝六味丸若肺金勢盛剋制肝木瀉白散然若不用薑桂辛溫助脾肺以行藥力不惟無以施功反添其脹矣尊生云肋痛屬氣滯歸芍清肝飲治之蓋肋與脅部位不同不可認而為一腋之下有骨處為肋肋之下無骨處為脅芎歸瀉肝湯治産後瘀血脅痛手不可按歸尾一錢川芎香附童便制各八分青皮枳殼麩炒各六分桃仁八粒去皮尖紅花四五分水煎熟去滓入酒童便服瘀甚藥分兩或可加倍當歸地黃湯治産後肝血去多脅虛而痛人參當歸酒洗白芍酒炒熟地各一錢五分陳皮炙草桂心各一錢薑棗引水煎服加減小柴胡湯治産後左脅痛小柴胡湯見上卷諸痛門去黃芩加丹皮制香附薄桂當歸童便加減補中益氣湯治産後右脅痛補中益氣湯見上卷諸痛門去升麻加葛根製半夏茯苓麩炒枳殼生薑引瀉白散附加味瀉白散治肺火喘嗽氣急手足心發熱桑白皮薑汁和蜜炙地骨皮各一兩炙草五錢粳米百粒為散每服四五錢一方米不為散用米並竹葉為引水煎服加橘紅桔梗名加味瀉白散歸芍清肝飲治産後氣滯肋痛當歸一錢五分白芍桔梗各六分檳榔枳殼麩炒各三分桂心青木香柴胡各二分五釐水煎服補中益氣湯見上卷諸痛門六味丸見上卷諸痛門附六味地黃湯下延胡索散見本卷小腹痛門四君子湯見上卷胎逆上逼門四物湯見上卷安胎門手足身痛論産後遍身疼痛者因産百節開張血脈流散氣弱不充則經絡間血多凝滯不散筋脈急引骨節不利故有腰背不能轉側手足不能伸屈或身熱頭痛者起痛散主之若誤作傷寒發表汗出則筋脈瞤動手足厥冷變為痙證又當十全大補湯也若指節疼痛補中益腎湯足膝腫或痛獨活寄生湯醫通云産後敗血或流於腰胯或流入髀股痛不可拊痛處熱腫流注日深漸至身面浮腫調經散進或琥珀地黃丸最當若虛風所侵以致肢體沉重不利筋脈急引發熱頭痛四神散加桂枝薑棗和營止痛最捷勿誤為傷寒治也以手按而痛益甚是瘀滯按而痛少緩是血虛以此別虛實庶無差謬馮氏云産後手足身痛是血虛不能榮也手足走痛者是氣血不能榮養四末而濁氣流於四肢則腫陰火遊行四旁則痛也不出養榮加黑姜主之起痛散治産後遍身疼痛由氣血虛有滯不可誤作傷寒施治當歸二錢酒浸黃耆一錢蜜炙白朮土炒淮牛膝蒸獨活肉桂韭白各八分甘草三分姜三片水煎熱服尊生方無黃耆韭白止五分補中益腎湯專治産後虛勞指節疼痛頭疼汗出人參黃耆蜜炙淡豆豉各一錢當歸二錢酒浸韭白五分生薑三片豬腎一付先將豬腎煎熟取汁二盞煎藥八分溫服十全大補湯見上卷胎不長養門獨活寄生湯見上卷諸痛門調經散琥珀地黃丸俱見本卷腰痛門四神散見本卷腹痛門養榮湯見本卷脫汗亡陽門發熱論産後七日內外發熱其證多端除傷食發熱已論見傷食門矣然又有發熱惡寒頭痛似太陽證或寒熱頭痛脅痛似少陽證皆由氣血兩虛陰陽不和其狀頗類傷寒治者慎勿輕産而執偏門以麻黃湯治類太陽證以柴胡湯治類少陽證蓋産後大血空虛一經發汗重則亡陽輕則筋惕肉瞤或鬱冒昏迷或搐搦便祕變證百出矣昔仲景云亡血家不可發汗丹溪云産後切不可發表二先生非謂産後無傷寒之證也非謂柴胡麻黃湯之不為對證也誠恐後學執偏門而輕産泥成方而發表耳雖明知感有外邪其生化湯內芎姜亦能散之否則辛散生化湯亦可何用發表以犯不可汗之禁乎産時傷力發熱去血過多發熱惡露不快發熱三日蒸乳發熱早於起床勞動發熱多因血虛陽無所依浮散於外而為熱只服生化湯二三劑去惡生新陽生陰長其諸熱悉能退之尊生用丹溪法以四君子湯加芎歸黃耆炮姜治産後發熱亦甘溫除大熱意也又云大熱面赤大渴脈洪大而虛者黃耆當歸等分煎服此仿當歸補血湯也馮氏用四物為君去川芎生地換熟地加軟苗柴胡人參炮姜治熱最效此亦取炮姜收其浮散之熱而兼芍藥斂陰之意豫謂當分塊痛有無如七日內尚有塊痛及初産時發熱自宜生化湯為妙其參耆柴朮地芍尚須緩用若無塊痛産日已久尊生馮氏之方亦合經旨也養葵云如胎前原有陰虛火證産後去血過多必大熱煩躁汗出等證若大補氣血其證必甚當用逍遙散以清肝火養肝血因其去血既多肝虛血燥之故不可泥於氣血兩虛而治豫謂此以肝虛有火立論當以脈候參詳可耳薛立齊又云新産婦人陰血暴亡陽無所附而外熱宜四物加炮姜補陰以配陽若系誤用寒涼克削之劑而外熱者此為寒氣格陽於外宜四君子加薑桂不應急加附子若肌膚髮熱面赤大渴引飲者此血脫髮燥也當歸補血湯又曰産後虛煩發熱乃陽隨陰散氣血俱虛故惡寒發熱若誤作火證投以寒涼誤作表證輕用表散禍在反掌豫謂立齊之論及治法深得産後之要但四物加炮姜一方不若易生化湯則全美矣辛散生化湯附辛散湯治産後感冒風寒惡寒發熱頭痛川芎一錢五分當歸三錢炙草乾薑炙黑羌活防風各四分桃仁十粒去皮尖水煎服若頭疼身熱不除加白芷八分細辛三分頭疼如破加連須蔥頭五根虛加人參二三錢一方用生化湯加白芷八分羌活細辛各四分蔥頭五根不用防風通治之虛亦加人參名辛散湯豫謂産後七日前當用生化湯七日後可用此方當歸補血湯治血虛至夜發熱煩渴引飲其脈洪大而虛重按全無者黃耆六錢蜜酒炙歸身二錢水煎服生化湯見本卷生化湯論後四君子湯逍遙散俱見上卷胎逆上逼門四物湯見上卷安胎門大便燥祕論産後大便燥祕由於去血過多胃中枯燥精微不及下輸以至糟粕壅滯不通況大腸主津産婦內亡津液則乾涸失其傳導變化之權故令便難多服生化湯則血旺氣順自潤而通或服養正通幽湯亦可倘不大便而無所苦即勿藥亦可所以産後每至三五日之久甚至八九日而大便始通者皆其常也即有似傷寒三陰證潮熱汗出或口燥腹滿或譫語便祕燥糞宜下等證乃氣血枯竭虛證類實慎勿執偏門而輕産妄議三承氣湯以下之或有血虛火燥不便者不可計其日數必待腹滿覺脹欲自去而不能此乃結在直腸用潤腸粥潤之自通全書用濟川煎主之慎不可用導法倘潤之不通勢急有無可如何者用蜜煎導之將蜜煎褐色成膏入水捏成棗樣納入肛門其結糞自化而出或削醬瓜醬姜如蜜棗導法此亦權宜之計耳惟豬膽汁導切記禁用以其苦寒誤用每至發厄倘服苦寒藥攻通反傷中焦元氣或愈結難通或通泄不止斯成敗證矣醫通云血虛火燥用四物湯加何首烏潤下之立齊云若去血過多十全大補湯氣血俱虛用八珍湯如數日不通飲食如常腹中如故者八珍加桃仁杏仁治之馮氏云大便難惟宜調中養血切不可單用麻仁枳殼徒耗腸胃中生養之氣而無功也有治大便日久不通大料芎歸服至斤數方得取效仍兼服潤腸粥如大小便俱祕惡露不行方論俱見惡露不下門養正通幽湯治産後大便燥祕川芎一錢或一錢五分或二錢當歸四錢或六錢桃仁十粒去皮尖炙草五分陳皮四分麻仁一錢或一錢五分炒肉蓯蓉一錢或二錢酒洗去泥甲水煎服一方無蓯蓉如有血塊痛加肉桂炒延胡索各五分不用蓯蓉如氣虛多汗加蜜炙黃耆一錢人參一二錢一方再加麻黃根一錢燥渴加去心麥冬一錢五分人參一二錢一方再加五味子七粒腹滿便實加去心麥冬一錢麩炒枳殼六分汗出譫語便實乃氣血並竭神衰心主失守宜養氣安神加茯神炒棗仁制遠志肉炙黃耆柏仁蓯蓉各一錢人參土炒白朮各二錢更須與妄言妄見門參治潤腸粥治産後日久便祕不通芝麻一升研為末和粳米二合煮食腸潤即通濟川煎凡病涉虛損而大便閉結不通其攻擊等藥萬不可用若勢有不得不用通者此方主之此用通於補之劑也最妙當歸三五錢牛膝二錢蒸肉蓯蓉二三錢酒洗去滷澤瀉一錢五分升麻五七分枳殼一錢麩炒虛甚者不用水一鍾半煎七分食前服如氣虛但加人參無礙如有火加酒炒黃芩如腎虛加熟地生化湯見本卷生化湯論後十全大補湯見上卷胎不長養門四物湯見上卷安胎門八珍湯見上卷諸痛門類瘧及寒熱往來論産後痁瘧在初産時絶少即胎前久瘧淹纏産後裡氣通達無不霍然即有半月內外寒熱往來每日應期而發或一日二三度其證類瘧皆由産後氣血虛損陽虛作寒陰虛發熱或晝輕夜重或日哺發熱或有汗或頭有汗而不及身足此乃元氣虛弱孤陽絶陰之證俱宜滋榮益氣扶正湯間服六味丸以退寒熱如寒熱往來頭痛無汗加減養胃湯治之若寒熱已久無汗者兼煎參朮膏以助養胃湯藥力慎不可作瘧治而用柴胡湯及芩連梔柏以退熱草果檳常以絶瘧而誤人也至於陰陽不和乍寒乍熱參歸湯治之全書云陰勝寒多理陰煎陽勝熱多三陰煎陽氣陷入陰中補陰益氣煎陰陽俱虛八珍十全敗血不散流入陰中而作寒熱決津煎殿胞煎滋榮益氣扶正湯治産後寒熱往來有汗每午後應期而發人參熟地各二錢川芎黃耆蜜炙麥冬去心各一錢當歸三錢白朮一錢五分土炒陳皮四分炙草五分水煎服間服六味丸或加柴胡八分青皮三分烏梅二個汗多加麻黃根一錢一方引加浮小麥一撮不加麻黃根加減養胃湯治産後已及一月類瘧並治寒熱往來頭痛無汗人參一錢五分川芎茯苓蒼朮米泔水制炒各一錢當歸三錢酒浸藿香炙草橘紅各四分半夏八分制姜一片棗二枚水煎服有痰加竹瀝薑汁一方無製半夏有痰方加入久類瘧無汗兼服參朮膏助之參朮膏人參白朮土炒各四兩水六碗各煎取汁三碗如法再煎三次取汁共九碗再共熬至一腕每日服半酒鍾白滾水化下參歸湯治産後陰陽不和乍寒乍熱當歸酒洗炮姜一錢人參白芍炒川芎炙草各八分水煎服三陰煎治肝脾虛損精血不足及營虛失血等病凡中風血不養筋及瘧證汗多邪散而寒熱猶不止者人參隨宜當歸二三錢熟地三五錢芍藥酒炒棗仁各二錢炙草一錢水二鍾煎七分食遠服如嘔惡加生薑三片汗多煩躁加五味子十四粒汗多氣虛加蜜炙黃耆一二錢小腹隱痛加枸杞二三錢如有脹悶加陳皮一錢如腰膝筋骨無力加炒杜仲蒸淮牛膝各一錢補陰益氣煎人參一二錢當歸山藥酒炒各二三錢熟地三五錢陳皮炙草各一錢升麻三五分若火浮於上者去此不用柴胡一二錢如無外邪不用姜三片煎服此補中益氣湯之變方治勞倦傷陰精不化氣陰虛外感痎瘧並便結不通凡屬陰氣不足而虛邪外侵者用此升散無不神效六味丸見上卷諸痛門附六味湯下理陰煎見上卷惡阻門八珍湯見上卷諸痛門十全大補湯見上卷胎不長養門決津煎見上卷鬼胎門殿胞煎見本卷三審門類中風痙痓及語澀口噤不語筋攣瘛瘲等證論凡婦人衝脈為血脈之海若血脈充足流暢無滯氣血沖和則關節清利而無病矣至於産後勞損臟腑氣血暴竭百骸少血濡養多有陰虛內熱熱極生風雖外證如風實內臟陰血不足氣無所主卒爾口噤牙緊唇青肉冷汗出或唇口喎僻手足筋脈攣搐諸證類於中風者或因血氣耗損腠理不密汗出過多神無所主致角弓反張此乃厥陰虛極類痙痓者在傷寒之家雖有剛柔之分而産後無非血燥血枯之證總宜養陰補血血長而虛風自滅任其痰火乘虛泛上皆當以末治之毋執偏門而用治風消痰之方以重虛産婦也治初産當服生化湯以生旺新血如見危證三帖後即用人參益氣以救之如有痰有火或少佐橘紅竹瀝薑汁其黃連芩柏不可並用膽星蘇子尤不宜加慎之慎之如産已數日腹無塊痛即用滋榮活絡湯如語澀四肢不利宜天麻湯密齊治語言蹇澀加味生麥散治汗多口噤背反氣微類痓用止汗生血飲治無汗筋攣用芎歸棗仁湯諸書所用悉皆參附十全理陰大補元煎之類溫養而峻補之從未有以風痰治之者昔立齊用十全大補治口噤挖開口灌之如不得下令側其面出之仍灌熱者又冷又灌數次即能下而蘇矣醫通云口噤則抉齒灌之斷噤則灌入鼻中即蘇此古人救急灌法不可不知至於治口噤不能為語峻補之中少兼通心氣之藥治之故密齊尊生俱用七珍散以通心氣也馮氏治産後瘛瘲用八珍加丹皮鉤藤以生陰血不應用四君子芎歸丹皮鉤藤補脾土蓋血生於至陰至陰者脾土也且氣有生血之功耳再此證如傷寒誤汗亡液誤下亡陰潰瘍膿血大下之後小兒吐瀉之後悉多患之故在産後亦惟去血過多或大汗大瀉而然其為元氣虧極血液枯敗可知若肢體惡寒脈微細者此為真狀若脈浮大發熱煩渴此為假象惟當固本為善若至於無力抽搐戴眼反折汗出如朱兩手撮空者不治尊生治産久拘攣不宜補者用舒筋湯治之昔余奉差督運亡室因胎前過月不生忽患子癇證誤為醫人認傷寒胎死用承氣調天水散下之及産後惡露即停止不行此原非瓜熟自落乃惡露隨胎為藥所逐則一時盡下非有瘀滯不行也所以腹無塊痛醫者不明此理不問塊痛有無用牡丹皮澤蘭等藥以致有形之血不生無形之氣更傷是以隨變神脫妄言妄見虛火引痰上升治者猶不知此孤陽浮越之候復不辨脈證仍進逐瘀退熱之劑病勢愈深豈知産後大虛再經辛散消克則神愈亡而血愈竭是以心血竭而妄言愈甚肝血竭而內虛生風成搐肺氣竭而發喘鼻孔黑如煙煤脾氣竭而四肢不為所用胃中元氣告匱不能散精痰壅愈甚治之者仍不識為虛證反用膽星蘇子以化痰降氣梨汁以清痰降火殭蠶柴胡天麻以止搐諸如此等藥類雜進交攻罔知顧本遂致殞命良可慟也滋榮活絡湯治産後口噤項強筋搐類中風證人參二錢或三錢川芎茯神各一錢當歸三錢酒浸黃耆一二錢蜜炙麥冬一錢二分或一錢去心天麻八分或一錢熟地二錢陳皮荊芥防風羌活炙草各四分黃連三分薑汁炒水煎服有痰加半夏七分制竹瀝七分薑汁少許有肉食加山楂砂仁麵食加神麯麥芽大便祕加肉蓯蓉一錢五分酒洗去泥渴加麥冬乾葛各八分汗加麻黃根八分驚悸加酸棗仁一錢去殼天麻湯治産後中風恍惚語澀四肢不利人參棗仁炒茯神遠志淨肉制山藥柏子仁麥冬去心各一錢當歸一二錢石菖蒲半夏曲南星曲各八分川芎羌活各七分天麻防風各五分細辛四分或煉蜜為丸珠砂為衣淡薑湯送加味生脈散治産後去血太多心血虛弱不能上榮於舌語言不清含糊蹇澀人參麥冬去心歸身生地炙草石菖蒲各一錢五味子十三粒捶碎獖豬心一個劈開水二盞煎至一盞半去心入藥煎七分食後服此方治怔忡甚效止汗生血飲治産後汗出多而口噤不開背強而直氣息欲絶類痓證宜速治也當歸二錢酒浸川芎麻黃根各一錢桂枝羌活防風羚羊角天麻各六分附子制炙草各四分水煎服一方有人參一錢芎歸棗仁湯治産後無汗筋脈拘攣類痓證當歸二錢酒洗川芎防風各一錢棗仁五分去殼炒研水煎服一方有羌活七分七珍散治産後敗血停積閉於心竅神志不明蓋心氣通於舌心氣閉則舌強不語人參石菖蒲各一錢為散各一兩川芎一錢為散七錢五分生地一錢為散易炙甘草三錢細辛二分為散二錢五分薄荷一分為散無此味防風五分一方四分辰砂五分研細水飛為散三錢尊生合生化湯服一方為散薄荷湯調服三錢舒筋湯治産後日久拘攣不宜用補劑者羌活薑黃炙草各二錢海桐皮當歸赤芍各一錢白朮一錢土炒沉香少許姜煎參證治參附湯人參當歸酒浸各二三錢肉桂八分或一錢黃耆蜜炙白朮土炒各一錢五分熟地二錢製附子四分或六分炙草四分生化湯見本卷生化湯論後加參生化湯見本卷暈厥門十全大補湯見上卷胎不長養門理陰煎見上卷惡阻門大補元煎見本卷惡露不止門八珍湯見上卷諸痛門四君子湯見上卷胎逆上逼門怔忡驚悸並虛煩煩躁論産婦憂驚勞倦去血過多則心中躁動不寧謂之怔忡若惕然而驚心中怯怯如人將捕之狀謂之驚悸治此二證惟調和脾胃補養心血俾志寧神定氣舒心安而病愈矣如分娩後血塊未消宜服生化湯以補血行塊連服數劑則血旺而怔忡驚悸自平不必加定志安神之品如塊痛已止服加減歸脾湯如心中驚悸目睛不轉而不能動診其脈動而弱者宜養血佐以安神藥養心湯主之素壯火盛者兼服安神丸如虛煩不眠亦心虛所致加減歸脾湯並治之孫真人用人參丸治驚悸不眠亦效至於煩躁不寧亦宜分塊痛有無如塊痛未除有瘀血也生化湯調失笑散如塊痛已止是虛或有熱人參當歸湯治之加減歸脾湯治産後血塊痛止怔忡驚悸人參茯苓棗仁炒麥冬去心黃耆蜜炙白朮土炒各一錢當歸二錢酒浸川芎八分遠志肉六分制陳皮炙草各四分龍眼肉八枚姜一片水煎服虛煩加竹茹一團有痰加竹瀝薑汁或更加柏子仁一方茯苓易茯神無川芎陳皮有木香二分養心湯治産後心血不寧驚悸不安人參一錢五分當歸身二錢酒浸黃耆蜜炙麥冬去心棗仁炒柏子仁各一錢茯神川芎遠志肉制各八分五味子十粒炙草四分水煎服安神丸治産後怔忡驚悸素壯火盛者歸身酒浸生地各三錢黃連二錢炒甘草五分炙用生用俱可以上四味共為末蒸餅丸如緑豆大以硃砂為衣每服四十丸人參丸治産後大虛心悸志意不安恍惚恐畏虛煩不眠少氣人參茯苓麥冬去心薯蕷各二兩澤瀉菖蒲乾薑桂心甘草各一兩共為末白蜜和棗膏丸如梧子大空心酒服二三十丸早晚服人參當歸湯治産後塊痛已止或虛或虛而有熱煩躁不寧人參當歸酒浸熟地麥冬去心各二錢肉桂四分白芍一錢酒炒生地八分竹葉十片水煎服生化湯見本卷生化湯論後失笑散見中卷胞衣不下門麻瞀論産後麻瞀皆因氣虛血少不能充溢乎周身也即如人曲肱而枕稍久即麻木不為我用其非氣血不周遍之明徵歟目得血而能視得清氣之升而能用血虛氣弱不能升清故濁不降而瞀宜生血補氣十全大補湯主之至於去血過多手足發麻小腹大痛則遍體麻暈欲死此非惡露凝滯乃虛中挾痰六君子加炮薑香附當歸曾治一婦産後右半身麻瞀而昏暈不省人事發即胸膈痞悶下體重著或時心神蕩搖若無心肺之狀頃則周身冷汗如漉大吐痰涎而蘇此産後經脈空虛痰飲乘虛襲入之故因與六君子加歸耆肉桂隨手而效復有一婦産後左半身麻瞀昏暈不省人事發則周身大痛筋脈瘛瘲肌肉瞤動或時頭面赤熱或時腿上振振動搖頃則蒸蒸汗出而蘇此産後營血大虧虛風襲入之故用十全大補湯治之諸證悉平但麻瞀不止後與地黃飲子而安地黃飲子治腎氣上交於心舌喑足痱熟地三兩巴戟天酒浸去骨附子炮山茱萸去核肉蓯蓉酒浸去腐切焙石斛白茯苓石菖蒲遠志甘草湯泡去骨取肉甜肉桂麥冬去心各一兩五味子五錢共為粗末每服五錢生薑五片大棗一枚薄荷七葉水煎日二服服無時方中桂附巴戟原為驅逐濁陰痰涎而設不可執己見而輕去之十全大補湯見上卷胎不長養門六君子湯見上卷諸痛門口乾渴兼小便不通或短少論凡産後舌燥咽乾而渴兼小便不利由産後亡血或汗多所致內亡津液也夫日用水穀胃納而脾運肺散至精至清之氣為津為液清肅下行膀胱而為小便其氣通心受火色化為營身之血值産亡血而又汗多加之産後氣虛不能為胃行其津液則是生化之氣不運滲泄之令不行所以上無津液流通而有咽燥乾渴之證下氣不升而有小便不通雖通而亦短少之候勿作淋祕輕用滲利使氣益虛病益甚治法必當助脾益肺升舉氣血則氣化流行陰升陽降斯水入經而為血為津谷入胃而長氣行脈自然津液充而便利調勻矣初産生化湯多服數劑如汗多亡津液須加人參於內使血生而津足若無塊痛六君子倍參耆或服生津止渴益水飲渴甚兼服參麥飲如産後口乾少力宜生津益液湯有用四君子湯加車前一錢桂心五分若認咽乾口燥為火而用芩連梔柏以降之認小便祕澀為水滯而用五苓等劑以通之不特非其治法更患愈通愈竭變生他證矣尊生云小便不通金匱腎氣丸可加減用之豫謂當用加味腎氣丸為是若兼口渴用生津止渴益水飲渴甚兼生脈飲密齊云如惡露不來敗血閉澀水瀆小便不通其證則小腹脹滿刺痛乍寒乍熱煩悶不寧用加味五苓主之豫謂初産自當用生化湯則瘀行便利矣可無事乎五苓也如産過五七日而惡露亦自宜漸少而止矣又何必事乎五苓也況産後最禁發汗利水豫焉敢輕産而用五苓以竭其陰乎世有治小便不通用炒鹽加麝少許填臍中外用蔥白十餘莖作一束切如半指厚置鹽麝上將艾灸之覺熱氣入腹難忍方止小便即通此惟氣閉者宜之若産後氣虛源涸與夫熱結膀胱者皆不可用生津止渴益水飲治産後口渴小便不利人參生地麥冬去心各二錢黃耆一錢五分蜜炙五味子十粒當歸三錢酒浸茯苓八分升麻炙草各四分葛根一錢水煎服如汗多加麻黃根一錢炒棗仁一錢浮小麥一撮大便日久不通加酒洗蓯蓉一錢五分渴甚用參麥飲代茶飲之不可疑而不用凡一切降火利便藥斷不可用生津益液湯治産後口乾少力人參隨宜麥冬一錢二分去心茯苓栝蔞根各一錢甘草八分小麥一撮竹葉十片棗二枚水煎服如大渴加蘆根加味五苓散治産後惡露不行小便不通豬苓澤瀉白朮土炒茯苓桂心各一錢桃仁去皮尖紅花各二錢水煎服此方豫未敢用姑録之以備參考耳生化湯見本卷生化湯論後六君子湯見上卷諸痛門參麥飲見本卷暈厥門四君子湯見上卷胎逆上逼門加味腎氣丸見上卷諸痛門附六味地黃湯下泄瀉及完穀不化並遺屎論産後泄瀉不可與雜證同治大率中氣虛弱傳化失職所致氣虛食積與濕也氣虛宜補食積宜消濕宜燥之然惡露未除又難以驟補峻消急燥當先用蓮子生化湯三劑化舊生新方中且有蓮子茯苓補脾利水兼治其瀉候舊化新生然後用健脾利水生化湯或補氣或消食或化積或燥濕分利因證加入對證之藥始無滯澀虛虛之失至産後旬日外方可與雜證同論然猶宜量人虛實而治也如痛下清水腹鳴米飲不化者以寒瀉溫之如糞色黃肛門痛以熱瀉清之如飲食過多傷脾噯氣味如敗卵以食積消之如飲食減少食下腹鳴腹急盡下所食之物方覺暢快以脾虛食積補而消之丹溪云如産後虛瀉眼昏不識人危證用參苓朮附湯救之又有胎前久瀉産後不止以致虛脫須從權服參苓生化湯以扶虛仍分塊痛不痛加減而治凡瀉兼熱切勿用芩連梔柏兼痰切勿用半夏生薑如瀉渴參麥飲以回津液如産後脾瀉不止參苓蓮子飲妙夫完穀不化者因産時勞倦傷脾而轉輸稽遲也夫水穀入胃遊溢精氣散歸於脾脾氣散精上歸於肺而調通水道乃能致氣滋臟以養人今因産勞倦脾傷以致沖和之氣不能化而物完出焉病名飧泄又飲食太過脾胃受傷亦致完穀不化俗呼為水穀痢也然産方三日內血塊未散患此脾敗胃弱之證未可遽加耆術且服加味生化湯內有益智砂仁少溫其氣俟塊消散服參苓大補生化湯如胃氣虛瀉利黃色用補中益氣湯加木香治之若久瀉痢虛者參香散如久瀉元氣下陷大便不禁肛門如脫宜加味六君子湯若見完穀不化色白如糜此脾胃大虛元氣虛脫之候十有九死惟猛進溫補之劑庶可挽回即有煩躁發熱面赤脈來數大皆虛火上炎之故當並進桂附人參甘草乾薑芩術之類伏龍肝煎湯代水煎服仍得收功若小便混濁如泔或大便中有白沫如腸垢者乃元氣下陷之故並宜補中益氣加桂苓炮姜升舉之或瀉臭水不止加蘄艾香附吳茱萸若兼瘀結不通腹脹喘急雖神丹亦無濟也如大便不知為遺屎補中益氣湯加肉蓯蓉故紙蓮子生化湯治産後血塊未消泄瀉川芎茯苓各二錢當歸四錢一方一錢黃土炒炮姜四分桃仁十粒去皮尖炙草五分蓮肉十枚去心水煎服一方無桃仁健脾利水生化湯川芎當歸黃土炒各一錢白朮二錢土炒澤瀉八分乾薑四分炮陳皮炙草各五分肉果一枚煨人參三錢茯苓一錢五分一方無茯苓寒瀉加砂仁八分炮乾薑八分熱瀉加炒黃連五分瀉水腹痛米飲不化加砂仁六分山楂麥芽瀉有酸噯臭氣系食積加神麯八分砂仁八分山楂麥芽少食不安瀉即覺安快者亦以食積論脾氣虛久瀉加升麻瀉水多而腹不痛者有濕加製蒼朮一錢以燥之諸瀉方中須加蓮子十枚參苓朮附湯丹溪治産後虛瀉眼昏不識人危證用此方救之人參七錢白朮三錢土炒茯苓附子制各一錢水煎服參苓生化湯治胎前久瀉産後不止人參當歸各二錢乾薑炮炙草各五分訶子皮川芎山藥炒各一錢肉果一個麵裹煨茯苓一錢五分蓮子七粒糯米一大撮水煎服虛甚加人參三四錢如七日內外塊痛不止減參肉果訶子以除痛血塊不痛加土炒白朮二錢陳皮三分參苓蓮子飲治産後脾泄不止並治年久不止脾泄之證人參白朮土炒各二錢白芍八分炒當歸一錢五分白茯苓山藥各一錢升麻陳皮各三分炙草四分蓮子十二粒去心姜二片水三鍾煎服取藥內蓮子送藥甚者腹疼加炒黑乾薑五分虛甚加人參三四錢加味生化湯治産後脾虛三日內血塊未消完穀不化胎前素弱者非胃苓能治此方主之川芎益智仁砂仁各一錢當歸四錢土炒炮姜四分炙草五分茯苓一錢五分桃仁十粒去皮尖水煎服參苓大補生化湯治産後血塊痛止可服此以補之完穀自化矣人參白朮土炒各二錢川芎當歸益智仁白芍炒茯苓各一錢乾薑四分炮肉果一個麵煨炙草五分蓮子八枚去心水煎服瀉而腹痛加砂仁八分瀉水多加澤瀉木通各八分渴加去心麥冬五味子寒倍炮姜加木香四分食積黃色以神麯麥芽山楂砂仁擇一二味加入參香散治久瀉痢虛者人參木香各二錢肉蔻茯苓扁豆各四錢陳皮粟殼各一錢為末米飲下加味六君子湯凡産後瀉久胃氣虛弱完穀不化宜溫助胃氣也人參茯苓半夏制各一錢白朮二錢土炒陳皮炙草各八分肉果一枚麵煨熟去面木香三四分水煎服一方有炙乾姜四分參麥飲見本卷暈厥門補中益氣湯見上卷諸痛門痢滯論凡雜證之痢皆由暑濕之積邪或挾食積所致傷於氣分則痢白傷於血分則痢赤氣血俱傷赤白兼下至産後患此則有不同治法亦有異蓋多由中氣虛而停積也如産後七日內外患赤白痢疾後重頻並最為難治欲調氣行血而推蕩痢邪猶慮産後之元氣方虛欲滋榮益氣而大補産虛又恐反助痢初之邪盛其行不損元補不助邪惟生化湯去乾薑加以木香茯苓名香苓生化湯為善以其能消惡露兼行痢滯也如痢在七日之外可酌加芍連蓮朴等藥如傷麵食穀食瀉痢先服生化湯加炒神麯塊痛止服六君子加麥芽一撮或炒神麯一錢如傷肉食瀉痢先服生化湯加山楂砂仁塊痛止服六君子湯加山楂四五枚砂仁四分炒神麯一錢如半月外患赤痢後重歸芍連殼飲如脾氣虛弱瀉痢四肢浮腫宜六君子湯加木香肉果麵煨合五皮散如瀉痢黃色乃脾土正氣虛耳宜補中益氣湯加木香四分肉果一枚煨如胃氣虛弱瀉痢完穀不化當溫助胃氣及産後瀉痢日久後重者並宜服加味六君子湯大凡産後赤痢去血多薑砂木香之類不可多用熱則血愈行倘血痢日久不止者血虛也宜四物湯加荊芥人參或用人參五錢香連丸一錢同為末下凡諸證兼嘔吐皆宜加藿香五分痰加製半夏八分兼小便短澀引加燈心三十寸且燈心利水而不傷陰況産後津液已虧兼之瀉痢傷陰復傷津液小便理宜短少故止用燈心足矣不可用利水傷陰之藥也如胎前下痢産後不止伏龍肝湯丸治之又有白頭翁加甘草阿膠湯治産後痢不止馮氏云産後腹痛瀉痢若非外因所傷乃屬腎氣虧損陽虛不能生土陰虛不能閉藏耳必用四神八味補腎倘誤投分利導水之劑是益其虛但瀉痢之證非脾即腎如病在腎所謂補脾不如補腎如病在脾自又補腎不如補脾也圓機活法在臨證定之耳香苓生化湯治産後七日內患赤白痢川芎二錢當歸五錢炙草五分桃仁十粒去皮尖茯苓一錢陳皮四分木香一分水煎服如紅痢腹痛加砂仁三分七日外可加白芍黃連炒蓮肉製厚朴各五分歸芍連殼飲治産後半月外患赤痢後重川芎一錢五分當歸三錢白芍酒炒茯苓各一錢黃連六分薑汁炒枳殼五分麩炒甘草四分木香三分水煎服五皮散治産後風濕傷脾氣血凝滯以致面目虛浮四肢腫脹氣喘陳皮桑皮姜皮茯苓皮大腹皮黑豆水制淨各一錢水煎服香連丸治下痢赤白膿血相雜裡急後重黃連二十兩吳萸十兩同炒去吳萸木香四兩八錢不見火醋糊丸米飲下一方等分蜜丸一方加甘草八兩黃連用蜜水炒蒸曬九次入木香為丸伏龍肝湯丸治胎前下痢産後不止及元氣大虛瘀積小腹結痛不勝攻擊者山楂肉一兩炮黑黑糖二兩熬枯二味一半為丸一半為末用伏龍肝二兩煎湯代水煎前末二錢送前丸二錢日三夜二服一晝夜令盡氣虛加人參二三錢駕馭之虛熱加炮薑肉桂茯苓炙甘草兼感風寒加蔥白香豉膈氣不舒磨沉香數匙調服生化湯見本卷生化湯論後六君子湯補中益氣湯俱見上卷諸痛門加味六君子湯見本卷泄瀉門四物湯見上卷安胎門白頭翁加甘草阿膠湯見上卷痢門四神丸見上卷腹痛門八味丸見上卷諸痛門附六味地黃湯下霍亂論霍亂者反覆不寧而揮霍撩亂之謂也邪干於上則吐邪干於下則瀉邪注中焦不能容受或冷熱不調邪正相搏則上吐下瀉此邪字雖有寒濕及水土氣令或乍寒乍熱外邪之侵然因於飲食停滯或傷過飽食不能化而致者十之六七常人尚多如此而況産後血去氣損脾胃愈虛飲食易傷風冷易乘一旦不及運化或稍失調理則陰陽升降不順清濁亂於腸胃即有心腹絞痛手足逆冷吐瀉交作霍亂之證矣如塊痛未除宜服生化六和湯塊痛已除宜溫中散無塊痛而手足厥冷者宜附子散密齊用加味理中湯治産後霍亂若用於塊痛已除之後亦可生化六和湯治産後塊痛未除氣血虛損傷食感寒而霍亂吐瀉川芎二錢當歸四錢茯苓一錢砂仁六分乾薑陳皮藿香炙草各四分姜一片水煎服溫中散人參隨宜白朮一錢五分土炒當歸二錢厚朴八分薑製乾薑四分茯苓一錢草豆蔻六分姜一片水煎服附子散治産後無塊痛霍亂吐瀉手足厥冷人參白朮土炒各一錢當歸二錢陳皮丁香乾薑各四分附子五分制為末用二錢粥飲調下加味理中湯人參隨宜白朮一錢土炒乾薑陳皮各四分藿香厚朴薑製各八分炙草二分生薑五片水煎溫服氣逆嘔吐不食論人之胃腑為水穀之海而水穀之精化為血氣榮潤臟腑産後勞傷臟腑寒邪易乘入於腸胃則氣逆嘔吐而不食也初産宜加減生化湯七日外宜溫胃丁香散如咳嗽嘔逆怔忡目眩用石蓮散祕書云産後胃氣不和嘔吐不止全不納穀初産香砂生化湯塊痛止加味香砂生化湯又云當分二證立三方如七日內塊痛未除當重塊安胃行血湯佐以溫胃藥如七日內曾服生化湯三四帖血塊不痛嘔不納穀當服加減六和湯又和中湯此二方選用如産後嘔止或服三方而胃和嘔止痛止但血氣不足食少宜補中和胃湯馮氏仿立齊治法云飲食過多六君子加楂曲兼勞役補中湯飲食停滯人參養胃湯脾胃氣虛六君子胃氣虛寒加炮薑煨木香寒水侮土益黃散肝木侮土六君子加升柴嘔吐泄瀉手足俱冷肚腹作痛乃陽氣虛寒急用附子理中湯此內有命門火衰不能生土而嘔吐用八味丸一論恐非救急之務故摘出密齊遵郭稽中治云有敗血散於脾胃脾受則不能運化津液而成腹脹胃受則不能受水穀而生嘔逆若以尋常治脹嘔之劑則藥不對證反增其病用抵聖湯若産後傷食嘔吐脹滿用六君子湯為主加隨證藥治之豫謂馮氏偏於補氣密齊用抵聖一論泥於敗血臨證者似宜斟酌一産婦朝吐痰夜發熱晝夜無寐或用清痰降火肌體日瘦飲食日少前證愈甚蓋早間吐痰脾氣虛也夜間發熱肝血虛也晝夜無寐脾血耗也遂用六君子湯加味逍遙散加味歸脾湯以次調理而痊加減生化湯治産後嘔逆不食川芎一錢當歸四錢炮姜砂仁各四分炙草五分姜一片水煎服溫胃丁香散治産後七日外患嘔逆不食人參一錢當歸白朮土炒各二錢藿香前胡炮姜丁香陳皮炙草各四分姜一片水煎服石蓮散治産後咳嗽嘔逆怔忡目眩石蓮子一兩五錢去殼茯苓一兩丁香五錢共為細末米飲調送每服三錢香砂生化湯治産後塊痛未除氣逆嘔吐當歸四錢川芎一錢製半夏八分桃仁十粒去皮尖炙姜藿香砂仁各四分陳皮三分炙草五分生薑一片水煎服加味香砂生化湯治産後塊痛已除嘔逆不止當歸二錢川芎白朮土炒各一錢制夏八分陳皮三分前胡砂仁藿香炮姜各四分炙草五分生薑一片水煎服安胃行血湯治産後七日內塊痛未除嘔吐不止全不納穀人參川芎各一錢當歸四錢酒洗桃仁十粒去皮尖砂仁藿香炙草各四分生薑一片水煎服一方無桃仁有汗不可用姜加減六和湯治産後七日內曾服生化湯三四帖今血塊不痛但嘔不止不納穀人參川芎茯苓各一錢當歸二錢山藥一錢五分炒藿香陳皮各三分白豆蔻炙草各四分姜一片水煎服嘔止減豆蔻一方有炮姜四分和中湯人參當歸茯苓各一錢白朮一錢五分土炒扁豆二錢丁香藿香陳皮各三分炙草四分姜一片水煎服嘔吐止去丁香受寒加吳萸一二分補中和胃湯治産後嘔吐服前三方而胃和嘔止塊痛止但氣血不足食少者人參白朮土炒當歸扁豆各二錢茯苓一錢山藥一錢五分炮姜陳皮炙草各四分水煎服益黃散治脾胃虛寒水反來侮以致嘔吐不食或肚腹作痛或大便不實手足逆冷等證陳皮一兩青皮訶子肉煨炙草各五錢丁香二錢上為散每服二三錢水煎服或黑糖調服一錢益黃不用補益中州反用青橘二皮闢除陳氣其旨最微此方原為嬰兒久瀉連綿不已乳食積滯於內故需二皮專理肝脾宿蔭即兼訶子以兜澀下脫丁香以溫理中州甘草以和脾氣深得瀉中寓補之法非洞達斯義難與言至治也抵聖湯治産後敗血積於脾胃腹脹嘔逆人參制夏澤蘭陳皮赤芍各二錢炙草一錢火焙生薑三片水煎服惡露過多者去澤蘭赤芍倍加陳皮生薑豫謂陳皮用二錢過當用一錢足矣六君子湯補中益氣湯人參養胃湯俱見上卷諸痛門附子理中湯見上卷瘧門附枳實理中湯下厄逆論即吃忒又名咳逆凡病厄逆者乃逆氣使然蓋此氣從胃中出上衝賁門吃忒而作聲也有胃氣虛寒者有中氣大虛衝任之火直犯清道而上者有飲水過多水停而逆者有大小便閉下焦不通其氣上逆者有胃絶者至於産後厄逆乃胃虛氣寒證也有云厄噫者胃氣所生宜加味理中湯主之醫通云産後氣血俱虛風冷搏氣而逆上乃胃氣虛寒之極最為惡候理中加丁香古方以丁香豆蔻伏龍肝為末用桃仁吳萸煎湯調下一錢匙如人行五里再服未應急投參附遲則不救尊生治吃忒云以可異事或費思索事出其不意扣之令其思維立止又立羌附湯以治之馮氏云如中氣大虛下焦陰火上衝而致厄逆者當用桂附乾薑之類加味理中湯人參白朮土炒各一錢乾柿蒂二錢丁香炮姜各五分陳皮炙草各八分水煎服有熱去丁香加竹茹二錢如虛羸太甚飲食減少厄逆者胃絶也難治羌附湯羌活製附子小茴香各五分木香生薑各二分五釐食鹽一捻水煎熱服立愈理中湯見上卷痢門腹脹滿悶論産後有因敗血入於脾胃腹脹嘔吐者已於嘔吐門中論之矣然婦人因産脾胃多虛飲食最易停滯而生脹悶若産畢隨服生化湯消其舊瘀而生其新血瘀塊既消便大補氣血使脾胃健運自無中虛脹滿之證其産後大率因傷食而誤用消導因氣鬱而誤專順散或因多食冷物而停滯惡露或因血虛大便燥結誤下而愈脹此蓋止知傷食當消氣鬱當順惡露當攻便結當下不知消耗愈多胃氣大損滿悶益增氣不升降積鬱之久兼成膨脹若再專用攻消不死不休矣豈知消導佐於補劑內則脾強而所傷之食消氣散逐瘀佐於養血劑中則惡露自行而大便濡潤亦通再考之綱目內云飲食停於脾六君子湯加厚朴一錢若飲食傷於胃宜六君子湯以補之又云大凡停於脾莫妙節其飲食自愈為善尊生亦用加減六君子湯治之祕書立有治脹方並養生化滯湯二方治産後脹證均未敢專於消導前人之慮産深矣醫通云胎前孕婦服安胎藥過多或正産半産後經一兩月惡露未淨此非敗血之比宜導氣行血若用止截誤矣又云飽悶惡露不行多因血逆宜行瘀為主如有塊上升飽悶欲吐者二陳湯加薑桂香附炮楂蓬朮塊不散積久愈堅琥珀黑龍丹豫謂審知飽悶實因惡露不行所致若初産仍宜服生化湯瘀去而飽悶自開可無藉乎二陳炮楂蓬朮恐産虛者難當耳治脹方治産後腹脹人參二錢白朮土炒當歸各三錢茯苓一錢五分川芎七分陳皮四分甘草三分水煎服養生化滯湯治産後大便不通誤服大黃等藥致成鼓脹人參茯苓川芎白芍炒各一錢當歸四錢桃仁十粒去皮尖肉蓯蓉一錢五分酒洗去泥甲大腹皮五分黑豆水制淨陳皮四分制香附炙草各三分水煎服如脹甚再加人參二三錢常治誤用大黃多者服參歸至半斤以上大便方通腫脹漸退加減六君子湯治産後腹脹人參白朮土炒茯苓各一錢陳皮六分厚朴八分制砂仁炮姜各四分炙草五分水煎服生化湯見本卷生化湯論後六君子湯見上卷諸痛門二陳湯見上卷子煩門琥珀黑龍丹見中卷催生門浮腫論産後手足俱浮皮膚間光瑩色潤乃脾虛不能制水腎虛不能行水也宜大補為主補中利水湯治之如因寒邪濕氣傷表無汗而腫前湯加姜皮半夏蘇葉或五皮散亦可又有由敗血乘虛停積而循經流入四肢留淫日深腐壞如水故令面目四肢浮腫乍寒乍熱醫人不識誤作水氣治之多用導水凡治水藥極能虛人産後既虛藥又虛之是謂重虛多致夭枉如産畢隨服生化湯化瘀生新自無此敗血如水之證今既失治宜服小調經散則血行腫消密齊用調經湯又加味五皮湯使氣血流行風濕消散腫自消矣若水氣系肺失降下之令其人必發咳嗽小便澀少可立而辨也如腳腫或肚腫或成鼓腫宜濟生腎氣丸馮氏云産後浮腫若寒水侮土宜養脾肺若氣虛浮腫宜益脾胃若水氣浮腫宜補中湯若兼喘咳而脈沉細無力此命門火衰脾土虛寒也八味丸主之腹滿者虛氣而非血也補中湯送八味丸一以升補清陽一以斂納濁氣升降既得而脹滿自消矣補中利水湯治産後七日外消腫利水人參白朮土炒各二錢茯苓白芍炒各一錢木瓜八分陳皮五分紫蘇木通製蒼朮大腹皮黑豆水制淨厚朴薑汁製各四分水煎服如壅滿用製半夏陳皮制香附監之虛加人參熱加去心麥冬炒黃芩以清肺金大便不通加郁李仁麻仁各一錢小調經散治産後浮腫因敗血者歸身酒洗赤芍桂心各一錢沒藥琥珀各一分麝香細辛各五釐炙草二分為末每服五分薑汁酒調下調經湯歸身酒洗赤芍丹皮桂心赤茯苓陳皮炙草各一錢細辛炮姜各五分姜一片水煎服加味五皮湯治産後虛弱腠理不密調理失宜外受風濕面目浮腫四肢腫者桑白皮陳皮茯苓皮大腹皮黑豆水制淨生薑皮各一錢漢防己枳殼麩炒豬苓各八分炙草五分生薑引水煎服此方重在外受風濕四字故用此滲利之劑五皮散見本卷痢滯門生化湯見本卷生化湯論後濟生腎氣丸見上卷諸痛門附六味地黃湯下補中益氣湯見上卷諸痛門八味地黃丸見上卷諸痛門附六味地黃湯下咳嗽論産後七日內外感風寒咳嗽鼻塞聲重惡寒者只服生化湯自愈內有芎姜散其邪也或於生化湯中加杏仁桔梗有痰加天花粉又有加味生化湯並皆治之總不用麻黃動汗即嗽而脅痛亦不用柴胡伐肝因其內虛耳醫通用桔梗湯加蔥白香豉生薑或用小建中湯且又能治風木乘脾而嗽至於産後久嗽宜加味甘桔湯主之尊生用桑貝芎歸清肺湯治産後咳嗽甚效馮氏並綱目書云産後咳嗽悉屬胃氣不足胃為五臟之本胃氣一虛五臟失所百病生焉雖謂肺主皮毛腠理不密所致不知肺屬辛金生於己土亦因土虛不能生金所以腠理不密外邪易感其陰火上炎者宜壯土以生金滋水以制火若不補虛見證治標則誤矣按壯土生金異功散也滋水制火地黃丸也故醫通治産後虛嗽有用異功散去朮加山藥細辛桂枝之方陰虛感客邪六味丸去萸加桂枝細辛陰虛水不制火而嗽六味丸加麥冬五味等方也然又有干嗽內熱桔梗湯加葳蕤麥冬丹皮蜜煎薑橘之類蓋干嗽一證有小兒食乳易治無則成勞産後食鹽醯太早者難治須待再産月內切記遲用更宜少用方可望愈密齊云産後多因惡露上攻流入肺經乃成咳嗽其證胸膈脹悶宜服二母湯按二母性涼豈能治惡露上攻人參補氣又何能療惡露流入肺經之嗽雖立齊將桃仁杏仁加倍以瀉肺導瘀然豫終不敢妄於用也若果瘀入肺經即沖肺證矣當不止於發嗽胸脹已耳加味生化湯治産後感風寒咳嗽鼻塞聲重當歸二錢五分川芎一錢杏仁十粒去皮尖炮姜桔梗炙草各四分知母八分酒炒姜一片水煎服有痰加天花粉虛弱有汗嗽加人參一錢豫謂此方有知母花粉並用須産久無塊痛方可用之桔梗湯即甘桔湯治風熱肺氣不清嗽桔梗甘草各三錢水煎服加味甘桔湯治産後嗽久不止涕唾稠黏甘草桔梗款冬花貝母去心前胡枳殼麩炒白茯苓五味子碎麥冬去心各等分淡竹葉十五片水煎服桑貝芎歸清肺湯治産後咳嗽前胡紫菀貝母去心桑白皮茯苓當歸川芎乾葛紫蘇各一錢水煎服異功散治肺胃氣虛稀痰喘嗽人參白朮土炒茯苓各一錢陳皮去白炙草各六分為散每服三四錢生薑煎湯調服二母湯治産後惡露上攻流入肺經咳嗽不已人參貝母去心茯苓知母各一錢桃仁去皮尖杏仁去皮尖各二錢水煎食後服生化湯見本卷生化湯論後小建中湯見本卷脫汗亡陽門附黃耆建中湯下六味地黃丸見上卷諸痛門附六味地黃湯下淋證論産後淋證此亦血去陰虛生內熱也蓋腎為至陰主行水道去血過多真陰虧損故生內熱小便成淋而澀痛是以熱客於脬虛則頻數熱則澀痛也氣血兼熱血入胞中則血隨小便而為血淋但小便淋閟卻與不通當分別而治不通者屬氣虛淋屬內熱澀痛故密齊治淋用知柏導赤散調益元散治之馮氏云血虛熱鬱當用六味丸逍遙散補陰養血滋其化源佐以導血藥可也醫通云膀胱陰虛而小便淋瀝生料六味合生脈散大劑煎成隔湯燉熱續續進之以滋化源或補中益氣湯兼服六味地黃丸更有收生不謹以致損胞而得淋瀝者應用峻補宜參朮湯或用參朮膏煎以豬羊胞湯極飢時飲之令氣血驟長不過月餘其胞可完丹溪曾治一婦診其脈虛甚用參耆為君芎歸為臣桃仁陳皮茯苓為佐煎以豬羊胞湯服之一月而愈又有茅根湯並加味茅根湯濟陰加味四物湯俱治淋方也附録以備擇用知柏導赤散生地赤芍木通麥冬去心黃柏知母炒桂心甘草生各一錢燈心四十九寸水煎調益元散二錢服益元散一名天水散一名六一散治暑月小水不利滑石六兩水飛甘草炙六錢生四錢為散清水調服老人虛人及病後傷津小便不利禁用加水飛辰砂一錢名辰砂六一散治暑月驚悸多汗小便澀痛參朮湯治婦人生産穩婆誤用手指掐胞損破以致小便不禁人參二錢五分白朮二錢土炒黃耆一錢五分蜜炙陳皮去白桃仁去皮尖茯苓各一錢炙草五分先用豬胞或羊胞一個洗淨水二盞煮至一盞去胞入藥煎七分食前服多劑乃佳茅根湯治赤白砂石諸淋茅根一兩滑石一錢煅甘草五分紫貝一個煅石首魚腦砂一個焙乾研為末一方用二個煅闕字姜一塊燈心三十寸煎入魚頭末空心溫服加減茅根湯治産後淋小便痛及血淋等證白茅根一兩瞿麥車前冬葵子通草各一錢鯉魚齒一百個為末水煎入魚齒末空心溫服濟陰加味四物湯諸淋皆屬於熱用此纍效當歸川芎赤芍生地杜牛膝木通甘草梢各一錢桃仁五個去皮尖滑石一錢五分木香二分水煎服六味地黃丸見上卷諸痛門附六味地黃湯下補中益氣湯見上卷諸痛門逍遙散見上卷胎逆上逼門生脈散見本卷暈厥門參朮膏見本卷類瘧及寒熱往來門小便數及遺尿不禁論凡人下焦如瀆所以主瀦泄也産後氣血虛脫溝瀆決裂瀦蓄不固水泉不止故數而遺而不禁耳治法下者舉之脫者澀之宜用升陽調元湯合桑螵蛸散主之醫通云産後小便數乃氣虛不能制水補中益氣加車前茯苓遺尿不知補中益氣湯然有腎氣不固者宜六味丸加益智若因膀胱氣虛小便頻數當補脾肺補中益氣加山萸山藥為主佐以人參螵蛸散如系虛寒以致數遺益心湯最妙馮氏云小便不禁若脾腎虛弱補中湯送還少丹若脾腎虛寒用八味丸四神丸佐之然世有新産之婦廷孔未斂故溺出不知此恆有之至六七朝自止不必治也又有臨産損破尿胞遺尿者已於前淋證門中論治矣升陽調元湯治産後小便數及遺尿不禁人參益智仁黃耆蜜炙各一錢五分升麻炙草各一錢薑棗煎調桑螵蛸散服原方藥通用一錢五分豫謂升麻炙草宜減故各録用一錢桑螵蛸散真桑螵蛸炒白龍骨煅牡蠣各等分取左顧者煅為細末每服調服三錢人參螵蛸散治産後陽氣虛弱小便頻數及遺尿桑螵蛸二三十個炒人參二兩黃耆三兩蜜炙鹿茸酥炙牡蠣煅赤石脂煅厚朴薑汁製各二兩上為末每服二錢空心粥飲調下外臺方無厚朴石脂有甘草生薑益心湯治産後小便數及遺尿益智仁二十七粒為細末每服二錢米飲調服還少丹治脾腎虛寒血氣羸乏不思飲食發熱盜汗等證熟地二兩山藥牛膝酒浸各一兩五錢山萸肉茯苓乳拌杜仲薑汁炒斷絲遠志制去心取淨肉五味子炒楮實子酒蒸小茴香炒巴戟天酒浸去骨肉蓯蓉酒浸洗去泥甲各一兩石菖蒲五錢棗肉加蜜為丸每服三四錢白湯淡鹽湯俱可送下補中益氣湯見上卷諸痛門六味丸八味丸俱見上卷諸痛門附六味地黃湯下四神丸見本卷腹痛門蓐勞骨蒸論産後去血勞傷再加之調養失宜所生者少脾肺氣弱不能運其精微致令骨蒸勞熱若富貴之家雖有美食及藥力以調養必有他事不如意而怒動肝火耗傷其方生之血亦能致飲食減少虛羸體倦況新産之婦原屬血虛所生之血無幾一經傷耗則陰血更虛焉得不成內熱骨蒸也即藜藿之人不特無美食藥力滋生氣血更兼自乳其子則方生之血豈能驟足倘本質瘦弱又焉得而不陰虛內熱以成骨蒸也即或本體壯盛常見生育數胎自為乳哺則面顏多有老過年歲者即此而驗概可知矣是以産後易成蓐勞之證故治産後虛弱用參歸湯作寒熱白茯苓散虛證雜見成蓐勞者鱉甲湯無疾覺虛十全大補湯又當歸羊肉湯有治産後骨蒸先服清骨散後服保真湯又有加味大造丸亦能治骨蒸勞熱醫通云産後蓐勞因産不順疲極筋力憂心勞慮或産後將養失宜致令虛羸喘乏寒熱如瘧百節煩痛頭疼自汗肢體倦怠咳嗽痰逆腹中絞刺當扶正為主六君子加當歸若脾肺氣虛咳嗽口乾異功散加麥冬五味氣虛頭暈補中益氣倍用歸耆肝經血虛肢體作痛四物加參苓朮桂肝腎虛弱自汗盜汗往來寒熱六味丸加五味子脾虛血弱腹痛月經不調歸脾湯倍木香血虛有熱增損柴胡湯骨蒸勞熱咳嗽有紅者異功散去朮加山藥丹皮五味阿膠童便熱而無痰乾咳逍遙散用蜜煎薑橘蜜蒸白朮産後虛損不時寒熱或經一二載元神不復月事不轉先與千金當歸芍藥湯後與烏骨雞丸調補大抵此證多因脾胃虛弱飲食減少以致疲憊而成當補脾胃進飲食則諸臟有所倚賴病自愈矣參歸湯治産後虛弱人參當歸酒浸各二錢豬腎一個糯米蔥白水煎服白茯苓散治産後蓐勞頭目肢體疼痛寒熱如瘧人參當歸熟地川芎白芍炒黃耆蜜炙桂心各五分茯苓一錢豬腎一個薑棗引水煎服鱉甲湯治産後虛證雜見成蓐勞黃耆蜜炙鱉甲炙各一錢牛膝七分酒蒸人參茯苓當歸白芍炒桑寄生麥冬去心熟地桃仁去皮尖桂心炙草各五分續斷三錢酒製取淨肉豬腎煮汁作水加薑棗引煎服當歸羊肉湯治産後無疾覺虛當歸五兩黃耆四兩蜜炙生薑六兩肥羊肉一斤煮取汁煎藥分四服清骨散治骨蒸勞熱男女皆可用柴胡前胡胡黃連烏梅各八分豬骨髓一段韭白十根水煎成入豬膽汁少許服一方將藥為末豬髓一錢豬膽汁一個韭白同搗為丸緑豆大每服三四十丸開水食後送下保真湯人參茯苓白朮土炒如咳嗽用蜜蒸麥冬去心白芍炒枸杞生地熟地知母炒各一錢黃耆蜜炙川芎地骨皮各八分當歸天冬去心各二錢五味子十粒黃柏六分炒炙草四分棗二枚水煎服亦可作丸服一方天冬只用一錢無麥冬加味大造丸治骨蒸勞熱如服保真湯不須服此人參當歸酒浸山藥黃柏炒枸杞子各一兩麥冬去心石斛各八錢生地二兩柴胡六錢胡黃連五錢紫河車一具水洗淨白酒蒸另將麥冬地黃先搗如泥紫河車蒸熟亦另搗後入諸藥於河車麥冬地黃內同搗為丸如焙乾河車為末則煉蜜為丸亦可增損柴胡湯治少陽血虛寒熱不止人參川芎芍藥炙草各一錢柴胡製半夏各二錢陳皮八分姜五片大棗四枚水煎服千金當歸芍藥湯治産後煩滿不安人參芍藥炒麥冬去心乾地黃各一錢當歸一錢五分桂心四分粳米一撮生薑三片去核大棗三枚水煎服烏骨雞丸治婦人鬱結不舒蒸熱咳嗽月事不調或久閉不行或倒經血溢於上或産後蓐勞或崩淋不止及帶下赤白白淫諸證兼療男子斫喪太早勞嗽吐紅或虛損者烏骨雞一隻取白絲毛者方可用男用雌女用雄揀嫩長者溺倒泡去毛竹刀剖脅出肫肝去穢留內金並去腸垢仍入腹內熟地四兩如血熱加生地黃二兩北五味一兩碎上二味入雞腹內用陳酒或酒釀童便各二碗水數碗於砂鍋內旋煮旋添糜爛汁盡綿黃耆三兩去皮蜜酒拌炙於朮三兩飯上蒸九次白茯苓去皮淨歸身酒洗白芍酒炒各二兩上五味預為粗末同雞肉搗爛焙乾骨用酥炙共為細末入下項藥人參三兩虛甚加至六兩川芎一兩童便浸切曬牡丹皮二兩酒浸勿炒上三味各為細末和前藥中另用乾山藥末六兩打糊衆手丸或曬乾勿令餿瓷罐收貯清晨人參湯或沸湯送下三錢臥時醇酒再服二錢大便實者煉白蜜為丸亦可骨蒸加炙九肋鱉甲三兩銀柴胡地骨皮各一兩五錢經閉加肉桂一兩崩漏下血倍熟地加真阿膠二兩倒經血溢加去心麥冬二兩鬱結痞悶加童便制香附二兩沉香五錢赤白帶下加真川萆薢二兩四制香附二兩蘄艾一兩白淫倍用參耆苓術按烏骨雞丸諸藥皆尋常而無奇處治調經最驗蓋雞屬巽補肝猶妙在烏骨益腎變巽歸坎甲癸同源兼滋衝任也十全大補湯見上卷胎不長養門異功散見本卷咳嗽門六君子湯補中益氣湯俱見上卷諸痛門六味地黃丸見上卷諸痛門附六味地黃湯下四物湯見上卷安胎門歸脾湯見上卷胞漏小産門逍遙散見上卷胎逆上逼門吐衄及口鼻黑氣起而衄並舌黑論産後吐血諸書皆稱難治以其上下脫也醫通云産後鼻衄乃氣血逆行所致用紫蘇飲入童便荊芥灰治之良方以荊芥焙為末童便服二錢與醫通意同又尊生治産後鼻血不止用犀角生地赤芍合二味參蘇飲如口鼻黑氣起而衄者難治蓋五臟之華皆上注於面凡色紅赤者陽熱之生氣也青黑者陰寒之絶氣也況口鼻為陽明多血多氣之經而見陰寒慘殺之氣則胃中陽和之氣衰敗可知矣復至鼻衄則陽亡陰走也胃絶肺敗陰陽兩亡故不可治但有禳厭一法或可望生急取緋線一條併産婦頂心發兩條緊繫中指節上即止無藥可治立齊云急用三味參蘇飲治之亦有得生者如前證再兼舌紫黑者為血先死不治蓋心主血少陰氣絶則血不上蔭耳汪石山治一婦産後血逆上行鼻衄口乾心躁舌黑因瘀血上升遂用益母丸二丸童便化下鼻衄漸止血漸通此條當與三衝門參看三味參蘇飲治産後瘀血入肺咳嗽喘急若口鼻黑氣起急用此藥亦有可望得生者人參一兩蘇木二兩製附子五錢上作一劑水煎服紫蘇飲見上卷安胎門二味參蘇飲見本卷三衝門大小便血論産後尿血小腹痛者乃敗血流入膀胱小腹不痛但溺時澀痛者乃內熱也並用小薊湯主之尊生用加味腎氣去桂附加生地發灰治之至於大便便血或因飲食起居失宜或因六淫七情過極致元氣虧損陰絡受傷也四君子加生地升麻歸身白芍發灰治之小薊湯小薊根生地赤芍木通蒲黃淡竹葉甘草梢生各一錢滑石二錢燈心四十九寸水煎服敗血加歸尾紅花各一錢兼內熱加黃芩去心麥冬各一錢加味腎氣湯見上卷諸痛門附六味湯下照丸方減分兩作湯劑煎服四君子湯見上卷胎逆上逼門月水不通論産後月水不通者不必藥也婦人衝任之脈為經絡之海皆起胞內手太陽手少陰二經上為乳汁下為月水若産後去血過多常有月水不通若乳子者半歲一歲之內月經不行此猶常候若半歲左右便行是必少壯血盛之人若産後一二年月經不通無他疾苦亦不必服通經之藥蓋因勞傷營衛衝任脈虛氣血衰少耳但服健脾胃及滋補氣血之藥自然通行若強通之是猶揠苗者也癰疽論新産半月左右忽發癰腫於四肢胸腹者是敗血不盡流滯經絡或氣血虛弱營氣不從逆於肉理也如敗血瘀滯者則焮腫赤痛而脈弦洪有力當補血行血之中佐以導瘀疏氣為主如氣血虛弱營澀衛逆者則平塌散漫而脈虛微無力當大補氣血為主如十全八珍之屬以固本元扶胃氣氣壯血和其毒自解若以毒治而用清涼解毒勢必不膿不潰變成壞證矣乳少無乳並乳汁自出論産婦衝任血旺脾胃氣壯則乳足而濃乃生化之源旺也如無他證但少乳是氣血滯用行氣下乳湯若脾胃氣弱飲食少進衝任素虧其人面必黃色則乳少而薄所乳之子亦怯弱而多病務服滋養氣血兼通利之劑宜十全大補湯加紅花五分或四物湯加茯苓花粉甘草王不留行麥冬漏蘆穿山甲通草豬蹄汁煎服如既服通利之藥亦無大效仍然乳少系此婦氣血虧甚津液短少何以為乳須另覓乳母可耳至於選乳母之法擇其人肥瘦適中無病經調善食者佳太肥則多痰太瘦則多火兒飲其乳亦復如是且人乳原無定性隨飲食性氣而變故飲食之調攝乳母又不可不慎也但凡乳汁須要驗其濃白光彩入盞中上面瑩然如玉為上白色清薄為下不可使之哺兒也至於産後乳汁不行身體壯熱頭目昏痛或乳下發熱身痛玉露散主之世有産婦氣血旺而壅滯不行者法當疏而通之生化湯加木香青皮白芷花粉穿山甲煎服又有用麥冬栝蔞仁天花粉人參葵子豬胰木通漏蘆豬蹄之類煮食而乳行矣再考全書內治肥盛婦人痰氣壅結乳汁不行用漏蘆湯利之至於血氣虛而燥澀阻滯不行者宜十全八珍之類補其虛而自行全書內有豬蹄湯二方治氣血不足乳汁不行如脾虛飲食少無乳宜香砂四君子湯若乳將至而未得通暢者宜豬蹄羹湧泉散若夫乳汁自出者乃陽明胃氣不固亦宜八珍或十全補之若陽明血熱而溢者宜保陰煎或四君子加梔子若肝經怒火上衝乳脹而溢者宜加減一陰煎若乳多脹滿而溢者不必服藥宜溫帛尉而散之若未産而乳自出謂之乳泣生子多不育若産婦勞役乳汁湧下此陽氣虛而厥也獨參湯主之行氣下乳湯治産婦氣血滯無他證但少乳生地當歸川芎各一錢白朮土炒茯苓各六分制香附陳皮紅花各五分穿山甲三片炒木香二分水酒各半煎服玉露散治乳汁不行身體壯熱頭目暈痛屬虛者人參茯苓當歸白芍炒桔梗各一錢川芎柴胡炙草各六分水煎服準繩及全書俱無柴胡有白芷一錢參苓歸草各五分炒白芍七分桔梗川芎各一錢漏蘆湯治産婦肥盛脈氣壅結乳少漏蘆一兩蛇蛻一條土瓜根共為末酒調下二錢此方峻厲不宜用録之以備參考耳豬蹄湯治産婦氣血不足乳汁不下用八珍湯料加炙黃耆漏蘆陳皮木通先用豬蹄一副煮汁二碗煎藥服之或加天花粉又方川芎一兩通草二兩甘草一錢穿山甲十四片炒用豬蹄一副洗切入水六碗同藥煎至三碗加蔥姜鹽料取汁飲之助其氣血乳汁自下夏月不可失蓋時用蔥湯洗乳為佳忌生冷食物香砂四君子湯治産婦脾虛食少無乳人參白朮土炒茯苓麥冬去心各八分當歸一錢陳皮制香附砂仁紅花炙草各四分水煎服通草豬蹄羹豬蹄一隻通草四兩水煮去一半飲湯兼服湧泉散即通湧泉散王不留行瞿麥麥冬龍骨煅穿山甲炒各等分上為末每服一錢熱酒調下飲豬蹄羹少許以油木梳在兩乳上梳二三十梳日二服俱如前梳法即通一方無穿山甲用豬蹄汁一碗酒一杯煎服以木梳於乳上照前法梳之加減一陰煎治水虧火勝生地白芍炒麥冬去心各二錢熟地三五錢知母炒地骨皮各一錢炙草五七分水煎服獨參湯治産後乳汁湧下人參隨證多少用之水煎濃湯作茶飲十全大補湯見上卷胎不長養門四物湯見上卷安胎門生化湯見本卷生化湯論後八珍湯見上卷諸痛門保陰煎見上卷惡露不止門四君子湯見上卷胎逆上逼門妒乳吹乳乳癰論産後妒乳因無子食乳蓄結作脹或婦人血氣方盛乳房作脹以致腫痛憎寒發熱若不以手捏去乳汁及令人吮通之必致成癰四物湯調炒麥芽二兩煎服立消豫謂麥芽過多傷胃若用三錢亦足矣又婦人乳頭生小淺熱瘡搔之黃汁出亦為妒乳以槲樹皮煎洗或天麻草煎洗至於吹乳之證有內吹外吹上逆下順之異總屬膽胃二經熱毒氣血凝滯內吹者胎熱也外吹者因兒食乳為口氣所吹也俱令乳汁不通壅結腫痛不急治之多成癰腫速服栝蔞散外以南星末溫湯調敷更以手揉散之勢甚者惟連翹金貝煎最妙正宗用橘葉散治內外吹乳醫通云吹乳初起作寒熱即服加味逍遙散加栝蔞霜散之尊生治慣吹乳用清肝解鬱湯又立治吹乳三方分別初起身熱結腫施治至於乳癰一證即吹乳不散久積成癰又云輕為妒乳重為乳癰亦膽胃二腑熱毒氣血壅滯而成勢甚有餘者宜先以連翹金貝煎治之甚妙如初起腫痛肉色焮赤或發寒熱或憎寒頭痛煩渴引飲尚未成癰時於人參敗毒散加味逍遙散神效栝蔞散選擇治之腫自消散若至數日膿成潰竅稠膿湧出膿儘自愈豫治吹乳結乳乳癰等證立消毒飲二方外用槐艾洗法通治乳證效過多人又栝蔞貝母飲亦效並附於各方之後若産婦氣血虛弱患此等證而誤用敗毒久不收斂膿清脈大則難治醫通云膿清脈大非大劑開鬱理氣溫補氣血不能收功也栝蔞散治吹乳腫痛栝蔞一個打碎乳香二錢用酒煎服外用南星末溫湯調塗連翹金貝煎治陽分癰毒或在臟腑肺膈胸乳之間者此方最佳甚者連用數服無有不愈金銀花土貝母去心蒲公英夏枯草各三錢紅藤七八錢連翹一兩或五七錢去心用好酒二碗煎一碗服服後暖臥片時不能飲者酒水各半煎之火盛煩渴乳腫者加天花粉若陽毒內熱或在頭項之間者水煎亦可橘葉散治婦人有孕胎熱為內吹有兒食乳為外吹致乳結成腫痛寒熱交作甚者嘔惡並治之柴胡陳皮川芎山梔炒青皮石膏煅黃芩炒連翹去心甘草各一錢橘葉二十片水二鍾煎八分食遠服渣再煎服清肝解鬱湯治慣吹乳熟地茯苓白芍炒貝母去心梔子炒當歸各一錢柴胡丹皮川芎陳皮各六分甘草五分水煎服虛加人參白朮尊生治吹乳初起一當歸貝母去心白芷梢各一錢花粉八分制香附栝蔞仁甘草節各六分青皮乳香沒藥各五分穿山甲一錢炒川芎四分水酒煎二服尊生治吹乳身熱二羌活獨活前胡柴胡枳殼炒桔梗貝母去心白芷青皮當歸穿山甲炒各等分水煎服尊生治吹乳已結腫三陳皮牛蒡子山梔炒忍冬甘草栝蔞黃芩花粉連翹去心皂角刺各一錢柴胡青皮各五分煎服內熱加石膏豫謂皂角刺不宜用一錢用四五分足矣人參敗毒散又名敗毒散治四時傷寒瘟疫憎寒壯熱風濕風眩項強身體疼痛嶺南煙障之地疫癘時行或脾濕腳氣痿弱等證人參茯苓枳殼炒川芎羌活獨活前胡柴胡桔梗甘草各等分水一鍾半姜三片煎服或為細末沸湯點服神效栝蔞散治乳癰及一切癰疽初起腫痛即消膿成即潰膿出即愈治癰之方甚多獨此方神效瘰癧瘡毒猶效凡一切癰疽餘毒皆宜用之栝蔞一個研爛當歸酒洗生粉草各五錢乳香沒藥各一錢尊生乳沒各二錢五分上用酒煎服良久再服如不能飲以酒水各半煎之如數劑不效宜以補氣血之藥兼服之若肝經血虛結核不消佐以四物柴胡升麻白朮茯苓若肝脾氣血虛弱佐以四君芎歸柴胡升麻若憂鬱傷脾氣血虧損佐以歸脾湯消毒飲專治乳房或乳頂黑暈之內腫毒未破發熱惡寒瘡處或痛或不痛或麻木服之即消蒲公英紫花地丁各一錢二分當歸酒洗白芍醋炒赤芍丹皮地骨皮天花粉各一錢陳皮八分生草三分燈心五十寸水三鍾煎一鍾食後服仍以槐艾水不時洗之定痛消毒飲治乳頂旁或乳房吹乳成癰並乳結之證發熱惡寒冷汗自出勢欲破而疼痛難忍服之即出膿痛定蒲公英紫花地丁各一錢二分當歸乳房用身乳頂用尾白芍醋炒赤芍花粉浙貝母去心研各一錢皂角刺七分或五分柴胡梢八分或一錢乳頂腫結用之若乳房易白芷牡丹皮廣皮各八分明乳香沒藥各五分生草三分紅棗二枚去核燈心五十寸水三鍾煎八分臨服加無灰酒小半酒杯入藥滾數滾服之不時用槐艾水洗槐艾洗法治産婦乳上結核乳癰槐條艾葉不拘多少連須蔥一條將槐艾用水同煎煮入醋少許頻頻洗之若乳頂旁生瘡膿出洗淨與兒吮之隨以松蘿茶葉末滲上栝蔞貝母飲治乳房結核焮腫栝蔞實土貝母去心甘草節各三錢煎服效已潰加忍冬一兩佳四物湯見上卷安胎門加味逍遙散見上卷胎逆上逼門附逍遙散下乳岩論婦人乳岩一證原非産後之病但乳岩乳癰皆瘡生乳房治此證者混同施治誤世不小不得不分別論明也其乳癰起於吹乳之一時非同乳岩由氣血虧損於數載始因婦女或不得意於翁姑夫壻或諸事憂慮郁遏致肝脾二臟久鬱而成初起小核結於乳內肉色如故如圍棋子大不痛不癢十數年後方成瘡患爛見肺腑不可治矣故初起之時其人內熱夜熱五心煩熱肢體倦瘦月經不調宜早為治療益氣養榮湯加味逍遙散多服漸散氣虛必大劑人參專心久服其核漸消若服攻堅解毒傷其正氣必致潰敗多有數年不潰者最危潰則不治周季芝云乳癖乳岩結硬未潰以活鯽魚同生山藥搗爛入麝香少許塗塊上覺癢極勿搔動隔衣輕輕揉之七日一塗旋塗漸消若荏苒歲月以致潰腐漸大類岩色赤出水深洞臭穢用歸脾湯等藥可延歲月若誤用攻伐危殆迫矣曾見一婦乳房結核如杯數年諸治不效因血崩後日服人參兩許月餘參盡二斤乳核霍然此證有月經者尚輕如五六十歲無經者不可輕易看也益氣養榮湯治瘰癧結核流注一切鬱熱毒氣人參白朮土炒茯苓各一錢當歸二錢川芎白芍酒炒各八分熟地二三錢黃耆蜜炙一錢五分桔梗一錢或八分貝母去心一錢二分香附七八分橘皮炙草各五分生薑引水煎服加味逍遙散見上卷胎逆上逼門附逍遙散下歸脾湯見上卷胎漏小産門乳懸論附方産後瘀血上攻忽兩乳伸長細小如腸直過小腹痛不可忍名曰乳懸乃危證也速用川芎當歸各一斤水煎濃湯不時溫服再用二斤逐旋燒煙安在病人面前桌子下令病人屈身低頭將口鼻及病乳常吸烟氣如未甚縮再用一料則瘀血消而乳頭自復矣若更不復舊用萆麻子搗爛貼頂上片時收即洗去前陰諸證論産門不閉如無腫痛或腫既消而不閉者此氣血虛不能收攝以十全大補湯服數帖再用補中益氣湯加五味子治之或以補中益氣湯加製半夏茯苓以健脾使元氣復而諸疾自愈或以硫黃湯外洗又斂宮方治子宮不斂甚效産後陰戶脫下乃元氣不足及陰挺突出腫痛清水淋漓者用八珍湯加炙黃耆防風升麻各五分即收或用補中益氣加醋炒白芍一錢五味子十粒或易酒炒白芍一錢肉桂五分補而舉之亦可兼以硫黃散外治之又有尉陰洗陰法録後備用産門腫痛因臟中風冷者當歸湯洗之産後陰挺陰菌諸蟲痛癢蓋因婦人七情鬱火傷損肝脾濕熱下注故有陰中舒出如蛇俗呼陰挺有翻突如餅俗呼陰菌亦有如雞冠如鼠乳亦有生諸蟲腫痛濕癢潰爛出水脹悶脫墜者其內證口乾內熱體熱飲食無味晡熱發熱胸膈不利小腹痞脹赤白帶下小水淋瀝其治法如氣虛十全大補加五味子倍參桂補而斂之初産腫脹痛而熱者宜加味逍遙散或逍遙散加荊芥牡丹皮如産久則於雜證同治法用四物湯加柴胡山梔丹皮膽草濕癢者歸脾湯加山梔柴胡丹皮淋瀝者龍膽瀉肝湯加白朮丹皮潰腐者加味逍遙散腫悶脫墜者補中益氣加山梔丹皮以上諸證均可佐以外治之法如硫黃湯尉陰洗陰諸方選而用之産後子腸不收宜用收腸方收之神應丹收腸甚捷産後陰戶中生小瘡形如痱子名曰慝瘡或痛癢如蟲行狀膿汁淋瀝用療蝕方椒湯肉汁金銀散殺蟲硫黃散等方選用硫黃湯治産後玉門開而不閉及陰戶突出硫黃三錢吳茱萸菟絲子各二錢蛇床子一錢五分上研勻水一腕煎湯頻洗自收斂宮方治子宮不斂荊芥藿香椿根白皮煎湯熏洗神效硫黃散治産後陽氣虛寒玉門不閉硫黃烏賊骨各五錢五味子一錢上為末摻患處日三易尉陰洗陰法治陰腫陰痛陰脫用蛇床子不拘多少炒極熱以絹袋盛或布裹尉患處又法用蛇床子五兩烏梅十四個煎水日洗五六次當歸湯治産後臟中風冷陰腫痛當歸獨活白芷地榆礬石敗醬煎水適寒暖洗陰自愈千金不用敗醬龍膽瀉肝湯治肝經濕熱腋脅滿通小便赤澀柴胡梢澤瀉各一錢五分車前木通當歸梢草龍膽各八分生地二錢生薑三片水煎食遠熱服更以美膳壓之此本導赤散加柴胡膽草之屬入肝以瀉濕熱也收腸方治子腸不收枳殼訶子五倍子白礬煎湯熏洗若不收再炙頂心百會穴數壯即上又收腸方凡遇生腸不收以鐵鏽水潤腸上用堪輿家真磁石一錢研末酒服腸即收矣千金療蝕方治慝瘡川芎當歸芍藥地榆甘草各等分用水五升煮至二升去渣熱熏溫洗日三夜一即愈椒湯治法治陰中小碎瘡如痱子癢不可當胡椒二十一粒煎湯洗之自愈肉汁治法治陰戶內瘡用豬肉十斤水煮取肉汁一半浸瘡冷再燉熱浸之不過三兩次即愈金銀散殺陰戶內瘡蟲蒲黃一升水銀一兩二味研勻細末用以搽瘡即愈此方不可輕用殺蟲硫黃散治疳蟲蝕下部五臟硫黃研為細末取東南桃樹枝五七枝輕打頭使散以綿纏黏末令少厚又截一竹筒先內下部中仍以所捻藥桃枝燒著熏之十全大補湯見上卷胎不長養門補中益氣湯八珍湯俱見上卷諸痛門加味逍遙散見上卷胎逆上逼門附逍遙散下逍遙散見上卷胎逆上逼門四物湯見上卷安胎門歸脾湯見上卷胎漏小産門神應丹見中卷催生門
